<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 商业情报终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
        .gold-text { background: linear-gradient(135deg, #fb923c, #c2410c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        /* 修复弹窗显示时的抖动 */
        .modal-active { overflow: hidden; height: 100vh; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="sticky top-0 z-40 w-full border-b border-white/5 bg-black/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter cursor-pointer select-none" ondblclick="toggleAdmin()">
                <span class="gold-text">YMTEA</span> <span class="text-white">HUB</span>
            </div>
            <div id="statusLabel" class="text-[10px] font-mono px-2 py-1 rounded bg-zinc-800 text-gray-500 border border-white/5">GUEST_MODE</div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 py-8 space-y-8">
        
        <section class="text-center py-6">
            <h1 class="text-3xl md:text-5xl font-black mb-4 leading-tight">内容即资产，<span class="gold-text">情报即先机</span></h1>
            <p class="text-zinc-500 text-xs md:text-sm">提供全球贸易数据、AI 选品雷达及跨境套利指南。</p>
        </section>

        <div class="glass rounded-3xl p-6">
            <h2 class="text-xs font-bold text-orange-500 mb-4 flex items-center gap-2">
                <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-orange-500"></span></span>
                实时全球贸易雷达
            </h2>
            <div id="trendList" class="space-y-3">
                <div class="text-zinc-800 text-xs italic">正在同步云端情报...</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-10">
            <div class="glass p-8 rounded-[2rem] flex flex-col justify-between min-h-[220px]">
                <div>
                    <h3 class="font-bold text-lg mb-2">🌐 核心情报深度拆解</h3>
                    <p class="text-xs text-zinc-500 mb-6">包含行业套利、海关预警及非公开选品逻辑。</p>
                </div>
                <button onclick="accessContent('report_pro')" class="w-full py-4 bg-zinc-900 rounded-2xl text-sm font-bold hover:bg-orange-700 transition">解锁深度报告</button>
            </div>
            <div class="glass p-8 rounded-[2rem] flex flex-col justify-between min-h-[220px]">
                <div>
                    <h3 class="font-bold text-lg mb-2">🛠️ 生产力工具 & 脚本</h3>
                    <p class="text-xs text-zinc-500 mb-6">自动化爬虫、营销模版及私有代码库下载。</p>
                </div>
                <button onclick="accessContent('tool_pro')" class="w-full py-4 bg-zinc-900 rounded-2xl text-sm font-bold hover:bg-orange-700 transition">下载 PRO 工具</button>
            </div>
        </div>
    </main>

    <div id="payModal" class="fixed inset-0 z-50 hidden bg-black/95 backdrop-blur-xl items-center justify-center p-4">
        <div class="max-w-xl w-full">
            <div class="grid md:grid-cols-2 gap-4">
                <div class="bg-zinc-900 border border-white/5 p-6 rounded-3xl text-center">
                    <div class="text-xs text-zinc-500 mb-2">月度体验版</div>
                    <div class="text-3xl font-black mb-6">¥38 <span class="text-xs font-normal opacity-50">/月</span></div>
                    <button onclick="startPay('monthly')" class="w-full py-3 bg-zinc-800 rounded-xl text-sm font-bold">立即选购</button>
                </div>
                <div class="bg-zinc-900 border-2 border-orange-500 p-6 rounded-3xl text-center relative">
                    <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-orange-500 text-black text-[10px] font-bold px-3 py-1 rounded-full">超值推荐</div>
                    <div class="text-xs text-zinc-500 mb-2">年度专业版</div>
                    <div class="text-3xl font-black mb-6">¥199 <span class="text-xs font-normal opacity-50">/年</span></div>
                    <button onclick="startPay('yearly')" class="w-full py-3 bg-orange-600 rounded-xl text-sm font-bold shadow-lg shadow-orange-600/20">尊享订阅</button>
                </div>
            </div>
            <button onclick="closeModal('payModal')" class="w-full mt-6 text-zinc-600 text-[10px] uppercase tracking-widest">返回访客模式</button>
        </div>
    </div>

    <div id="adminPanel" class="fixed inset-0 z-50 hidden bg-black/98 items-center justify-center p-4">
        <div class="bg-zinc-900 border border-white/10 p-8 rounded-3xl w-full max-w-md">
            <h2 class="font-bold mb-6">管理终端</h2>
            <div class="space-y-4">
                <input type="password" id="adminPass" placeholder="管理密钥" class="w-full bg-black border border-white/10 p-3 rounded-xl text-sm outline-none focus:border-orange-500">
                <select id="updateTarget" class="w-full bg-black border border-white/10 p-3 rounded-xl text-sm">
                    <option value="KV">更新内容 (KV)</option>
                    <option value="D1">发布数据 (D1 SQL)</option>
                </select>
                <input type="text" id="contentKey" placeholder="ID/Key" class="w-full bg-black border border-white/10 p-3 rounded-xl text-sm">
                <textarea id="contentVal" rows="4" placeholder="内容文本 或 SQL" class="w-full bg-black border border-white/10 p-3 rounded-xl text-sm"></textarea>
                <button onclick="adminPublish()" class="w-full py-4 bg-orange-700 rounded-xl font-bold">执行发布</button>
                <button onclick="toggleAdmin()" class="w-full text-zinc-600 text-xs mt-2">关闭</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://tea.asasasxzc.workers.dev";

        // 切换管理面板 (Logo双击)
        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('hidden');
            panel.classList.toggle('flex');
        }

        // 访问鉴权
        async function accessContent(key) {
            const token = localStorage.getItem('ymtea_token');
            try {
                const res = await fetch(`${API_BASE}/api/fetch/${key}`, {
                    headers: { 'Authorization': token }
                });
                if (res.status === 403) {
                    showPayModal();
                } else {
                    const result = await res.json();
                    alert("内容已解锁：\n" + result.data);
                }
            } catch (e) { showPayModal(); }
        }

        // 模拟支付逻辑
        async function startPay(type) {
            const email = prompt("请输入您的注册邮箱：");
            if (!email) return;
            const res = await fetch(`${API_BASE}/api/pay/success`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, type })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('ymtea_token', data.token);
                alert(`支付成功！已开通 ${type === 'yearly' ? '1年' : '1个月'} 权限`);
                location.reload();
            }
        }

        function showPayModal() {
            document.getElementById('payModal').classList.replace('hidden', 'flex');
            document.body.classList.add('modal-active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.replace('flex', 'hidden');
            document.body.classList.remove('modal-active');
        }

        // 加载趋势
        async function loadTrends() {
            try {
                const res = await fetch(`${API_BASE}/api/public/trends`);
                const data = await res.json();
                document.getElementById('trendList').innerHTML = data.map(item => `
                    <div class="flex justify-between items-center p-3 glass rounded-xl text-xs">
                        <span class="text-zinc-200">${item.title}</span>
                        <span class="text-zinc-600 text-[10px] font-mono">${new Date(item.update_time).toLocaleDateString()}</span>
                    </div>
                `).join('');
            } catch (e) {}
        }

        window.onload = () => {
            loadTrends();
            if(localStorage.getItem('ymtea_token')) {
                const label = document.getElementById('statusLabel');
                label.innerText = "PRO_SUBSCRIBER";
                label.className = "text-[10px] font-mono px-2 py-1 rounded bg-orange-500/10 text-orange-500 border border-orange-500/20";
            }
        };
    </script>
</body>
</html>
