<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 商业情报终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .gold-text { background: linear-gradient(135deg, #fb923c, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 布局 */
        .content-column { min-height: 500px; display: flex; flex-direction: column; }
        .list-container { flex-grow: 1; }

        /* 底部导航固定 */
        .bottom-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 70px; 
            background: rgba(8, 8, 8, 0.98); border-top: 1px solid rgba(255,255,255,0.08); 
            z-index: 200; display: flex; align-items: center; justify-content: space-around;
            backdrop-filter: blur(20px);
        }

        /* 列表项动画 */
        .item-row { transition: all 0.2s ease; }
        .item-row:hover { background: rgba(255,255,255,0.06); transform: translateX(4px); }

        /* 代码块渲染 */
        #readerBody code { 
            background: #000; border: 1px solid #333; padding: 1.2rem; border-radius: 12px; 
            display: block; font-family: 'Consolas', monospace; margin: 1rem 0; color: #f97316; overflow-x: auto;
        }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-[100] w-full border-b border-white/10 bg-black/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter" ondblclick="toggleAdmin()">
                <span class="gold-text">YMTEA</span> <span class="text-white">HUB</span>
            </div>
            <div id="statusLabel" class="text-[10px] font-mono px-2 py-1 rounded bg-zinc-900 text-zinc-500 border border-white/10">SYSTEM_IDLE</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10 space-y-10">
        <div class="glass rounded-[2rem] p-6 border-orange-500/10">
            <h2 class="text-[10px] font-bold text-orange-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                <span class="relative flex h-2 w-2"><span class="animate-ping absolute h-full w-full rounded-full bg-orange-500 opacity-75"></span><span class="relative rounded-full h-2 w-2 bg-orange-600"></span></span>
                Live Intelligence Radar
            </h2>
            <div id="trendList" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section id="section-intel" class="glass content-column p-6 md:p-8 rounded-[2.5rem]">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-white tracking-tight">核心情报 Intel</h3>
                </div>
                <div id="reportList" class="list-container space-y-3 text-zinc-500 text-xs italic">
                    正在同步云端加密数据库...
                </div>
                <div id="reportPagination" class="flex flex-wrap justify-center gap-1 mt-6"></div>
            </section>

            <section id="section-tools" class="glass content-column p-6 md:p-8 rounded-[2.5rem]">
                <h3 class="font-bold text-white mb-6">生产力工具 Tools</h3>
                <div id="toolList" class="list-container space-y-3 text-zinc-500 text-xs italic">
                    正在加载边缘计算工具...
                </div>
                <div id="toolPagination" class="flex flex-wrap justify-center gap-1 mt-6"></div>
            </section>
        </div>
    </main>

    <footer class="bottom-bar">
        <button onclick="scrollToId('section-intel')" class="text-[11px] font-black text-orange-500 uppercase">情报库</button>
        <button onclick="scrollToId('section-tools')" class="text-[11px] font-black text-zinc-500 uppercase">工具箱</button>
        <button onclick="showPayModal()" class="px-4 py-2 bg-orange-600/10 border border-orange-500/20 rounded-full text-[11px] font-black text-orange-500 uppercase">激活 Pro</button>
    </footer>

    <div id="contentReader" class="fixed inset-0 z-[300] hidden bg-black flex items-center justify-center">
        <div class="bg-zinc-900 w-full h-full md:max-w-4xl md:h-[90vh] md:rounded-[3rem] flex flex-col border border-white/10 shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <span class="text-orange-500 font-bold text-xs uppercase tracking-widest">Analysis Report</span>
                <button onclick="closeReader()" class="text-zinc-500 hover:text-white text-2xl">✕</button>
            </div>
            <div id="readerBody" class="flex-grow overflow-y-auto p-8 md:p-12 text-zinc-200 leading-relaxed select-text"></div>
        </div>
    </div>

    <div id="adminPanel" class="fixed inset-0 z-[250] hidden bg-black/95 items-center justify-center p-4">
        <div class="bg-zinc-900 border border-white/10 p-8 rounded-[2.5rem] w-full max-w-lg">
            <input type="password" id="adminPass" placeholder="Admin Secret" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white mb-4">
            <input type="text" id="quickTitle" placeholder="输入标题" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white mb-4">
            <textarea id="quickContent" rows="6" placeholder="正文内容..." class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white font-mono mb-4"></textarea>
            <div class="flex gap-2">
                <button onclick="quickPublish()" class="flex-1 py-4 bg-orange-700 rounded-2xl font-black text-xs text-white">同步云端</button>
                <button onclick="toggleAdmin()" class="px-6 py-4 bg-zinc-800 rounded-2xl font-black text-xs text-white">取消</button>
            </div>
        </div>
    </div>

    <div id="payModal" class="fixed inset-0 z-[400] hidden bg-black/98 flex items-center justify-center p-6">
        <div class="max-w-xs w-full text-center">
            <h2 class="text-xl font-black text-white mb-6 tracking-tighter">订阅专业版授权</h2>
            <input type="text" id="activeCode" placeholder="激活码" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-2xl text-white text-center mb-4">
            <button onclick="doActivate()" class="w-full py-4 bg-orange-600 rounded-2xl text-white font-black uppercase">验证激活</button>
            <button onclick="closeModal('payModal')" class="mt-8 text-zinc-600 text-[10px] uppercase">返回主页</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://s1.ymtea.club";
        let fullData = { reports: [], tools: [] };

        // 1. 初始化雷达数据
        function refreshRadar() {
            const data = [
                {t:"TikTok Shop", s:"UP"}, {t:"Amazon FBA", s:"-2%"}, {t:"US Customs", s:"HIGH"},
                {t:"TEMU Policy", s:"HOT"}, {t:"Market Cap", s:"STABLE"}, {t:"Logistics", s:"DELAY"}
            ];
            document.getElementById('trendList').innerHTML = data.map(i => `
                <div class="p-3 bg-white/5 rounded-xl border border-white/5 flex justify-between items-center">
                    <span class="text-[10px] text-zinc-400 font-bold truncate">${i.t}</span>
                    <span class="text-[9px] text-orange-500 font-mono font-black">${i.s}</span>
                </div>
            `).join('');
        }

        // 2. 核心加载逻辑（增加容错）
        async function loadContent() {
            try {
                const res = await fetch(`${API_BASE}/api/reports/list`);
                if (!res.ok) throw new Error("API_ERROR");
                const data = await res.json();
                
                // 稳健分类：确保 is_top 处理正确，且分流不出错
                fullData.reports = data.filter(i => i.category !== 'tool').sort((a,b) => (Number(b.is_top) || 0) - (Number(a.is_top) || 0) || b.id - a.id);
                fullData.tools = data.filter(i => i.category === 'tool').sort((a,b) => (Number(b.is_top) || 0) - (Number(a.is_top) || 0) || b.id - a.id);
                
                renderReports(1);
                renderTools(1);
            } catch (e) {
                console.error(e);
                document.getElementById('reportList').innerHTML = `<div class="text-red-500 text-[10px] py-10 uppercase tracking-widest text-center">Connection Lost: Please Refresh</div>`;
            }
        }

        function renderReports(page) {
            const size = 10;
            const paged = fullData.reports.slice((page-1)*size, page*size);
            document.getElementById('reportList').innerHTML = paged.map(r => `
                <div class="item-row flex justify-between items-center p-5 glass rounded-2xl border ${r.is_top ? 'border-orange-500/30 bg-orange-500/5' : 'border-white/5'}">
                    <div onclick="openItem(${r.id})" class="flex-grow cursor-pointer">
                        <div class="text-sm ${r.is_top ? 'text-orange-400 font-bold' : 'text-zinc-200'}">${r.title} ${r.is_top ? '🚩' : ''}</div>
                        <div class="text-[9px] text-zinc-600 mt-1 uppercase font-mono">${new Date(r.created_at).toLocaleDateString()}</div>
                    </div>
                    <button onclick="handleDelete(${r.id})" class="text-[9px] text-zinc-900 hover:text-red-900 font-black px-2">DEL</button>
                </div>
            `).join('') || '<div class="py-10 text-center text-zinc-800 text-[10px]">No Records Found</div>';
            renderPagination('reportPagination', fullData.reports.length, size, page, 'renderReports');
        }

        function renderTools(page) {
            const size = 8;
            const paged = fullData.tools.slice((page-1)*size, page*size);
            document.getElementById('toolList').innerHTML = paged.map(r => `
                <div class="item-row flex items-center gap-4 p-5 glass rounded-2xl border ${r.is_top ? 'border-orange-500/30' : 'border-white/5'}">
                    <div onclick="openItem(${r.id})" class="w-10 h-10 rounded-xl bg-zinc-900 flex items-center justify-center text-orange-600 cursor-pointer text-lg">⚡</div>
                    <div onclick="openItem(${r.id})" class="flex-grow cursor-pointer text-sm font-bold ${r.is_top ? 'text-orange-400' : 'text-zinc-200'}">${r.title}</div>
                </div>
            `).join('') || '<div class="py-10 text-center text-zinc-800 text-[10px]">No Tools Ready</div>';
            renderPagination('toolPagination', fullData.tools.length, size, page, 'renderTools');
        }

        async function openItem(id) {
            const token = localStorage.getItem('ymtea_token');
            if (!token) return showPayModal();
            try {
                const res = await fetch(`${API_BASE}/api/reports/view/${id}`, { headers: { 'Authorization': token } });
                const result = await res.json();
                if (!result.data) throw new Error();
                let html = result.data.replace(/```([\s\S]*?)```/g, '<code>$1</code>');
                document.getElementById('readerBody').innerHTML = html;
                document.getElementById('contentReader').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } catch (e) { alert("Access Denied: Please Activate PRO"); }
        }

        // 辅助功能
        function renderPagination(targetId, total, size, current, func) {
            const pages = Math.ceil(total / size);
            const container = document.getElementById(targetId);
            if (!container || pages <= 1) { if(container) container.innerHTML=''; return; }
            let html = '';
            for (let i = 1; i <= pages; i++) {
                html += `<button onclick="${func}(${i})" class="w-7 h-7 rounded text-[9px] font-black ${i === current ? 'bg-orange-600 text-white' : 'bg-white/5 text-zinc-600'}">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); document.getElementById('adminPanel').classList.toggle('flex'); }
        function showPayModal() { document.getElementById('payModal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function closeReader() { document.getElementById('contentReader').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        function scrollToId(id) { document.getElementById(id).scrollIntoView({behavior:'smooth'}); }

        window.onload = () => {
            refreshRadar();
            loadContent();
            if(localStorage.getItem('ymtea_token')) {
                document.getElementById('statusLabel').innerText = "PRO_ACCESS_ACTIVE";
                document.getElementById('statusLabel').classList.replace('text-zinc-500', 'text-orange-500');
            }
        };
    </script>
</body>
</html>
