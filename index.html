<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 云茗荟商业终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 160px; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .gold-text { background: linear-gradient(135deg, #fb923c, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bottom-fixed { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; }
        .pricing-bar { background: rgba(10,10,10,0.95); border-top: 1px solid rgba(255,255,255,0.05); padding: 10px 20px; display: flex; justify-content: center; gap: 30px; backdrop-filter: blur(15px); }
        .bottom-nav { height: 70px; background: #000; border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-around; }
        .item-row { transition: 0.2s; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .item-row:hover { background: rgba(255,255,255,0.06); border-color: #f9731655; }
        #readerBody code { background: #000; border: 1px solid #333; padding: 1rem; border-radius: 10px; display: block; font-family: monospace; color: #f97316; overflow-x: auto; margin: 1rem 0; }
        .custom-scroll::-webkit-scrollbar { width: 2px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-[150] w-full border-b border-white/10 bg-black/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter cursor-pointer" ondblclick="toggleAdmin()">
                <span class="gold-text">YMTEA</span> <span class="text-white">HUB</span>
            </div>
            <div id="statusLabel" class="text-[9px] font-mono px-2 py-1 rounded bg-zinc-900 text-zinc-500 border border-white/10 uppercase">System_Active</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-8">
        <div class="glass rounded-[2rem] p-6">
            <div class="flex justify-between items-center mb-6">
                <span class="text-[10px] font-bold text-orange-500 uppercase tracking-widest flex items-center gap-2">
                    <span class="h-2 w-2 rounded-full bg-orange-500 animate-pulse"></span> 实时雷达
                </span>
            </div>
            <div id="trendList" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section id="section-intel" class="glass p-6 md:p-8 rounded-[2.5rem] flex flex-col min-h-[500px]">
                <h2 class="font-black text-white mb-6 italic uppercase">Intelligence 情报</h2>
                <div id="reportList" class="flex-grow space-y-3">载入中...</div>
                <div id="reportPagination" class="flex justify-center gap-1 mt-6"></div>
            </section>
            <section id="section-tools" class="glass p-6 md:p-8 rounded-[2.5rem] flex flex-col min-h-[500px]">
                <h2 class="font-black text-white mb-6 italic uppercase">Toolbox 工具</h2>
                <div id="toolList" class="flex-grow space-y-3">载入中...</div>
                <div id="toolPagination" class="flex justify-center gap-1 mt-6"></div>
            </section>
        </div>
    </main>

    <div class="bottom-fixed">
        <div class="pricing-bar">
            <div class="flex items-center gap-2"><span class="text-[9px] font-bold text-zinc-500">PRO MONTHLY</span><span class="text-[10px] font-black text-orange-500">￥78</span></div>
            <div class="h-3 w-[1px] bg-white/10"></div>
            <div class="flex items-center gap-2"><span class="text-[9px] font-bold text-zinc-500">PRO YEARLY</span><span class="text-[10px] font-black text-orange-500">￥730</span></div>
        </div>
        <footer class="bottom-nav">
            <button onclick="scrollToId('section-intel')" class="text-[11px] font-black text-zinc-500 uppercase hover:text-white transition-colors">情报</button>
            <button onclick="scrollToId('section-tools')" class="text-[11px] font-black text-zinc-500 uppercase hover:text-white transition-colors">工具</button>
            <button onclick="showPayModal()" class="px-5 py-2 bg-zinc-900 border border-white/10 rounded-full text-[10px] font-black text-white uppercase tracking-tighter">激活专业授权</button>
            <a href="https://vip.ymtea.club" class="text-[11px] font-black text-orange-500 uppercase">云茗荟</a>
        </footer>
    </div>

    <div id="contentReader" class="fixed inset-0 z-[300] hidden bg-black/95 flex items-center justify-center p-4">
        <div class="bg-zinc-900 w-full h-full md:max-w-4xl md:h-[85vh] md:rounded-[3rem] flex flex-col border border-white/10 overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <span id="readerTitle" class="text-orange-500 font-bold text-[10px] uppercase tracking-widest">Detail View</span>
                <button onclick="closeReader()" class="text-white text-xl">✕</button>
            </div>
            <div id="readerBody" class="flex-grow overflow-y-auto p-8 md:p-12 text-zinc-200 text-sm leading-relaxed custom-scroll select-text"></div>
        </div>
    </div>

    <div id="adminPanel" class="fixed inset-0 z-[250] hidden bg-black/98 items-center justify-center p-4">
        <div class="bg-zinc-900 border border-white/10 p-8 rounded-[3rem] w-full max-w-2xl max-h-[90vh] overflow-y-auto custom-scroll shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <span class="text-white font-black text-xs tracking-widest uppercase italic">Console Dashboard</span>
                <button onclick="toggleAdmin()" class="text-zinc-600 underline text-[10px]">EXIT</button>
            </div>
            
            <div class="space-y-6">
                <input type="password" id="adminPass" placeholder="Admin Secret" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white text-xs outline-none focus:border-orange-500 transition-all">
                
                <div class="p-5 bg-orange-600/5 border border-orange-600/20 rounded-2xl space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold text-orange-500 uppercase tracking-widest">授权码管理器 (12位)</span>
                        <input type="text" id="targetEmail" placeholder="备注/客户名" class="bg-transparent border-b border-white/10 text-[10px] text-zinc-500 outline-none w-32 text-right">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="manualAddCode()" class="flex-1 py-4 bg-orange-600 rounded-xl text-[11px] font-black text-white uppercase shadow-lg shadow-orange-900/20 hover:bg-orange-500 transition-all">生成并入库</button>
                        <button onclick="fetchCodes()" class="px-6 py-4 border border-zinc-700 rounded-xl text-[11px] font-black text-zinc-500 uppercase hover:text-white transition-colors">查询列表</button>
                    </div>
                    <div id="codeDisplay" class="max-h-48 overflow-y-auto text-[10px] font-mono text-zinc-500 bg-black/50 p-3 rounded-2xl border border-white/5 italic custom-scroll">
                        等待操作...
                    </div>
                </div>

                <div class="p-5 bg-zinc-800/20 border border-white/5 rounded-2xl space-y-4">
                    <div class="text-[10px] font-bold text-zinc-400 uppercase">文章编辑器 <span id="editingId" class="text-orange-500 ml-2"></span></div>
                    <div class="flex gap-2">
                        <button onclick="setCategory('report')" id="cat_report" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white">情报模式</button>
                        <button onclick="setCategory('tool')" id="cat_tool" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500">工具模式</button>
                    </div>
                    <input type="text" id="quickTitle" placeholder="标题" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white text-xs">
                    <textarea id="quickContent" rows="6" placeholder="正文内容..." class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white text-xs font-mono"></textarea>
                    <div class="flex items-center justify-between px-2">
                        <label class="flex items-center gap-2 text-[10px] text-zinc-500"><input type="checkbox" id="isTopCheck" class="accent-orange-600"> 强制置顶</label>
                        <button onclick="cancelEdit()" id="cancelEditBtn" class="hidden text-[10px] text-zinc-600 underline uppercase italic">Cancel Edit</button>
                    </div>
                    <button onclick="quickPublish()" id="publishBtn" class="w-full py-4 bg-orange-700 rounded-2xl font-black text-xs text-white uppercase tracking-[0.2em] hover:bg-orange-600 transition-all">发布/同步内容</button>
                </div>
            </div>
        </div>
    </div>

    <div id="payModal" class="fixed inset-0 z-[400] hidden bg-black/95 flex items-center justify-center p-6">
        <div class="max-w-xs w-full text-center">
            <h2 class="text-2xl font-black text-white mb-6 italic tracking-tighter uppercase">Activate PRO</h2>
            <p class="text-[10px] text-zinc-500 mb-4 uppercase tracking-widest">请输入12位随机授权码</p>
            <input type="text" id="activeCode" placeholder="粘贴激活码" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-2xl text-white text-center mb-4 font-mono tracking-widest outline-none shadow-inner uppercase">
            <button onclick="doActivate()" class="w-full py-4 bg-orange-600 rounded-2xl text-white font-black uppercase shadow-lg shadow-orange-900/40 hover:bg-orange-500 transition-all">立即解锁全部权限</button>
            <button onclick="closeModal('payModal')" class="mt-8 text-zinc-800 text-[10px] font-black uppercase underline hover:text-zinc-500 transition-colors">返回</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://s1.ymtea.club";
        let currentCategory = 'report';
        let fullData = { reports: [], tools: [] };
        let currentEditId = null;

        window.onload = async () => {
            // 处理链接中的自动激活码 ?code=YM...
            const urlParams = new URLSearchParams(window.location.search);
            const autoCode = urlParams.get('code');
            if (autoCode && !localStorage.getItem('ymtea_token')) {
                document.getElementById('activeCode').value = autoCode.toUpperCase();
                await doActivate();
            }

            refreshRadar();
            loadContent();

            if(localStorage.getItem('ymtea_token')) {
                const label = document.getElementById('statusLabel');
                label.innerText = "PRO_ACCESS_ACTIVE";
                label.classList.replace('text-zinc-500', 'text-orange-500');
            }
        };

        // --- 核心逻辑：授权码生成与查询 ---

        async function manualAddCode() {
            const pass = document.getElementById('adminPass').value;
            const note = document.getElementById('targetEmail').value || 'Guest';
            // 生成严格12位随机码 (YM + 10位)
            const code = 'YM' + Math.random().toString(36).substring(2, 12).toUpperCase();
            
            if(!pass) return alert("请输入 Admin Secret");

            const sql = `INSERT INTO codes (email, code) VALUES ('${note}', '${code}');`;
            try {
                const res = await fetch(`${API_BASE}/api/admin/publish`, {
                    method: 'POST',
                    headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql })
                });
                if(res.ok) {
                    document.getElementById('codeDisplay').innerHTML = `
                        <div class="bg-orange-600 p-4 rounded-2xl flex flex-col items-center gap-3 shadow-lg">
                            <span class="text-white font-black text-lg tracking-widest">${code}</span>
                            <button onclick="copyText('${code}')" class="bg-black/20 px-4 py-2 rounded-lg text-[10px] font-black text-white uppercase">点击复制激活码</button>
                        </div>
                    `;
                    alert("✅ 12位授权码已成功入库");
                } else {
                    alert("❌ 生成失败，请检查 Secret 或数据库");
                }
            } catch(e) { alert("网络异常"); }
        }

        async function fetchCodes() {
            const pass = document.getElementById('adminPass').value;
            if(!pass) return alert("请输入 Secret");
            
            const sql = "SELECT * FROM codes ORDER BY id DESC LIMIT 50;";
            try {
                const res = await fetch(`${API_BASE}/api/admin/publish`, {
                    method: 'POST',
                    headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql })
                });

                const data = await res.json();
                let list = [];
                if (Array.isArray(data)) list = data;
                else if (data.results && Array.isArray(data.results)) list = data.results;

                const display = document.getElementById('codeDisplay');
                if (list.length > 0) {
                    display.innerHTML = list.map(i => `
                        <div class="flex justify-between items-center py-2 border-b border-white/5 last:border-0">
                            <span class="text-zinc-600 text-[9px] w-24 truncate">${i.email || i.note || 'Guest'}</span>
                            <span class="text-white font-bold font-mono text-[10px] select-all">${i.code || 'ERR'}</span>
                            <button onclick="copyText('${i.code}')" class="text-orange-500 text-[9px] font-black uppercase hover:text-white transition-colors">Copy</button>
                        </div>
                    `).join('');
                } else {
                    display.innerHTML = '<div class="py-4 text-center text-zinc-700 uppercase italic text-[9px]">数据库暂无记录</div>';
                }
            } catch(e) { alert("❌ 查询失败"); }
        }

        // --- 核心逻辑：客户激活 (增加了去空格和转大写) ---

        async function doActivate() {
            const inputField = document.getElementById('activeCode');
            // 去空格并强制转为大写，确保与数据库匹配
            const code = inputField.value.trim().toUpperCase();
            
            if(!code) return alert("请输入授权码");

            try {
                const res = await fetch(`${API_BASE}/api/pay/success`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });
                
                const data = await res.json();
                if(data.success && data.token) { 
                    localStorage.setItem('ymtea_token', data.token); 
                    alert("✅ 权限已解锁，欢迎回来！");
                    location.href = window.location.pathname; // 刷新页面
                } else {
                    alert("❌ 授权码无效 (请检查位数和字符是否正确)");
                }
            } catch(e) {
                alert("🚨 激活服务器未连接，请重试");
            }
        }

        // --- 文章加载与管理 ---

        async function loadContent() {
            try {
                const res = await fetch(`${API_BASE}/api/reports/list`);
                const data = await res.json();
                if(!Array.isArray(data)) return;
                const sorted = data.sort((a,b) => (b.is_top||0) - (a.is_top||0) || b.id - a.id);
                fullData.reports = sorted.filter(i => i.category !== 'tool');
                fullData.tools = sorted.filter(i => i.category === 'tool');
                renderReports(1);
                renderTools(1);
            } catch (e) { document.getElementById('reportList').innerText = "Sync Failed"; }
        }

        function renderItems(containerId, data, page, func) {
            const size = 10;
            const paged = data.slice((page-1)*size, page*size);
            const isTool = containerId === 'toolList';
            
            document.getElementById(containerId).innerHTML = paged.map(r => `
                <div class="item-row flex justify-between items-center p-4 rounded-2xl bg-white/5 border border-white/5">
                    <div onclick="openItem(${r.id})" class="flex-grow">
                        <div class="text-sm ${r.is_top ? 'text-orange-400 font-bold' : 'text-zinc-200'}">${r.title} ${r.is_top ? '🚩' : ''}</div>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="prepareEdit(event, ${r.id}, '${isTool ? 'tool' : 'report'}')" class="text-[10px] text-orange-500/50 font-bold uppercase hover:text-orange-500 transition-colors">Edit</button>
                        <button onclick="handleDelete(${r.id})" class="text-[10px] text-zinc-900 font-black uppercase hover:text-red-900 transition-colors">Del</button>
                    </div>
                </div>
            `).join('') || '<div class="py-10 text-center text-zinc-800 text-[10px]">NULL</div>';
            renderPagination(isTool ? 'toolPagination' : 'reportPagination', data.length, size, page, func);
        }

        function renderReports(p) { renderItems('reportList', fullData.reports, p, 'renderReports'); }
        function renderTools(p) { renderItems('toolList', fullData.tools, p, 'renderTools'); }

        async function prepareEdit(event, id, cat) {
            if(event) event.stopPropagation();
            const item = (cat === 'tool' ? fullData.tools : fullData.reports).find(i => i.id === id);
            if(!item) return;
            currentEditId = id;
            setCategory(cat);
            document.getElementById('quickTitle').value = item.title;
            document.getElementById('isTopCheck').checked = (item.is_top == 1);
            document.getElementById('editingId').innerText = `[MOD: ${id}]`;
            document.getElementById('publishBtn').innerText = "更新并同步";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            const token = localStorage.getItem('ymtea_token') || "";
            const res = await fetch(`${API_BASE}/api/reports/view/${id}`, { headers: { 'Authorization': token } });
            const result = await res.json();
            document.getElementById('quickContent').value = result.data || "";
            if(document.getElementById('adminPanel').classList.contains('hidden')) toggleAdmin();
        }

        function cancelEdit() {
            currentEditId = null;
            document.getElementById('quickTitle').value = "";
            document.getElementById('quickContent').value = "";
            document.getElementById('editingId').innerText = "";
            document.getElementById('publishBtn').innerText = "发布/同步内容";
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        async function quickPublish() {
            const pass = document.getElementById('adminPass').value;
            const title = document.getElementById('quickTitle').value.replace(/'/g, "''");
            const content = document.getElementById('quickContent').value.replace(/'/g, "''");
            const isTop = document.getElementById('isTopCheck').checked ? 1 : 0;
            if(!pass || !title) return alert("Secret/Title Missing");
            const sql = currentEditId 
                ? `UPDATE reports SET title='${title}', content='${content}', category='${currentCategory}', is_top=${isTop} WHERE id=${currentEditId};`
                : `INSERT INTO reports (title, content, category, is_top) VALUES ('${title}', '${content}', '${currentCategory}', ${isTop});`;
            const res = await fetch(`${API_BASE}/api/admin/publish`, {
                method: 'POST',
                headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                body: JSON.stringify({ sql })
            });
            if(res.ok) { alert("✅ 内容已更新"); location.reload(); }
        }

        // --- 交互工具函数 ---

        function copyText(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("✅ 激活码已复制");
        }

        async function openItem(id) {
            const token = localStorage.getItem('ymtea_token');
            if (!token) return showPayModal();
            try {
                const res = await fetch(`${API_BASE}/api/reports/view/${id}`, { headers: { 'Authorization': token } });
                const result = await res.json();
                document.getElementById('readerBody').innerHTML = (result.data || "").replace(/```([\s\S]*?)```/g, '<code>$1</code>');
                document.getElementById('contentReader').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } catch (e) { alert("Access Denied"); }
        }

        async function handleDelete(id) {
            const pass = prompt("DANGER: 确认删除?");
            if(!pass) return;
            const sql = `DELETE FROM reports WHERE id=${id};`;
            await fetch(`${API_BASE}/api/admin/publish`, {
                method: 'POST',
                headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                body: JSON.stringify({ sql })
            });
            location.reload();
        }

        function renderPagination(tid, total, size, current, func) {
            const pages = Math.ceil(total / size);
            const container = document.getElementById(tid);
            if (!container || pages <= 1) { if(container) container.innerHTML=''; return; }
            let html = '';
            for (let i = 1; i <= pages; i++) {
                html += `<button onclick="${func}(${i})" class="w-7 h-7 rounded-lg text-[9px] font-black transition-all ${i === current ? 'bg-orange-600 text-white' : 'bg-white/5 text-zinc-600'}">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function refreshRadar() {
            const tags = ["跨境趋势", "TK战法", "海关政策", "AI工具", "选品逻辑", "汇率预警"];
            document.getElementById('trendList').innerHTML = tags.sort(()=>.5-Math.random()).slice(0,4).map(i => `
                <div class="p-3 bg-white/5 rounded-2xl border border-white/5 flex justify-between items-center">
                    <span class="text-[10px] text-zinc-400 font-bold uppercase">${i}</span>
                    <span class="text-[9px] text-orange-500 font-black italic">LIVE</span>
                </div>
            `).join('');
        }

        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); document.getElementById('adminPanel').classList.toggle('flex'); }
        function showPayModal() { document.getElementById('payModal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function closeReader() { document.getElementById('contentReader').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        function scrollToId(id) { document.getElementById(id).scrollIntoView({behavior:'smooth'}); }
        function setCategory(cat) { 
            currentCategory = cat; 
            document.getElementById('cat_report').className = cat === 'report' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500';
            document.getElementById('cat_tool').className = cat === 'tool' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500';
        }
    </script>
</body>
</html>
