<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 商业情报终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-text { background: linear-gradient(135deg, #fb923c, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .modal-active { overflow: hidden; height: 100vh; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        .nav-btn { @apply flex-1 py-4 text-[10px] font-black uppercase tracking-widest transition-all hover:bg-white/5 disabled:opacity-10; }
        .page-ctrl { @apply px-5 py-2 rounded-xl bg-white/5 text-[10px] font-bold uppercase tracking-tighter border border-white/5 hover:bg-orange-600 hover:text-white disabled:opacity-20 disabled:hover:bg-white/5; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="sticky top-0 z-40 w-full border-b border-white/10 bg-black/90 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter cursor-pointer select-none" ondblclick="toggleAdmin()">
                <span class="gold-text">YMTEA</span> <span class="text-white">HUB</span>
            </div>
            <div id="statusLabel" class="text-[9px] font-mono px-2 py-1 rounded bg-zinc-800 text-zinc-400 border border-white/10 uppercase tracking-widest">GUEST_MODE</div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 py-8 space-y-8 fade-in">
        <div class="glass rounded-[2rem] p-6">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xs font-bold text-orange-500 flex items-center gap-2 tracking-widest uppercase">实时情报雷达</h2>
                <button onclick="refreshRadar()" class="text-[10px] text-zinc-500 hover:text-white uppercase font-bold">Refresh</button>
            </div>
            <div id="trendList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
            <div class="glass p-6 md:p-8 rounded-[2.5rem] flex flex-col min-h-[650px]">
                <h3 class="font-bold text-xl mb-6 text-white flex items-center gap-2"><span class="w-1.5 h-6 bg-orange-600 rounded-full"></span> 核心情报目录</h3>
                <div id="reportList" class="flex-grow space-y-3"></div>
                
                <div class="mt-8 pt-6 border-t border-white/5">
                    <div id="reportPagination" class="flex justify-between items-center"></div>
                    <div id="reportEndTag" class="hidden text-center mt-4 text-[10px] font-black text-zinc-700 tracking-[0.5em] uppercase">- THE END -</div>
                </div>
            </div>

            <div class="glass p-6 md:p-8 rounded-[2.5rem] flex flex-col min-h-[650px]">
                <h3 class="font-bold text-xl mb-6 text-white flex items-center gap-2"><span class="w-1.5 h-6 bg-orange-600 rounded-full"></span> 生产力工具库</h3>
                <div id="toolList" class="flex-grow space-y-3"></div>
                <div id="toolPagination" class="flex justify-between items-center mt-8 pt-6 border-t border-white/5"></div>
                <button onclick="showPayModal()" id="proBtn" class="mt-6 w-full py-4 bg-orange-600 rounded-2xl text-[11px] font-black uppercase tracking-widest shadow-lg shadow-orange-900/20 hover:bg-orange-500 transition-all text-white">Upgrade to Pro</button>
            </div>
        </div>
    </main>

    <footer class="w-full py-12 bg-zinc-950 border-t border-white/5">
        <div class="max-w-7xl mx-auto px-8 grid grid-cols-1 md:grid-cols-3 gap-12">
            <div class="space-y-4">
                <div class="text-2xl font-black text-white tracking-tighter"><span class="gold-text">YMTEA</span> HUB</div>
                <p class="text-zinc-500 text-xs leading-relaxed">云茗荟旗下高端情报分发终端。依托全球边缘节点，为专业跨境贸易者提供秒级响应的私密数据支持。</p>
            </div>
            <div class="space-y-4">
                <div class="text-white text-xs font-bold uppercase tracking-widest">Pricing</div>
                <div class="text-zinc-400 text-[11px]">PRO Access: ¥78/mo · ¥730/yr</div>
            </div>
            <div class="flex justify-between md:justify-end gap-12">
                <div class="space-y-3">
                    <div class="text-white text-xs font-bold uppercase tracking-widest">Links</div>
                    <a href="https://ymtea.club" class="block text-zinc-500 hover:text-orange-500 text-[11px]">Official Store</a>
                </div>
                <div class="space-y-3">
                    <div class="text-white text-xs font-bold uppercase tracking-widest">Status</div>
                    <div class="text-green-500 text-[10px] font-mono uppercase">Node: Online</div>
                </div>
            </div>
        </div>
    </footer>

    <div id="contentReader" class="fixed inset-0 z-[60] hidden bg-black items-center justify-center p-0 md:p-6 backdrop-blur-3xl">
        <div class="bg-zinc-900 w-full h-full md:max-w-4xl md:h-[85vh] md:rounded-[3rem] flex flex-col border border-white/10 overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-white/5 flex justify-between items-center text-white">
                <h2 id="readerTitle" class="font-black text-sm uppercase truncate pr-4 text-orange-500">Detail</h2>
                <button onclick="closeReader()" class="text-xl">✕</button>
            </div>
            <div id="readerBody" class="flex-grow overflow-y-auto p-8 md:p-12 text-zinc-200 leading-relaxed whitespace-pre-wrap select-text text-sm md:text-base custom-scroll"></div>
            <div class="flex border-t border-white/5 bg-black/20">
                <button id="prevBtn" class="nav-btn border-r border-white/5">← Previous</button>
                <button id="nextBtn" class="nav-btn">Next →</button>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="fixed inset-0 z-50 hidden bg-black/98 items-center justify-center p-4">
        <div class="bg-zinc-900 border border-white/10 p-8 rounded-[3rem] w-full max-w-md">
            <div class="flex justify-between items-center mb-6 text-white font-black text-xs uppercase"><span>Admin Sync</span><button onclick="toggleAdmin()">✕</button></div>
            <div class="space-y-4">
                <input type="password" id="adminPass" placeholder="Secret Key" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white outline-none">
                <input type="text" id="quickTitle" placeholder="Title" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white">
                <textarea id="quickContent" rows="4" placeholder="Content" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white"></textarea>
                <button onclick="quickPublish()" class="w-full py-4 bg-orange-700 rounded-2xl font-black text-xs text-white uppercase">Sync To Cloud</button>
            </div>
        </div>
    </div>

    <div id="payModal" class="fixed inset-0 z-50 hidden bg-black/95 items-center justify-center p-4">
        <div class="max-w-md w-full text-center">
            <h2 class="text-3xl font-black text-white uppercase tracking-tighter mb-4">Pro Access Required</h2>
            <p class="text-zinc-500 text-[10px] mb-8 uppercase tracking-widest leading-loose text-center px-4">该内容仅对云茗荟 PRO 会员开放。<br>请点击右下角浮窗联系客服获取订阅激活码。</p>
            <div class="space-y-3">
                <button onclick="startPay('monthly')" class="w-full p-6 glass rounded-2xl text-white font-bold hover:bg-zinc-800 transition">Monthly ¥78</button>
                <button onclick="startPay('yearly')" class="w-full p-6 bg-orange-600 rounded-2xl text-white font-bold hover:bg-orange-500 transition">Yearly ¥730</button>
            </div>
            <button onclick="closeModal('payModal')" class="mt-8 text-zinc-600 text-[10px] font-black uppercase">Cancel</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://s1.ymtea.club";
        let fullData = { reports: [], tools: [] };
        let currentCategory = 'report';

        // 核心：倒序排列并渲染页面
        async function loadContent() {
            try {
                const res = await fetch(`${API_BASE}/api/reports/list`);
                const data = await res.json();
                
                // 强制按日期倒序（最新的在前）
                const sorted = data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                
                fullData.reports = sorted.filter(i => i.category !== 'tool');
                fullData.tools = sorted.filter(i => i.category === 'tool');
                
                renderPage('report', 1);
                renderPage('tool', 1);
            } catch (e) { console.error("LOAD_ERR", e); }
        }

        function renderPage(type, page) {
            const size = type === 'report' ? 20 : 10;
            const container = document.getElementById(type + 'List');
            const pagContainer = document.getElementById(type + 'Pagination');
            const dataset = type === 'report' ? fullData.reports : fullData.tools;
            
            const start = (page - 1) * size;
            const end = page * size;
            const pageData = dataset.slice(start, end);
            const totalPages = Math.ceil(dataset.length / size);

            // 渲染列表
            container.innerHTML = pageData.map(r => `
                <div class="flex justify-between items-center p-5 glass rounded-2xl border border-white/5 hover:border-orange-500/50 group transition-all">
                    <div onclick="openReport(${r.id}, '${type}')" class="flex-grow cursor-pointer">
                        <span class="text-[13px] text-zinc-200 group-hover:text-orange-400 transition-colors">${r.title}</span>
                        <div class="text-[9px] text-zinc-600 font-mono mt-1">${new Date(r.created_at).toLocaleDateString()}</div>
                    </div>
                    <div class="flex gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="handleDelete(${r.id})" class="text-[9px] text-red-900 font-bold uppercase hover:text-red-500">Del</button>
                    </div>
                </div>
            `).join('') || '<div class="text-zinc-800 text-xs py-20 text-center uppercase tracking-widest font-black">Null Data</div>';

            // 渲染分页：左右分开
            if (totalPages > 1) {
                pagContainer.innerHTML = `
                    <button onclick="renderPage('${type}', ${page-1})" class="page-ctrl" ${page === 1 ? 'disabled' : ''}>← Prev Page</button>
                    <span class="text-[10px] font-mono text-zinc-600">PAGE ${page} / ${totalPages}</span>
                    <button onclick="renderPage('${type}', ${page+1})" class="page-ctrl" ${page === totalPages ? 'disabled' : ''}>Next Page →</button>
                `;
            } else {
                pagContainer.innerHTML = '';
            }

            // 末页 END 标记
            if (type === 'report') {
                const endTag = document.getElementById('reportEndTag');
                (page === totalPages && totalPages > 0) ? endTag.classList.remove('hidden') : endTag.classList.add('hidden');
            }
        }

        async function openReport(id, cat) {
            const token = localStorage.getItem('ymtea_token');
            if (!token) return showPayModal();
            const dataset = cat === 'tool' ? fullData.tools : fullData.reports;
            const idx = dataset.findIndex(i => i.id === id);
            try {
                const res = await fetch(`${API_BASE}/api/reports/view/${id}`, { headers: { 'Authorization': token } });
                if (res.status === 403) return showPayModal();
                const result = await res.json();
                
                document.getElementById('readerTitle').innerText = dataset[idx].title;
                document.getElementById('readerBody').innerText = result.data;
                document.getElementById('contentReader').classList.replace('hidden', 'flex');
                document.body.classList.add('modal-active');
                document.getElementById('readerBody').scrollTop = 0;

                // 阅读器内的上一篇/下一篇
                const pBtn = document.getElementById('prevBtn');
                const nBtn = document.getElementById('nextBtn');
                pBtn.disabled = idx === 0;
                pBtn.onclick = () => openReport(dataset[idx-1].id, cat);
                nBtn.disabled = idx === dataset.length - 1;
                nBtn.onclick = () => openReport(dataset[idx+1].id, cat);
            } catch (e) { alert("SYNC_ERROR"); }
        }

        // 其他功能保持不变
        async function quickPublish() {
            const pass = document.getElementById('adminPass').value;
            const title = document.getElementById('quickTitle').value;
            const content = document.getElementById('quickContent').value;
            const sql = `INSERT INTO reports (title, content, category) VALUES ('${title.replace(/'/g, "''")}', '${content.replace(/'/g, "''")}', '${currentCategory}');`;
            const res = await fetch(`${API_BASE}/api/admin/publish`, {
                method: 'POST',
                headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                body: JSON.stringify({ sql })
            });
            if (res.ok) location.reload(); else alert("AUTH_FAIL");
        }

        async function handleDelete(id) {
            const pass = prompt("ADMIN PASS:");
            if(!pass || !confirm("DELETE?")) return;
            const sql = `DELETE FROM reports WHERE id = ${id};`;
            const res = await fetch(`${API_BASE}/api/admin/publish`, {
                method: 'POST',
                headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                body: JSON.stringify({ sql })
            });
            if (res.ok) location.reload();
        }

        async function startPay(type) {
            const email = prompt("Email:");
            const code = prompt("Activation Code:");
            if (!email || !code) return;
            const res = await fetch(`${API_BASE}/api/pay/success`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email.trim(), type, code: code.trim() })
            });
            const data = await res.json();
            if (data.success) { localStorage.setItem('ymtea_token', data.token); location.reload(); } else alert(data.msg);
        }

        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); document.getElementById('adminPanel').classList.toggle('flex'); }
        function showPayModal() { document.getElementById('payModal').classList.replace('hidden', 'flex'); }
        function closeModal(id) { document.getElementById(id).classList.replace('flex', 'hidden'); document.body.classList.remove('modal-active'); }
        function closeReader() { document.getElementById('contentReader').classList.replace('flex', 'hidden'); document.body.classList.remove('modal-active'); }

        function refreshRadar() {
            const list = ["🚢 港口拥堵指数: 24h+", "📉 离岸人民币汇率波动", "🚀 TikTok 选品库已更新", "🤖 GPT-5 商业接口发布", "📦 亚马逊欧洲仓扩容"];
            document.getElementById('trendList').innerHTML = list.map(t => `<div class="p-4 border border-white/5 rounded-2xl bg-white/5 text-[11px] text-zinc-400 font-bold">${t}</div>`).join('');
        }

        window.onload = () => { refreshRadar(); loadContent(); if(localStorage.getItem('ymtea_token')) {
            const status = document.getElementById('statusLabel');
            status.innerText = "PRO_ACCESS";
            status.className = "text-[9px] font-mono px-2 py-1 rounded bg-orange-500/10 text-orange-500 border border-orange-500/20 uppercase tracking-widest";
            if(document.getElementById('proBtn')) document.getElementById('proBtn').style.display = 'none';
        }};
    </script>
</body>
</html>
