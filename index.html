<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 云茗荟商业终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background:#050505; color:#e4e4e7; font-family:'Inter',sans-serif; margin:0; padding-bottom:180px; -webkit-tap-highlight-color:transparent; }
        .gold-text { background:linear-gradient(135deg,#fb923c,#f97316); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .glass { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(10px); }
        .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:85px; background:#000; border-top:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:space-around; z-index:200; padding-bottom:env(safe-area-inset-bottom); }
        .float-btn { position:fixed; right:16px; bottom:180px; width:56px; height:56px; background:#f97316; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; box-shadow:0 10px 25px rgba(249,115,22,0.3); border:2px solid rgba(255,255,255,0.2); }
        #readerBody { white-space:pre-wrap; line-height:1.8; word-break:break-all; }
        pre { background:#000; padding:15px; border-radius:12px; border:1px solid #333; color:#fb923c; overflow-x:auto; font-size:12px; margin:10px 0; font-family:monospace; }
        .custom-scroll::-webkit-scrollbar { width:4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background:#333; border-radius:10px; }
        .active-btn { background:#ea580c !important; color: white !important; }
        .price-tag { background:rgba(249,115,22,0.1); border:1px solid rgba(249,115,22,0.2); color:#fb923c; }
    </style>
</head>
<body>
    <!-- 头部 -->
    <header class="sticky top-0 z-[150] w-full border-b border-white/10 bg-black/90 backdrop-blur-md h-16 flex items-center justify-between px-6">
        <div class="flex flex-col cursor-pointer" ondblclick="toggleAdmin()">
            <div class="text-xl font-black tracking-tighter"><span class="gold-text">YMTEA</span> <span class="text-white">HUB</span></div>
            <span class="text-[8px] text-zinc-500 font-bold uppercase tracking-[0.2em]">Professional Terminal</span>
        </div>
        <div id="statusLabel" class="text-[9px] font-mono px-2 py-1 rounded bg-zinc-900 text-zinc-500 border border-white/10">SYS_READY</div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
        <div class="glass rounded-[2rem] p-4"><div id="trendList" class="grid grid-cols-3 gap-2 md:grid-cols-6 text-center"></div></div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <section id="section-intel" class="glass p-6 rounded-[2.5rem] min-h-[400px]">
                <h2 class="font-black text-white mb-4 italic uppercase text-xs border-l-4 border-orange-500 pl-3">Intelligence</h2>
                <div id="reportList" class="space-y-2"></div>
                <div id="reportPagination" class="flex justify-center gap-2 mt-4"></div>
            </section>
            <section id="section-tools" class="glass p-6 rounded-[2.5rem] min-h-[400px]">
                <h2 class="font-black text-white mb-4 italic uppercase text-xs border-l-4 border-zinc-600 pl-3">Toolbox</h2>
                <div id="toolList" class="space-y-2"></div>
                <div id="toolPagination" class="flex justify-center gap-2 mt-4"></div>
            </section>
        </div>
    </main>

    <a href="https://work.weixin.qq.com/kfid/kfcab9eba83e85cde3e" target="_blank" class="float-btn">
        <span class="text-[10px] font-black text-white text-center">联系<br>客服</span>
    </a>

    <footer class="bottom-nav">
        <button onclick="scrollToId('section-intel')" class="flex-1 text-[11px] font-black text-zinc-500 uppercase tracking-widest">Intel</button>
        <div class="flex flex-col items-center min-w-[140px]">
            <a href="https://work.weixin.qq.com/kfid/kfcab9eba83e85cde3e" target="_blank" class="gold-text text-[14px] font-black tracking-[0.2em] mb-1 italic hover:scale-105 transition-transform">云茗荟</a>
            <button onclick="showPayModal()" class="w-full py-3 bg-white text-black rounded-full text-[10px] font-black uppercase shadow-lg shadow-white/5">激活权限</button>
        </div>
        <button onclick="scrollToId('section-tools')" class="flex-1 text-[11px] font-black text-zinc-500 uppercase tracking-widest">Tools</button>
    </footer>

    <!-- 阅读器 -->
    <div id="contentReader" class="fixed inset-0 z-[300] hidden bg-black/98 flex items-center justify-center p-4">
        <div class="bg-zinc-900 w-full h-full md:max-w-4xl md:h-[85vh] md:rounded-[3rem] flex flex-col border border-white/10 overflow-hidden shadow-2xl">
            <div class="p-4 border-b border-white/5 flex justify-between bg-black/20">
                <span id="readerTitle" class="text-orange-500 font-bold text-[10px] uppercase truncate max-w-[70%] tracking-widest">Loading...</span>
                <button onclick="closeReader()" class="text-zinc-500 text-xl px-2">✕</button>
            </div>
            <div id="readerBody" class="flex-grow overflow-y-auto p-6 md:p-12 text-zinc-200 text-sm custom-scroll"></div>
            <div class="p-4 border-t border-white/5 flex gap-4 bg-black/20">
                <button id="prevBtn" class="flex-1 py-4 bg-white/5 rounded-2xl text-[10px] font-bold text-zinc-500 uppercase">Previous</button>
                <button id="nextBtn" class="flex-1 py-4 bg-white/5 rounded-2xl text-[10px] font-bold text-zinc-500 uppercase">Next</button>
            </div>
        </div>
    </div>

    <!-- 管理控制台 -->
    <div id="adminPanel" class="fixed inset-0 z-[250] hidden bg-black/98 flex items-center justify-center p-4">
        <div class="bg-zinc-900 border border-white/10 p-6 rounded-[2.5rem] w-full max-w-xl max-h-[90vh] overflow-y-auto custom-scroll shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4">
                <span class="gold-text font-black text-xs uppercase tracking-widest">Terminal Console</span>
                <button onclick="toggleAdmin()" class="text-zinc-600 text-xl font-bold">✕</button>
            </div>
            <div class="space-y-4">
                <div class="space-y-2">
                    <span class="text-[9px] text-zinc-500 uppercase font-bold">Authentication</span>
                    <input type="password" id="adminPass" placeholder="ADMIN_SECRET_KEY" class="w-full bg-black border border-white/10 p-4 rounded-xl text-white text-xs outline-none focus:border-orange-500 transition-all font-mono">
                </div>

                <div class="p-5 bg-zinc-800/30 border border-white/5 rounded-3xl space-y-4">
                    <span class="text-[9px] text-orange-500 uppercase font-bold italic">Editor Suite</span>
                    <div class="flex gap-2">
                        <button onclick="setCat('report')" id="cat_report" class="flex-1 py-3 rounded-xl text-[9px] font-black uppercase">情报发布</button>
                        <button onclick="setCat('tool')" id="cat_tool" class="flex-1 py-3 rounded-xl text-[9px] font-black uppercase">工具录入</button>
                    </div>
                    <input type="text" id="quickTitle" placeholder="Title" class="w-full bg-black border border-white/10 p-4 rounded-xl text-white text-xs outline-none focus:border-orange-500">
                    <textarea id="quickContent" rows="6" placeholder="Content Body..." class="w-full bg-black border border-white/10 p-4 rounded-xl text-white text-xs font-mono outline-none focus:border-orange-500"></textarea>
                    <div class="flex items-center gap-3 bg-black/40 p-3 rounded-xl">
                        <input type="checkbox" id="isTopCheck" class="w-4 h-4 accent-orange-600">
                        <label for="isTopCheck" class="text-[10px] text-zinc-400 font-black uppercase cursor-pointer">Pin to Top</label>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="publish()" id="publishBtn" class="flex-[2] py-4 bg-orange-700 rounded-2xl font-black text-[10px] text-white uppercase tracking-widest shadow-lg shadow-orange-900/20">Sync Data Center</button>
                        <button onclick="cancelEdit()" id="cancelBtn" class="hidden flex-1 py-4 bg-zinc-800 rounded-2xl text-[10px] text-zinc-500 uppercase font-bold">Cancel</button>
                    </div>
                </div>

                <div class="p-5 bg-orange-600/5 border border-orange-600/10 rounded-3xl space-y-4">
                    <span class="text-[9px] font-black text-orange-500 uppercase tracking-tighter italic">License Key Generator</span>
                    <div class="flex gap-2">
                        <input type="text" id="codeEmail" placeholder="备注信息" class="flex-1 bg-black border border-white/10 p-4 rounded-xl text-white text-xs outline-none">
                        <button onclick="genKey()" class="px-6 bg-orange-600 rounded-xl text-[9px] font-black text-white uppercase tracking-tighter hover:bg-orange-500 transition-all">Gen</button>
                    </div>
                    <div id="lastCode" class="p-4 bg-black rounded-xl text-center font-mono text-orange-500 text-xl border border-white/5 tracking-[0.3em] font-black">---</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 激活模态 (已加入找回价格展示) -->
    <div id="payModal" class="fixed inset-0 z-[400] hidden bg-black/95 flex items-center justify-center p-6 backdrop-blur-md">
        <div class="max-w-xs w-full text-center animate-in fade-in zoom-in duration-300">
            <h2 class="text-3xl font-black gold-text mb-2 italic uppercase">Activation</h2>
            <p class="text-[10px] text-zinc-600 mb-6 font-bold tracking-widest uppercase">Select Tier & Verify</p>
            
            <!-- 价格展示区 -->
            <div class="grid grid-cols-2 gap-2 mb-6">
                <div class="price-tag p-3 rounded-xl">
                    <div class="text-[8px] uppercase font-black opacity-60">Monthly</div>
                    <div class="text-lg font-black">￥78</div>
                </div>
                <div class="price-tag p-3 rounded-xl border-orange-500/50 bg-orange-500/10">
                    <div class="text-[8px] uppercase font-black opacity-60">Annual</div>
                    <div class="text-lg font-black">￥730</div>
                </div>
            </div>

            <input type="text" id="activeCode" placeholder="输入序列激活码" class="w-full bg-zinc-900 border border-white/10 p-5 rounded-2xl text-white text-center mb-4 font-mono outline-none uppercase text-xl focus:border-orange-600 transition-all shadow-inner">
            <button onclick="doAct()" class="w-full py-5 bg-orange-600 rounded-2xl text-white font-black uppercase text-[11px] tracking-[0.2em] shadow-2xl shadow-orange-600/20 active:scale-95 transition-transform">立即激活权限</button>
            
            <button onclick="window.open('https://work.weixin.qq.com/kfid/kfcab9eba83e85cde3e')" class="mt-8 text-zinc-400 text-[10px] font-black uppercase hover:text-orange-500 transition-colors flex items-center justify-center gap-2 mx-auto">
                <span class="w-1.5 h-1.5 bg-orange-500 rounded-full animate-ping"></span>
                联系客服获取/找回激活码
            </button>
            <button onclick="closeModal('payModal')" class="mt-10 text-zinc-800 text-[10px] underline uppercase font-black tracking-widest hover:text-zinc-600 transition-colors">Dismiss</button>
        </div>
    </div>

    <script>
        const API = "https://s1.ymtea.club";
        let curCat = 'report', fullData = { reports: [], tools: [] }, curEid = null, curList = [], curIdx = -1;

        window.onload = () => {
            const tags = ["趋势","战法","海关","选品","流量","汇率"];
            document.getElementById('trendList').innerHTML = tags.map(i=>`<div class="p-2 bg-white/5 rounded-xl border border-white/5"><div class="text-[8px] text-zinc-600 font-bold mb-1">${i}</div><div class="text-[7px] text-orange-500 font-black italic">LIVE</div></div>`).join('');
            loadData();
            checkAuth();
            setCat('report');
        };

        function checkAuth() {
            if(localStorage.getItem('ymtea_token')) {
                const l = document.getElementById('statusLabel');
                l.innerText = "PRO_ENABLED";
                l.className = "text-[9px] font-mono px-2 py-1 rounded bg-orange-950 text-orange-500 border border-orange-500/30";
            }
        }

        async function loadData() {
            try {
                const r = await fetch(`${API}/api/reports/list`);
                const d = await r.json();
                const sorted = d.sort((a,b) => (b.is_top||0) - (a.is_top||0) || b.id - a.id);
                fullData.reports = sorted.filter(i => i.category !== 'tool');
                fullData.tools = sorted.filter(i => i.category === 'tool');
                render('reportList', fullData.reports, 1, 'renderReports');
                render('toolList', fullData.tools, 1, 'renderTools');
            } catch(e) { console.error("FETCH_ERROR", e); }
        }

        function render(tid, data, page, funcName) {
            const size = 10, paged = data.slice((page-1)*size, page*size), isTool = tid === 'toolList', c = document.getElementById(tid);
            if(!data.length) { c.innerHTML = '<div class="text-[10px] text-zinc-800 p-8 text-center uppercase tracking-widest italic font-bold opacity-30">Empty Stream</div>'; return; }
            c.innerHTML = paged.map(r => `
                <div class="flex justify-between items-center p-5 rounded-2xl bg-white/[0.02] border border-white/5 hover:border-orange-500/30 hover:bg-white/[0.05] mb-3 cursor-pointer transition-all group" onclick="openItem(${r.id}, '${isTool?'tool':'report'}')">
                    <div class="text-sm ${r.is_top?'text-orange-400 font-bold':'text-zinc-300'} truncate flex-grow pr-4">
                        ${r.is_top?'<span class="text-[7px] bg-orange-600/20 text-orange-500 px-1.5 py-0.5 rounded mr-2 font-black italic">TOP</span>':''}${r.title}
                    </div>
                    <div class="flex gap-3" onclick="event.stopPropagation()">
                        <button onclick="prepareEdit(${r.id}, '${isTool?'tool':'report'}')" class="text-[9px] text-zinc-600 hover:text-white uppercase font-black">Edit</button>
                        <button onclick="handleDel(${r.id})" class="text-[9px] text-zinc-800 hover:text-red-500 uppercase font-black">Del</button>
                    </div>
                </div>`).join('');
            const pgs = Math.ceil(data.length/size);
            const pc = document.getElementById(isTool?'toolPagination':'reportPagination');
            if(pgs<=1) { pc.innerHTML=''; return; }
            let h=''; for(let i=1;i<=pgs;i++) h+=`<button onclick="${funcName}(${i})" class="w-7 h-7 rounded-lg text-[9px] font-black transition-all ${i===page?'bg-orange-600 text-white shadow-lg shadow-orange-600/20':'bg-white/5 text-zinc-600'}">${i}</button>`;
            pc.innerHTML = h;
        }

        async function openItem(id, cat) {
            const t = localStorage.getItem('ymtea_token'), p = document.getElementById('adminPass').value;
            if(!t && !p) return showPayModal();
            curList = (cat === 'tool' ? fullData.tools : fullData.reports);
            curIdx = curList.findIndex(i => i.id === id);
            
            document.getElementById('contentReader').classList.remove('hidden');
            document.getElementById('readerTitle').innerText = "Decrypting Data...";
            document.getElementById('readerBody').innerHTML = "<div class='flex items-center justify-center h-40'><div class='animate-spin rounded-full h-8 w-8 border-b-2 border-orange-500'></div></div>";

            try {
                const headers = { 'Content-Type': 'application/json' };
                if(t) headers['Authorization'] = t;
                if(p) headers['Admin-Key'] = p;

                const res = await fetch(`${API}/api/reports/view/${id}`, { headers });
                const r = await res.json();
                if(r.data) {
                    document.getElementById('readerTitle').innerText = curList[curIdx].title;
                    document.getElementById('readerBody').innerHTML = r.data.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
                    const pb = document.getElementById('prevBtn'), nb = document.getElementById('nextBtn');
                    pb.style.opacity = curIdx > 0 ? "1" : "0.1"; 
                    nb.style.opacity = curIdx < curList.length-1 ? "1" : "0.1";
                    pb.onclick = curIdx > 0 ? () => openItem(curList[curIdx-1].id, curList[curIdx-1].category) : null;
                    nb.onclick = curIdx < curList.length-1 ? () => openItem(curList[curIdx+1].id, curList[curIdx+1].category) : null;
                } else { 
                    document.getElementById('readerBody').innerHTML = "<div class='text-red-500 text-center font-bold'>权限验证未通过，请确保密钥正确或激活码有效</div>";
                }
            } catch(e) { 
                document.getElementById('readerBody').innerHTML = "<div class='text-red-500 text-center font-bold'>网络链路中断</div>";
            }
        }

        async function genKey() {
            const p = document.getElementById('adminPass').value, note = document.getElementById('codeEmail').value || 'Licence';
            if(!p) return alert("AUTH_REQUIRED: 密钥缺失");
            const k = 'YM' + Math.random().toString(36).substring(2, 12).toUpperCase();
            try {
                const r = await fetch(`${API}/api/admin/publish`, { method:'POST', headers:{'Admin-Key':p,'Content-Type':'application/json'}, body:JSON.stringify({sql:"INSERT INTO codes (email, code, type) VALUES (?, ?, ?)", params:[note, k, 'MONTH']}) });
                if(r.ok) { document.getElementById('lastCode').innerText = k; alert("License Synced."); } else alert("Access Denied.");
            } catch(e) { alert("Server Error."); }
        }

        async function publish() {
            const p = document.getElementById('adminPass').value;
            const t = document.getElementById('quickTitle').value;
            const c = document.getElementById('quickContent').value;
            const top = document.getElementById('isTopCheck').checked ? 1 : 0;
            
            if(!p) return alert("鉴权失败：请在 Authentication 框中输入管理员密钥");
            if(!t || !c) return alert("发布失败：标题和内容不能为空");
            
            // 构造 SQL 和 参数
            let sql, params;
            if (curEid) {
                sql = "UPDATE reports SET title=?, content=?, category=?, is_top=? WHERE id=?";
                params = [t, c, curCat, top, curEid];
            } else {
                sql = "INSERT INTO reports (title, content, category, is_top) VALUES (?,?,?,?)";
                params = [t, c, curCat, top];
            }
            
            try {
                const r = await fetch(`${API}/api/admin/publish`, { 
                    method: 'POST', 
                    headers: {
                        'Admin-Key': p,
                        'Content-Type': 'application/json'
                    }, 
                    body: JSON.stringify({ sql, params }) 
                });
                
                if(r.ok) { 
                    alert("同步成功：数据中心已更新"); 
                    location.reload(); 
                } else {
                    const errorMsg = await r.text();
                    alert(`同步失败 (Denied)：${r.status === 401 || r.status === 403 ? "管理员密钥无效或权限不足" : "服务器拒绝请求 - " + errorMsg}`);
                }
            } catch(e) { 
                alert("网络连接失败：请检查网络环境或服务器状态"); 
            }
        }

        async function doAct() {
            const c = document.getElementById('activeCode').value.trim().toUpperCase();
            if(!c) return;
            try {
                const r = await fetch(`${API}/api/pay/success`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code:c}) });
                const d = await r.json();
                if(d.success) { localStorage.setItem('ymtea_token', d.token); alert("终端权限已开启"); location.reload(); } else alert("无效序列号");
            } catch(e) { alert("Timeout."); }
        }

        async function handleDel(id) { 
            const p = document.getElementById('adminPass').value || prompt("管理密钥:");
            if(!p) return;
            if(confirm("Wipe this record permanently?")) { 
                try {
                    const r = await fetch(`${API}/api/admin/publish`, { method:'POST', headers:{'Admin-Key':p,'Content-Type':'application/json'}, body:JSON.stringify({sql:"DELETE FROM reports WHERE id=?", params:[id]}) });
                    if(r.ok) location.reload();
                } catch(e) { alert("Del Failed."); }
            } 
        }

        async function prepareEdit(id, cat) {
            const p = document.getElementById('adminPass').value; 
            if(!p) { toggleAdmin(); alert("请输入管理密钥以开启编辑权限"); return; }
            
            const item = (cat==='tool'?fullData.tools:fullData.reports).find(i=>i.id===id);
            if(!item) return;
            
            curEid = id; 
            setCat(cat); 
            document.getElementById('quickTitle').value = item.title;
            if(document.getElementById('adminPanel').classList.contains('hidden')) toggleAdmin();
            
            try {
                const r = await fetch(`${API}/api/reports/view/${id}`, { headers:{'Admin-Key':p, 'Authorization': localStorage.getItem('ymtea_token')||""} });
                const d = await r.json(); 
                if(d.data) { 
                    document.getElementById('quickContent').value = d.data; 
                    document.getElementById('cancelBtn').classList.remove('hidden'); 
                    document.getElementById('publishBtn').innerText = "UPDATE_ENTRY"; 
                    document.getElementById('isTopCheck').checked = item.is_top === 1;
                    scrollToId('adminPanel');
                } else {
                    alert("内容读取受限，请确认密钥有效性");
                }
            } catch(e) { alert("数据拉取失败"); }
        }

        function renderReports(p) { render('reportList', fullData.reports, p, 'renderReports'); }
        function renderTools(p) { render('toolList', fullData.tools, p, 'renderTools'); }
        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); }
        function showPayModal() { document.getElementById('payModal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function closeReader() { document.getElementById('contentReader').classList.add('hidden'); }
        function scrollToId(id) { document.getElementById(id).scrollIntoView({behavior:'smooth'}); }
        function cancelEdit() { location.reload(); }
        function setCat(c) { 
            curCat = c; 
            const rBtn = document.getElementById('cat_report'), tBtn = document.getElementById('cat_tool');
            if(c === 'report') {
                rBtn.classList.add('active-btn'); rBtn.classList.remove('bg-zinc-800', 'text-zinc-500');
                tBtn.classList.remove('active-btn'); tBtn.classList.add('bg-zinc-800', 'text-zinc-500');
            } else {
                tBtn.classList.add('active-btn'); tBtn.classList.remove('bg-zinc-800', 'text-zinc-500');
                rBtn.classList.remove('active-btn'); rBtn.classList.add('bg-zinc-800', 'text-zinc-500');
            }
        }
    </script>
</body>
</html>
