<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMTEA HUB | 全球商用情报终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #eee; font-family: 'Inter', sans-serif; }
        .premium-glow { border: 1px solid rgba(249, 115, 22, 0.2); box-shadow: 0 0 20px rgba(249, 115, 22, 0.05); }
        .data-dot { height: 8px; width: 8px; background: #f97316; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-black">

    <nav class="border-b border-white/5 p-5 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur">
        <div class="font-black text-xl tracking-tighter text-orange-500">YMTEA HUB <span class="text-white text-xs opacity-50">PRO</span></div>
        <div id="authStatus" class="text-xs font-mono text-gray-500">GUEST_MODE</div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 space-y-12">
        <section class="bg-zinc-900/50 p-8 rounded-3xl border border-white/5">
            <div class="flex items-center gap-3 mb-6">
                <span class="data-dot"></span>
                <h2 class="text-lg font-bold">实时全球贸易雷达 (公开)</h2>
            </div>
            <div id="trendList" class="space-y-4">
                <div class="animate-pulse text-gray-700">正在接入全球数据流...</div>
            </div>
        </section>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="premium-glow p-8 rounded-3xl bg-zinc-900/30">
                <h3 class="text-xl font-bold mb-4">核心情报深度拆解</h3>
                <p class="text-sm text-gray-500 mb-6">内含各行业套利机会、海关封号预警及选品逻辑。</p>
                <div class="space-y-3">
                    <button onclick="accessContent('report_2026_tea')" class="w-full text-left p-4 rounded-xl bg-white/5 hover:bg-white/10 flex justify-between items-center">
                        <span>2026 东南亚贸易白皮书</span>
                        <span class="text-xs text-orange-500">VIP</span>
                    </button>
                    <button onclick="accessContent('report_tiktok_ads')" class="w-full text-left p-4 rounded-xl bg-white/5 hover:bg-white/10 flex justify-between items-center">
                        <span>TikTok 高转化投放参数库</span>
                        <span class="text-xs text-orange-500">VIP</span>
                    </button>
                </div>
            </div>

            <div class="premium-glow p-8 rounded-3xl bg-zinc-900/30">
                <h3 class="text-xl font-bold mb-4">生产力工具 & 模板</h3>
                <p class="text-sm text-gray-500 mb-6">直接下载即可使用的自动化脚本与营销物料。</p>
                <div class="space-y-3">
                    <button onclick="accessContent('tool_scraper_v1')" class="w-full text-left p-4 rounded-xl bg-white/5 hover:bg-white/10 flex justify-between items-center">
                        <span>万能外贸客户抓取脚本 (Python)</span>
                        <span class="text-xs text-orange-500">VIP</span>
                    </button>
                    <button onclick="accessContent('template_email_cold')" class="w-full text-left p-4 rounded-xl bg-white/5 hover:bg-white/10 flex justify-between items-center">
                        <span>高回复率开发信模版 (12系)</span>
                        <span class="text-xs text-orange-500">VIP</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="payModal" class="fixed inset-0 bg-black/95 hidden items-center justify-center z-[100] p-6">
        <div class="max-w-md w-full text-center space-y-6">
            <div class="text-5xl">🔒</div>
            <h2 class="text-2xl font-bold">该内容仅限专业订阅者</h2>
            <p class="text-gray-400">加入 YMTEA HUB，获取每日更新的行业情报与生产力工具。</p>
            <div class="bg-zinc-900 p-6 rounded-2xl border border-orange-500/30">
                <div class="text-sm text-gray-500">年度专业版</div>
                <div class="text-3xl font-black my-2">$199 <span class="text-sm font-normal text-gray-600">/ 年</span></div>
                <ul class="text-left text-xs text-gray-400 space-y-2 my-4">
                    <li>✓ 每日实时贸易雷达推送</li>
                    <li>✓ 核心情报库永久访问权限</li>
                    <li>✓ 生产力工具集全量下载</li>
                </ul>
                <button onclick="alert('支付对接即将上线...')" class="w-full py-4 bg-orange-600 rounded-xl font-bold hover:bg-orange-500">立即解锁专业权限</button>
            </div>
            <button onclick="closePayModal()" class="text-gray-600 text-sm">稍后再说</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://tea.asasasxzc.workers.dev";

        // 加载公开趋势数据
        async function loadTrends() {
            try {
                const res = await fetch(`${API_BASE}/api/public/trends`);
                const data = await res.json();
                const container = document.getElementById('trendList');
                container.innerHTML = data.map(item => `
                    <div class="flex justify-between items-center border-b border-white/5 pb-3">
                        <div>
                            <div class="text-sm font-bold text-gray-200">${item.title}</div>
                            <div class="text-xs text-gray-500">${item.summary}</div>
                        </div>
                        <div class="text-[10px] font-mono text-gray-600">${new Date(item.update_time).toLocaleDateString()}</div>
                    </div>
                `).join('');
            } catch (e) { console.error("数据加载失败"); }
        }

        // 访问内容鉴权
        async function accessContent(key) {
            const token = localStorage.getItem('ymtea_token');
            const res = await fetch(`${API_BASE}/api/fetch/${key}`, {
                headers: { 'Authorization': token }
            });
            
            if (res.status === 403) {
                document.getElementById('payModal').style.display = 'flex';
            } else {
                const result = await res.json();
                alert("内容已解锁：\n" + result.data);
            }
        }

        function closePayModal() { document.getElementById('payModal').style.display = 'none'; }

        window.onload = () => {
            loadTrends();
            if(localStorage.getItem('ymtea_token')) document.getElementById('authStatus').innerText = "PRO_SUBSCRIBER";
        };
    </script>
</body>
</html>
