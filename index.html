<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 商业情报</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 80px; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-blur: 10px; }
        .gold-text { background: linear-gradient(135deg, #fb923c, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        /* 强制显示的底部导航 */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: rgba(10,10,10,0.98); border-top: 1px solid rgba(255,255,255,0.1); display: flex; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; items-center; justify-content: center; font-size: 10px; font-weight: 900; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item.active { color: #f97316; }
        #readerBody img { max-width: 100%; height: auto; border-radius: 12px; margin: 20px 0; }
        .modal-active { overflow: hidden; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 w-full border-b border-white/5 bg-black/80 backdrop-blur-md">
        <div class="max-w-5xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter" ondblclick="toggleAdmin()">
                <span class="gold-text">YMTEA</span> <span class="text-white">HUB</span>
            </div>
            <div id="statusLabel" class="text-[10px] font-mono px-2 py-1 rounded bg-zinc-900 text-zinc-500 border border-white/10">UNAUTHORIZED</div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-6 space-y-6">
        <section id="intel-section" class="glass p-6 rounded-[2rem] min-h-[400px]">
            <h3 class="font-black text-lg mb-4 flex items-center gap-2"><span class="w-1.5 h-5 bg-orange-600 rounded-full"></span> 核心情报</h3>
            <div id="topSection" class="hidden mb-4 space-y-2">
                <div id="topList" class="space-y-2"></div>
                <div class="h-px bg-white/5 my-4"></div>
            </div>
            <div id="reportList" class="space-y-3"></div>
            <div id="reportPagination" class="flex justify-center gap-2 mt-8"></div>
        </section>

        <section id="tool-section" class="glass p-6 rounded-[2rem] min-h-[400px]">
            <h3 class="font-black text-lg mb-4 flex items-center gap-2"><span class="w-1.5 h-5 bg-orange-600 rounded-full"></span> 生产力工具</h3>
            <div id="toolList" class="space-y-3"></div>
            <div id="toolPagination" class="flex justify-center gap-2 mt-8"></div>
        </section>
    </main>

    <div class="bottom-bar">
        <div class="nav-item active" onclick="scrollToSection('intel-section')">情报</div>
        <div class="nav-item" onclick="scrollToSection('tool-section')">工具</div>
        <div class="nav-item" onclick="showPayModal()">升级</div>
    </div>

    <div id="adminPanel" class="fixed inset-0 z-[110] hidden bg-black/95 items-center justify-center p-4">
        <div class="bg-zinc-900 border border-white/10 p-6 rounded-[2rem] w-full max-w-md">
            <div class="flex justify-between items-center mb-6 text-white font-black text-xs">
                <span>ADMIN CONSOLE</span>
                <button onclick="toggleAdmin()">✕</button>
            </div>
            <div class="space-y-4">
                <input type="password" id="adminPass" placeholder="管理员口令" class="w-full bg-black border border-white/10 p-3 rounded-xl text-sm text-white outline-none focus:border-orange-500">
                <div class="flex gap-2">
                    <button onclick="setCategory('report')" id="cat_report" class="flex-1 py-2 rounded-lg text-xs font-bold bg-orange-600 text-white">情报</button>
                    <button onclick="setCategory('tool')" id="cat_tool" class="flex-1 py-2 rounded-lg text-xs font-bold bg-zinc-800 text-zinc-500">工具</button>
                </div>
                <input type="text" id="quickTitle" placeholder="输入标题" class="w-full bg-black border border-white/10 p-3 rounded-xl text-sm text-white">
                <textarea id="quickContent" rows="4" placeholder="支持 HTML 内容..." class="w-full bg-black border border-white/10 p-3 rounded-xl text-sm text-white"></textarea>
                <label class="flex items-center gap-2 text-xs text-zinc-400">
                    <input type="checkbox" id="isTopCheck" class="accent-orange-600"> 置顶展示
                </label>
                <button onclick="quickPublish()" class="w-full py-3 bg-orange-600 rounded-xl font-bold text-white">立即同步</button>
                <div class="pt-4 border-t border-white/5 space-y-2">
                    <div class="flex gap-2">
                        <button onclick="generateCode('monthly')" class="flex-1 py-2 bg-zinc-800 rounded-lg text-[10px] text-zinc-400">月码</button>
                        <button onclick="generateCode('yearly')" class="flex-1 py-2 bg-zinc-800 rounded-lg text-[10px] text-zinc-400">年码</button>
                    </div>
                    <input type="text" id="codeOutput" readonly class="w-full bg-white/5 border border-white/10 p-2 rounded text-center text-orange-500 font-mono text-sm" placeholder="生成的激活码">
                </div>
            </div>
        </div>
    </div>

    <div id="contentReader" class="fixed inset-0 z-[120] hidden bg-black items-center justify-center">
        <div class="bg-zinc-900 w-full h-full md:max-w-3xl md:h-[90vh] md:rounded-[2rem] flex flex-col overflow-hidden">
            <div class="p-5 border-b border-white/5 flex justify-between items-center bg-zinc-900">
                <span class="text-orange-500 font-bold text-sm">YMTEA CONTENT</span>
                <button onclick="closeReader()" class="text-white px-4">关闭</button>
            </div>
            <div id="readerBody" class="flex-grow overflow-y-auto p-6 md:p-10 text-zinc-300 custom-scroll select-text"></div>
        </div>
    </div>

    <div id="payModal" class="fixed inset-0 z-[130] hidden bg-black/98 items-center justify-center p-4">
        <div class="max-w-sm w-full text-center">
            <h2 class="text-2xl font-black text-white mb-2 uppercase">Access Restricted</h2>
            <p class="text-zinc-500 text-[11px] mb-8 uppercase tracking-widest">请输入激活码以继续阅读</p>
            <div class="space-y-3 mb-6">
                <input type="email" id="activeEmail" placeholder="您的邮箱" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-2xl text-white outline-none">
                <input type="text" id="activeCode" placeholder="激活码" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-2xl text-white outline-none">
            </div>
            <button onclick="doActivate()" class="w-full py-4 bg-orange-600 rounded-2xl text-white font-black uppercase shadow-lg">立即激活</button>
            <button onclick="closeModal('payModal')" class="mt-6 text-zinc-600 text-xs uppercase font-bold">暂不激活</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://s1.ymtea.club";
        let currentCategory = 'report';
        let fullData = { reports: [], tools: [] };
        let editTargetId = null;

        // 加载内容
        async function loadData() {
            try {
                const res = await fetch(`${API_BASE}/api/reports/list`);
                const data = await res.json();
                fullData.reports = data.filter(i => i.category !== 'tool');
                fullData.tools = data.filter(i => i.category === 'tool');
                renderReports(1);
                renderTools(1);
            } catch (e) {
                console.error("加载失败", e);
            }
        }

        function renderPagination(targetId, total, size, current, func) {
            const pages = Math.ceil(total / size);
            const container = document.getElementById(targetId);
            if (pages <= 1) { container.innerHTML = ''; return; }
            let html = '';
            for (let i = 1; i <= pages; i++) {
                html += `<button onclick="${func}(${i})" class="w-8 h-8 rounded-lg text-[10px] font-bold ${i === current ? 'bg-orange-600 text-white' : 'bg-white/5 text-zinc-500'}">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function renderReports(page) {
            const size = 10;
            const tops = fullData.reports.filter(r => r.is_top == 1);
            const normals = fullData.reports.filter(r => r.is_top != 1);
            const paged = normals.slice((page-1)*size, page*size);

            if (tops.length > 0 && page === 1) {
                document.getElementById('topSection').classList.remove('hidden');
                document.getElementById('topList').innerHTML = tops.map(r => `
                    <div class="flex justify-between items-center p-4 bg-orange-600/5 border border-orange-500/20 rounded-xl">
                        <div onclick="openItem(${r.id})" class="flex-grow cursor-pointer font-bold text-white text-sm">
                            <span class="text-orange-500 mr-2">[置顶]</span>${r.title}
                        </div>
                        <button onclick="editItem(${r.id}, 'report')" class="text-[10px] text-zinc-600">编辑</button>
                    </div>
                `).join('');
            }

            document.getElementById('reportList').innerHTML = paged.map(r => `
                <div class="flex justify-between items-center p-4 glass rounded-xl border border-white/5">
                    <div onclick="openItem(${r.id})" class="flex-grow cursor-pointer text-zinc-200 text-sm">${r.title}</div>
                    <button onclick="editItem(${r.id}, 'report')" class="text-[10px] text-zinc-700">编辑</button>
                </div>
            `).join('') || '<p class="text-center text-zinc-700 py-10">暂无情报</p>';
            
            renderPagination('reportPagination', normals.length, size, page, 'renderReports');
        }

        function renderTools(page) {
            const size = 6;
            const paged = fullData.tools.slice((page-1)*size, page*size);
            document.getElementById('toolList').innerHTML = paged.map(r => `
                <div class="flex items-center gap-4 p-4 glass rounded-xl">
                    <div onclick="openItem(${r.id})" class="w-10 h-10 bg-zinc-900 rounded-lg flex items-center justify-center text-orange-600 cursor-pointer">⚡</div>
                    <div onclick="openItem(${r.id})" class="flex-grow cursor-pointer text-sm font-bold">${r.title}</div>
                    <button onclick="editItem(${r.id}, 'tool')" class="text-[10px] text-zinc-700">编辑</button>
                </div>
            `).join('');
            renderPagination('toolPagination', fullData.tools.length, size, page, 'renderTools');
        }

        async function openItem(id) {
            const token = localStorage.getItem('ymtea_token');
            if (!token) return showPayModal();
            try {
                const res = await fetch(`${API_BASE}/api/reports/view/${id}`, { headers: { 'Authorization': token } });
                if (res.status === 403) { localStorage.removeItem('ymtea_token'); return showPayModal(); }
                const result = await res.json();
                document.getElementById('readerBody').innerHTML = result.data;
                document.getElementById('contentReader').classList.replace('hidden', 'flex');
                document.body.classList.add('modal-active');
            } catch (e) { alert("获取内容失败"); }
        }

        // 管理端：同步功能修复
        async function quickPublish() {
            const pass = document.getElementById('adminPass').value;
            const title = document.getElementById('quickTitle').value;
            const content = document.getElementById('quickContent').value;
            const isTop = document.getElementById('isTopCheck').checked ? 1 : 0;
            
            if (!pass) return alert("请输入管理员口令");

            let sql = editTargetId 
                ? `UPDATE reports SET title='${title.replace(/'/g, "''")}', content='${content.replace(/'/g, "''")}', category='${currentCategory}', is_top=${isTop} WHERE id=${editTargetId};`
                : `INSERT INTO reports (title, content, category, is_top) VALUES ('${title.replace(/'/g, "''")}', '${content.replace(/'/g, "''")}', '${currentCategory}', ${isTop});`;

            try {
                const res = await fetch(`${API_BASE}/api/admin/publish`, {
                    method: 'POST',
                    headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql })
                });
                if (res.ok) { alert("操作成功！"); location.reload(); }
                else { alert("口令错误或后端异常"); }
            } catch (e) { alert("网络错误"); }
        }

        // 管理端：生成激活码修复
        async function generateCode(type) {
            const pass = document.getElementById('adminPass').value;
            if (!pass) return alert("请先输入口令");
            const code = `YMTEA-${Math.random().toString(36).substring(7).toUpperCase()}`;
            const sql = `INSERT INTO active_codes (code, type, is_used) VALUES ('${code}', '${type}', 0);`;
            try {
                const res = await fetch(`${API_BASE}/api/admin/publish`, {
                    method: 'POST',
                    headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql })
                });
                if (res.ok) document.getElementById('codeOutput').value = code;
                else alert("生成失败，请检查口令");
            } catch (e) { alert("网络错误"); }
        }

        function editItem(id, cat) {
            const item = (cat === 'tool' ? fullData.tools : fullData.reports).find(i => i.id === id);
            editTargetId = id;
            setCategory(cat);
            document.getElementById('quickTitle').value = item.title;
            document.getElementById('isTopCheck').checked = item.is_top == 1;
            toggleAdmin();
        }

        async function doActivate() {
            const email = document.getElementById('activeEmail').value;
            const code = document.getElementById('activeCode').value;
            if (!email || !code) return alert("请完整填写");
            const res = await fetch(`${API_BASE}/api/pay/success`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, type: 'manual', code })
            });
            const data = await res.json();
            if (data.success) { localStorage.setItem('ymtea_token', data.token); location.reload(); }
            else alert(data.msg || "码无效");
        }

        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); document.getElementById('adminPanel').classList.toggle('flex'); }
        function setCategory(cat) { currentCategory = cat; }
        function showPayModal() { document.getElementById('payModal').classList.replace('hidden', 'flex'); }
        function closeModal(id) { document.getElementById(id).classList.replace('flex', 'hidden'); }
        function closeReader() { document.getElementById('contentReader').classList.replace('flex', 'hidden'); document.body.classList.remove('modal-active'); }
        function scrollToSection(id) { document.getElementById(id).scrollIntoView({behavior: 'smooth'}); }

        window.onload = () => {
            loadData();
            if (localStorage.getItem('ymtea_token')) {
                document.getElementById('statusLabel').innerText = "PRO_ACCESS";
                document.getElementById('statusLabel').classList.replace('text-zinc-500', 'text-orange-500');
            }
        };
    </script>
</body>
</html>
