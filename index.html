<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 商业情报终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 80px; }
        .glass { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-text { background: linear-gradient(135deg, #fb923c, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .modal-active { overflow: hidden; height: 100vh; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        #readerBody img { max-width: 100%; height: auto; border-radius: 1rem; margin: 1.5rem 0; display: block; }
        #readerBody p { margin-bottom: 1.2rem; line-height: 1.8; }
        /* 移动端底部固定导航 */
        .mobile-bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: rgba(10,10,10,0.95); backdrop-blur: 20px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 40; display: flex; align-items: center; justify-content: space-around; }
        @media (min-width: 769px) { .mobile-bottom-nav { display: none; } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-50 w-full border-b border-white/10 bg-black/90 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter cursor-pointer" ondblclick="toggleAdmin()">
                <span class="gold-text">YMTEA</span> <span class="text-white">HUB</span>
            </div>
            <div id="statusLabel" class="text-[9px] font-mono px-2 py-1 rounded bg-zinc-800 text-zinc-400 border border-white/10 uppercase">GUEST_MODE</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-8 fade-in">
        <div class="glass rounded-[2rem] p-6">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xs font-bold text-orange-500 flex items-center gap-2 uppercase tracking-widest">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-500 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-orange-600"></span></span>
                    Live Insights
                </h2>
                <button onclick="refreshRadar()" class="text-[10px] text-zinc-500 font-bold hover:text-white transition">SYNC</button>
            </div>
            <div id="trendList" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div id="report-container" class="glass p-6 md:p-8 rounded-[2.5rem] flex flex-col min-h-[500px]">
                <h3 class="font-bold text-xl mb-6 text-white flex items-center gap-2"><span class="w-1.5 h-6 bg-orange-600 rounded-full"></span> 核心情报</h3>
                
                <div id="topSection" class="mb-6 space-y-3 hidden">
                    <div id="topList" class="space-y-3"></div>
                    <div class="border-b border-white/5 pt-4"></div>
                </div>

                <div id="reportList" class="flex-grow space-y-3"></div>
                <div id="reportPagination" class="flex justify-center items-center gap-2 mt-8 pt-6 border-t border-white/5"></div>
            </div>
            
            <div id="tool-container" class="glass p-6 md:p-8 rounded-[2.5rem] flex flex-col min-h-[500px]">
                <h3 class="font-bold text-xl mb-6 text-white flex items-center gap-2"><span class="w-1.5 h-6 bg-orange-600 rounded-full"></span> 生产力工具</h3>
                <div id="toolList" class="flex-grow space-y-3"></div>
                <div id="toolPagination" class="flex justify-center items-center gap-2 mt-8 pt-6 border-t border-white/5"></div>
                <button onclick="showPayModal()" id="proBtn" class="mt-8 w-full py-4 bg-orange-600 rounded-2xl text-[11px] font-black uppercase text-white hover:bg-orange-500 transition-all">Unlock Full Access</button>
            </div>
        </div>
    </main>

    <div class="mobile-bottom-nav">
        <button onclick="scrollToId('report-container')" class="text-[10px] font-black text-orange-500 uppercase">Intel</button>
        <button onclick="scrollToId('tool-container')" class="text-[10px] font-black text-zinc-500 uppercase">Tools</button>
    </div>

    <div id="adminPanel" class="fixed inset-0 z-50 hidden bg-black/95 items-center justify-center p-4 backdrop-blur-xl">
        <div class="bg-zinc-900 border border-white/10 p-8 rounded-[3rem] w-full max-w-md shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <span id="adminTitle" class="text-white font-black text-xs tracking-widest uppercase">Console Terminal</span>
                <button onclick="toggleAdmin()" class="text-zinc-500 hover:text-white">✕</button>
            </div>
            <div class="space-y-4">
                <input type="password" id="adminPass" placeholder="Admin Secret Key" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white focus:border-orange-500 outline-none">
                <div class="flex gap-2">
                    <button onclick="setCategory('report')" id="cat_report" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white">INTEL</button>
                    <button onclick="setCategory('tool')" id="cat_tool" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500">TOOL</button>
                </div>
                <input type="text" id="quickTitle" placeholder="Entry Title" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white">
                <textarea id="quickContent" rows="4" placeholder="Body Content (HTML Allowed)" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white"></textarea>
                
                <div class="flex items-center gap-2 px-2">
                    <input type="checkbox" id="isTopCheck" class="w-4 h-4 accent-orange-600">
                    <label for="isTopCheck" class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Pin to Top / 置顶展示</label>
                </div>

                <button onclick="quickPublish()" class="w-full py-4 bg-orange-700 hover:bg-orange-600 rounded-2xl font-black text-xs text-white uppercase transition-colors">Sync Database</button>
                
                <div class="pt-4 border-t border-white/5">
                    <div class="flex gap-2 mb-2">
                        <button onclick="generateTestCode('monthly')" class="flex-1 py-2 bg-zinc-800 rounded-xl text-[9px] text-zinc-400 font-bold">GEN MONTHLY</button>
                        <button onclick="generateTestCode('yearly')" class="flex-1 py-2 bg-zinc-800 rounded-xl text-[9px] text-zinc-400 font-bold">GEN YEARLY</button>
                    </div>
                    <input type="text" id="codeOutput" readonly class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-center text-orange-500 font-mono text-sm" placeholder="Generated Code">
                </div>
            </div>
        </div>
    </div>

    <div id="contentReader" class="fixed inset-0 z-[60] hidden bg-black items-center justify-center md:p-6">
        <div class="bg-zinc-900 w-full h-full md:max-w-4xl md:h-[85vh] md:rounded-[3rem] flex flex-col border border-white/10 overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h2 id="readerTitle" class="font-black text-sm uppercase text-orange-500 truncate">Detail</h2>
                <button onclick="closeReader()" class="text-white p-2">✕</button>
            </div>
            <div id="readerBody" class="flex-grow overflow-y-auto p-8 md:p-12 text-zinc-200 leading-relaxed select-text text-sm md:text-base custom-scroll"></div>
        </div>
    </div>

    <div id="payModal" class="fixed inset-0 z-50 hidden bg-black/95 items-center justify-center p-4 backdrop-blur-md">
        <div class="max-w-xl w-full text-center">
            <h2 class="text-3xl font-black text-white uppercase tracking-tighter mb-4">Verification Required</h2>
            <p class="text-zinc-500 text-xs mb-8">此内容受保护，请输入有效的激活码或联系客服</p>
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-6 rounded-[2rem] cursor-pointer hover:border-orange-500 transition" onclick="startPay('monthly')">
                    <div class="text-2xl font-black text-white">¥78</div><div class="text-[9px] mt-2 text-zinc-500 uppercase">30 Days Access</div>
                </div>
                <div class="border-2 border-orange-600 p-6 rounded-[2rem] cursor-pointer hover:bg-orange-600/10 transition" onclick="startPay('yearly')">
                    <div class="text-2xl font-black text-orange-500">¥730</div><div class="text-[9px] mt-2 text-orange-400 uppercase">365 Days Elite</div>
                </div>
            </div>
            <button onclick="closeModal('payModal')" class="mt-8 text-zinc-600 text-[10px] font-black uppercase">Close Window</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://s1.ymtea.club";
        let currentCategory = 'report';
        let fullData = { reports: [], tools: [] };
        let editTargetId = null;

        // 加载内容逻辑
        async function loadContent() {
            try {
                const res = await fetch(`${API_BASE}/api/reports/list`);
                const data = await res.json();
                fullData.reports = data.filter(i => i.category !== 'tool');
                fullData.tools = data.filter(i => i.category === 'tool');
                renderReportPage(1);
                renderToolPage(1);
            } catch (e) { 
                console.error("Fetch Error:", e);
                document.getElementById('reportList').innerHTML = '<p class="text-red-500 text-xs text-center py-10">NETWORK ERROR</p>';
            }
        }

        // 分页渲染逻辑：确保容器始终渲染
        function renderPagination(targetId, total, size, current, funcName) {
            const pages = Math.ceil(total / size);
            const container = document.getElementById(targetId);
            if (!container) return;
            
            if (pages <= 1) { 
                container.innerHTML = `<span class="text-zinc-800 text-[9px] font-mono tracking-widest uppercase">End of Directory</span>`; 
                return; 
            }

            let html = '';
            for (let i = 1; i <= pages; i++) {
                html += `<button onclick="${funcName}(${i})" class="w-8 h-8 rounded-lg text-[10px] font-mono font-black transition-all ${i === current ? 'bg-orange-600 text-white shadow-lg scale-110' : 'bg-white/5 text-zinc-600 hover:text-white'}">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function renderReportPage(page) {
            const size = 10;
            const container = document.getElementById('reportList');
            const topListContainer = document.getElementById('topList');
            const topSection = document.getElementById('topSection');

            const topData = fullData.reports.filter(r => r.is_top == 1);
            const normalData = fullData.reports.filter(r => r.is_top != 1);
            const pageData = normalData.slice((page-1)*size, page*size);

            // 置顶渲染
            if (topData.length > 0 && page === 1) {
                topSection.classList.remove('hidden');
                topListContainer.innerHTML = topData.map(r => `
                    <div class="flex justify-between items-center p-5 bg-orange-600/5 rounded-2xl border border-orange-500/20 relative group">
                        <div class="absolute top-0 left-0 w-1 h-full bg-orange-600 rounded-l-2xl"></div>
                        <div onclick="openReport(${r.id})" class="flex-grow cursor-pointer pl-3">
                            <div class="flex items-center gap-2">
                                <span class="text-[13px] text-white font-bold group-hover:text-orange-400 transition-colors">${r.title}</span>
                                <span class="text-[8px] bg-orange-600 text-white px-1.5 py-0.5 rounded font-black tracking-tighter">PIN</span>
                            </div>
                        </div>
                        <button onclick="handleEdit(${r.id}, 'report')" class="text-[9px] text-zinc-600 hover:text-white">EDIT</button>
                    </div>
                `).join('');
            } else if (page === 1) {
                topSection.classList.add('hidden');
            }

            container.innerHTML = pageData.map(r => `
                <div class="flex justify-between items-center p-5 glass rounded-2xl border border-white/5 hover:border-orange-500/30 group transition-all">
                    <div onclick="openReport(${r.id})" class="flex-grow cursor-pointer">
                        <span class="text-[13px] text-zinc-200 group-hover:text-orange-400 transition-colors">${r.title}</span>
                        <div class="text-[9px] text-zinc-600 mt-1 uppercase font-mono">${new Date(r.created_at).toLocaleDateString()}</div>
                    </div>
                    <button onclick="handleEdit(${r.id}, 'report')" class="text-[9px] text-zinc-800 hover:text-zinc-400 transition-colors uppercase">Edit</button>
                </div>
            `).join('') || '<p class="text-zinc-800 text-xs text-center py-10 uppercase tracking-widest">Vault Empty</p>';
            
            renderPagination('reportPagination', normalData.length, size, page, 'renderReportPage');
        }

        function renderToolPage(page) {
            const size = 6;
            const container = document.getElementById('toolList');
            const pageData = fullData.tools.slice((page-1)*size, page*size);
            
            container.innerHTML = pageData.map(r => `
                <div class="flex items-center gap-4 p-5 glass rounded-2xl border border-white/5 hover:bg-white/10 transition-all group">
                    <div onclick="openReport(${r.id})" class="w-12 h-12 rounded-2xl bg-zinc-900 border border-white/10 flex items-center justify-center text-orange-600 group-hover:bg-orange-600 group-hover:text-white transition-all cursor-pointer shadow-xl">⚡</div>
                    <div onclick="openReport(${r.id})" class="flex-grow cursor-pointer">
                        <div class="text-[13px] text-zinc-100 font-bold group-hover:text-orange-400">${r.title}</div>
                        <div class="text-[9px] text-zinc-600 uppercase tracking-tighter mt-0.5">Premium Productivity Tool</div>
                    </div>
                    <button onclick="handleEdit(${r.id}, 'tool')" class="text-[9px] text-zinc-800 uppercase font-black">Edit</button>
                </div>
            `).join('');
            
            renderPagination('toolPagination', fullData.tools.length, size, page, 'renderToolPage');
        }

        // 核心修复：授权有效时正确读取并使用 innerHTML
        async function openReport(id) {
            const token = localStorage.getItem('ymtea_token');
            if (!token) return showPayModal();
            try {
                const res = await fetch(`${API_BASE}/api/reports/view/${id}`, { 
                    headers: { 'Authorization': token } 
                });
                
                if (res.status === 403) {
                    localStorage.removeItem('ymtea_token'); // 清除失效 token
                    return showPayModal();
                }

                const result = await res.json();
                document.getElementById('readerTitle').innerText = "PROTECTED_INTEL";
                document.getElementById('readerBody').innerHTML = result.data;
                document.getElementById('contentReader').classList.replace('hidden', 'flex');
                document.body.classList.add('modal-active');
            } catch (e) { 
                alert("无法连接到情报服务器，请检查网络"); 
            }
        }

        // 核心修复：管理员同步逻辑
        async function quickPublish() {
            const pass = document.getElementById('adminPass').value;
            const title = document.getElementById('quickTitle').value;
            const content = document.getElementById('quickContent').value;
            const isTop = document.getElementById('isTopCheck').checked ? 1 : 0;

            if(!pass) return alert("口令错误：请输入管理员密钥");
            if(!title || !content) return alert("错误：标题和内容不能为空");

            // 格式化 SQL，处理单引号转义
            let safeTitle = title.replace(/'/g, "''");
            let safeContent = content.replace(/'/g, "''");

            let sql = editTargetId 
                ? `UPDATE reports SET title='${safeTitle}', content='${safeContent}', category='${currentCategory}', is_top=${isTop} WHERE id=${editTargetId};`
                : `INSERT INTO reports (title, content, category, is_top) VALUES ('${safeTitle}', '${safeContent}', '${currentCategory}', ${isTop});`;
            
            try {
                const res = await fetch(`${API_BASE}/api/admin/publish`, { 
                    method: 'POST', 
                    headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ sql }) 
                });
                
                if (res.ok) { 
                    alert("同步成功！数据库已更新。"); 
                    location.reload(); 
                } else {
                    const err = await res.text();
                    alert("同步失败：口令错误或后端数据库拒绝请求。\n" + err);
                }
            } catch(e) {
                alert("同步失败：无法连接到后端接口。");
            }
        }

        async function handleEdit(id, cat) {
            const item = (cat === 'tool' ? fullData.tools : fullData.reports).find(i => i.id === id);
            editTargetId = id;
            setCategory(cat);
            document.getElementById('quickTitle').value = item.title;
            document.getElementById('isTopCheck').checked = item.is_top == 1;
            document.getElementById('adminTitle').innerText = "UPDATING ENTRY ID: " + id;
            toggleAdmin();
        }

        function refreshRadar() {
            const trendList = document.getElementById('trendList');
            const data = [
                {t:"Global Shipping Rate", s:"-4.2%"}, {t:"US Customs Alert", s:"HIGH"}, {t:"TikTok Shop Policy", s:"UPDATED"}
            ];
            trendList.innerHTML = data.map(i => `
                <div class="p-4 bg-white/5 rounded-2xl border border-white/5 flex justify-between items-center">
                    <span class="text-[11px] text-zinc-300 font-bold">${i.t}</span>
                    <span class="text-[9px] text-orange-500 font-mono font-black">${i.s}</span>
                </div>
            `).join('');
        }

        async function generateTestCode(type) {
            const pass = document.getElementById('adminPass').value;
            const code = `CODE-${Math.random().toString(36).substring(7).toUpperCase()}`;
            const sql = `INSERT INTO active_codes (code, type, is_used) VALUES ('${code}', '${type}', 0);`;
            const res = await fetch(`${API_BASE}/api/admin/publish`, { method: 'POST', headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' }, body: JSON.stringify({ sql }) });
            if(res.ok) document.getElementById('codeOutput').value = code;
        }

        async function startPay(type) {
            const email = prompt("授权 Email:");
            const code = prompt("激活码 Code:");
            if(!email || !code) return;
            const res = await fetch(`${API_BASE}/api/pay/success`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, type, code }) });
            const data = await res.json();
            if (data.success) { 
                localStorage.setItem('ymtea_token', data.token); 
                location.reload(); 
            } else {
                alert(data.msg || "激活失败：激活码无效");
            }
        }

        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); document.getElementById('adminPanel').classList.toggle('flex'); }
        function setCategory(cat) { 
            currentCategory = cat; 
            document.getElementById('cat_report').className = cat === 'report' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500';
            document.getElementById('cat_tool').className = cat === 'tool' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500';
        }
        function showPayModal() { document.getElementById('payModal').classList.replace('hidden', 'flex'); }
        function closeModal(id) { document.getElementById(id).classList.replace('flex', 'hidden'); }
        function closeReader() { document.getElementById('contentReader').classList.replace('flex', 'hidden'); document.body.classList.remove('modal-active'); }
        function scrollToId(id) { document.getElementById(id).scrollIntoView({behavior:'smooth'}); }

        window.onload = () => {
            refreshRadar();
            loadContent();
            const token = localStorage.getItem('ymtea_token');
            if(token) {
                const label = document.getElementById('statusLabel');
                label.innerText = "PRO_SUBSCRIPTION";
                label.className = "text-[9px] font-mono px-2 py-1 rounded bg-orange-500/10 text-orange-500 border border-orange-500/20";
                if(document.getElementById('proBtn')) document.getElementById('proBtn').style.display = 'none';
            }
        };
    </script>
</body>
</html>
