<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 商业情报终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 160px; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .gold-text { background: linear-gradient(135deg, #fb923c, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 侧边客服 */
        .side-contact { position: fixed; right: 20px; bottom: 180px; z-index: 100; transition: 0.3s; }
        .side-contact:hover { transform: scale(1.1) rotate(-5deg); }
        .contact-ball { width: 52px; height: 52px; background: #f97316; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(249,115,22,0.4); cursor: pointer; border: 2px solid rgba(255,255,255,0.2); }

        /* 底部导航与定价 */
        .bottom-fixed { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; }
        .pricing-bar { background: rgba(15,15,15,0.9); border-top: 1px solid rgba(255,255,255,0.05); padding: 8px 20px; display: flex; justify-content: center; gap: 40px; backdrop-filter: blur(10px); }
        .bottom-nav { height: 75px; background: #000; border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-around; }

        .item-row { transition: 0.2s ease; border: 1px solid rgba(255,255,255,0.05); }
        .item-row:hover { background: rgba(255,255,255,0.06); border-color: rgba(249,115,22,0.3); }

        #readerBody code { background: #000; border: 1px solid #333; padding: 1rem; border-radius: 10px; display: block; font-family: monospace; margin: 1rem 0; color: #f97316; overflow-x: auto; }
        .custom-scroll::-webkit-scrollbar { width: 2px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

    <div class="side-contact" onclick="copyContact()">
        <div class="contact-ball">
            <span class="text-white text-[10px] font-black uppercase tracking-tighter leading-none">Connect</span>
            <span class="text-white text-[8px] opacity-80 mt-1">客服</span>
        </div>
    </div>

    <nav class="sticky top-0 z-[150] w-full border-b border-white/10 bg-black/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter cursor-pointer" ondblclick="toggleAdmin()">
                <span class="gold-text">YMTEA</span> <span class="text-white">HUB</span>
            </div>
            <div id="statusLabel" class="text-[9px] font-mono px-2 py-1 rounded bg-zinc-900 text-zinc-500 border border-white/10">AUTH_REQUIRED</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-10">
        <header class="text-center py-6">
            <h1 class="text-4xl md:text-6xl font-black text-white italic uppercase tracking-tighter">Global <span class="gold-text">Insight</span> Terminal</h1>
            <p class="text-zinc-600 text-[10px] mt-4 tracking-[0.5em] uppercase">加密商业情报分发终端</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section id="section-intel" class="glass p-6 md:p-8 rounded-[2.5rem] flex flex-col min-h-[500px]">
                <h2 class="font-black text-white mb-6 flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-orange-600"></span> 核心情报库</h2>
                <div id="reportList" class="flex-grow space-y-3"></div>
                <div id="reportPagination" class="flex justify-center gap-1 mt-6"></div>
            </section>

            <section id="section-tools" class="glass p-6 md:p-8 rounded-[2.5rem] flex flex-col min-h-[500px]">
                <h2 class="font-black text-white mb-6 flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-blue-600"></span> 生产力工具集</h2>
                <div id="toolList" class="flex-grow space-y-3"></div>
                <div id="toolPagination" class="flex justify-center gap-1 mt-6"></div>
            </section>
        </div>
    </main>

    <div class="bottom-fixed">
        <div class="pricing-bar">
            <div class="flex items-center gap-2">
                <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Free Plan</span>
                <span class="text-[10px] font-black text-white">￥0 <span class="text-[8px] font-normal text-zinc-600">/ 仅限公开预览</span></span>
            </div>
            <div class="h-3 w-[1px] bg-white/10"></div>
            <div class="flex items-center gap-2">
                <span class="text-[9px] font-bold text-orange-500 uppercase tracking-widest">Pro Monthly</span>
                <span class="text-[10px] font-black text-orange-500">￥199 <span class="text-[8px] font-normal text-orange-500/60">/ 深度情报全开</span></span>
            </div>
        </div>
        <footer class="bottom-nav">
            <button onclick="scrollToId('section-intel')" class="text-[11px] font-black text-zinc-500 hover:text-orange-500 uppercase tracking-widest">Reports</button>
            <button onclick="scrollToId('section-tools')" class="text-[11px] font-black text-zinc-500 hover:text-orange-500 uppercase tracking-widest">Tools</button>
            <button onclick="showPayModal()" class="px-6 py-2 bg-orange-600 rounded-full text-[11px] font-black text-white uppercase tracking-tighter">Activate Pro</button>
        </footer>
    </div>

    <div id="contentReader" class="fixed inset-0 z-[300] hidden bg-black flex items-center justify-center p-0 md:p-6">
        <div class="bg-zinc-900 w-full h-full md:max-w-4xl md:h-[90vh] md:rounded-[3rem] flex flex-col border border-white/10 overflow-hidden">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <span class="text-orange-500 font-bold text-[10px] uppercase tracking-widest">Encrypted Content</span>
                <button onclick="closeReader()" class="text-white text-xl">✕</button>
            </div>
            <div id="readerBody" class="flex-grow overflow-y-auto p-8 md:p-12 text-zinc-200 text-sm md:text-base leading-relaxed custom-scroll"></div>
        </div>
    </div>

    <div id="adminPanel" class="fixed inset-0 z-[250] hidden bg-black/98 items-center justify-center p-4">
        <div class="bg-zinc-900 border border-white/10 p-8 rounded-[3rem] w-full max-w-xl max-h-[85vh] overflow-y-auto custom-scroll">
            <div class="flex justify-between items-center mb-6">
                <span class="text-white font-black text-xs uppercase italic tracking-widest">Command Center</span>
                <button onclick="toggleAdmin()" class="text-zinc-600">CLOSE</button>
            </div>
            <div class="space-y-4">
                <input type="password" id="adminPass" placeholder="Admin Secret" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white outline-none text-xs">
                
                <div class="p-4 bg-orange-600/5 border border-orange-600/20 rounded-2xl">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-bold text-orange-500 uppercase">激活码管理</span>
                        <button onclick="fetchCodes()" class="text-[9px] bg-orange-600 text-white px-3 py-1 rounded-full font-black">查询所有码</button>
                    </div>
                    <div id="codeDisplay" class="max-h-32 overflow-y-auto text-[9px] font-mono text-zinc-500 break-all bg-black/50 p-2 rounded">等待查询...</div>
                </div>

                <div class="flex gap-2">
                    <button onclick="setCategory('report')" id="cat_report" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white">情报发布</button>
                    <button onclick="setCategory('tool')" id="cat_tool" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500">工具发布</button>
                </div>
                <input type="text" id="quickTitle" placeholder="标题" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white text-xs">
                <textarea id="quickContent" rows="6" placeholder="正文内容..." class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white text-xs font-mono"></textarea>
                <button onclick="quickPublish()" class="w-full py-4 bg-orange-700 rounded-2xl font-black text-xs text-white uppercase">发布至边缘节点</button>
            </div>
        </div>
    </div>

    <div id="payModal" class="fixed inset-0 z-[400] hidden bg-black/95 flex items-center justify-center p-6">
        <div class="max-w-xs w-full text-center">
            <h2 class="text-2xl font-black text-white mb-2 italic">PRO ACCESS</h2>
            <p class="text-zinc-600 text-[9px] mb-8 uppercase tracking-[0.3em]">输入您的 16 位授权激活码</p>
            <input type="text" id="activeCode" placeholder="LICENSE KEY" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-2xl text-white text-center mb-4 tracking-widest font-mono text-sm">
            <button onclick="doActivate()" class="w-full py-4 bg-orange-600 rounded-2xl text-white font-black uppercase shadow-2xl">立即开启全量情报</button>
            <button onclick="closeModal('payModal')" class="mt-8 text-zinc-800 text-[10px] font-black uppercase underline decoration-zinc-800">暂不激活</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://s1.ymtea.club";
        let currentCategory = 'report';
        let fullData = { reports: [], tools: [] };

        async function loadContent() {
            try {
                const res = await fetch(`${API_BASE}/api/reports/list`);
                const data = await res.json();
                fullData.reports = data.filter(i => i.category !== 'tool').sort((a,b) => b.is_top - a.is_top || b.id - a.id);
                fullData.tools = data.filter(i => i.category === 'tool').sort((a,b) => b.is_top - a.is_top || b.id - a.id);
                renderItems('reportList', fullData.reports, 1, 'renderReports');
                renderItems('toolList', fullData.tools, 1, 'renderTools');
            } catch (e) { document.getElementById('reportList').innerText = "加载失败"; }
        }

        function renderItems(containerId, data, page, func) {
            const size = 10;
            const paged = data.slice((page-1)*size, page*size);
            const isTool = containerId === 'toolList';
            
            document.getElementById(containerId).innerHTML = paged.map(r => `
                <div class="item-row flex justify-between items-center p-4 rounded-2xl bg-white/5 border border-white/5">
                    <div onclick="openItem(${r.id})" class="flex-grow cursor-pointer flex items-center gap-3">
                        ${isTool ? '<div class="w-8 h-8 bg-zinc-900 rounded-lg flex items-center justify-center text-orange-500">⚡</div>' : ''}
                        <div>
                            <div class="text-sm ${r.is_top ? 'text-orange-400 font-bold' : 'text-zinc-200'}">${r.title}</div>
                            <div class="text-[8px] text-zinc-700 mt-0.5 uppercase">${new Date(r.created_at).toLocaleDateString()}</div>
                        </div>
                    </div>
                    <button onclick="handleDelete(${r.id})" class="text-[8px] text-zinc-800 hover:text-red-500 font-black">DEL</button>
                </div>
            `).join('') || '<div class="py-20 text-center text-zinc-800 text-xs">空内容</div>';
            
            renderPagination(isTool ? 'toolPagination' : 'reportPagination', data.length, size, page, func);
        }

        function renderReports(p) { renderItems('reportList', fullData.reports, p, 'renderReports'); }
        function renderTools(p) { renderItems('toolList', fullData.tools, p, 'renderTools'); }

        async function openItem(id) {
            const token = localStorage.getItem('ymtea_token');
            if (!token) return showPayModal();
            try {
                const res = await fetch(`${API_BASE}/api/reports/view/${id}`, { headers: { 'Authorization': token } });
                const result = await res.json();
                let html = result.data.replace(/```([\s\S]*?)```/g, '<code>$1</code>');
                document.getElementById('readerBody').innerHTML = html;
                document.getElementById('contentReader').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } catch (e) { alert("无权访问"); }
        }

        // 新增：找回激活码
        async function fetchCodes() {
            const pass = document.getElementById('adminPass').value;
            if(!pass) return alert("请输入 Admin Secret");
            const sql = "SELECT email, code FROM codes ORDER BY id DESC LIMIT 50;";
            const res = await fetch(`${API_BASE}/api/admin/publish`, {
                method: 'POST',
                headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                body: JSON.stringify({ sql })
            });
            const result = await res.json();
            if(res.ok && result.results) {
                document.getElementById('codeDisplay').innerHTML = result.results.map(i => `${i.email}: ${i.code}`).join('<br>');
            } else {
                alert("获取失败");
            }
        }

        async function quickPublish() {
            const pass = document.getElementById('adminPass').value;
            const title = document.getElementById('quickTitle').value;
            const content = document.getElementById('quickContent').value;
            if(!pass || !title) return alert("Secret/标题缺失");
            const sql = `INSERT INTO reports (title, content, category) VALUES ('${title}', '${content}', '${currentCategory}');`;
            const res = await fetch(`${API_BASE}/api/admin/publish`, {
                method: 'POST',
                headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                body: JSON.stringify({ sql })
            });
            if(res.ok) { alert("同步成功"); location.reload(); }
        }

        async function doActivate() {
            const code = document.getElementById('activeCode').value;
            const res = await fetch(`${API_BASE}/api/pay/success`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'manual', code })
            });
            const data = await res.json();
            if(data.success) { localStorage.setItem('ymtea_token', data.token); location.reload(); }
            else alert("激活码错误");
        }

        function copyContact() {
            const wx = "YMTEA_HUB";
            navigator.clipboard.writeText(wx);
            alert("客服微信号 YMTEA_HUB 已复制\n请前往微信添加");
        }

        function renderPagination(tid, total, size, current, func) {
            const pages = Math.ceil(total / size);
            const container = document.getElementById(tid);
            if (!container || pages <= 1) { if(container) container.innerHTML=''; return; }
            let html = '';
            for (let i = 1; i <= pages; i++) {
                html += `<button onclick="${func}(${i})" class="w-6 h-6 rounded text-[9px] font-black ${i === current ? 'bg-orange-600 text-white' : 'bg-white/5 text-zinc-600'}">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); document.getElementById('adminPanel').classList.toggle('flex'); }
        function setCategory(cat) { 
            currentCategory = cat; 
            document.getElementById('cat_report').className = cat === 'report' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500';
            document.getElementById('cat_tool').className = cat === 'tool' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500';
        }
        function showPayModal() { document.getElementById('payModal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function closeReader() { document.getElementById('contentReader').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        function scrollToId(id) { document.getElementById(id).scrollIntoView({behavior:'smooth'}); }

        window.onload = () => {
            loadContent();
            if(localStorage.getItem('ymtea_token')) {
                document.getElementById('statusLabel').innerText = "PRO_ACTIVE";
                document.getElementById('statusLabel').classList.replace('text-zinc-500', 'text-orange-500');
            }
        };
    </script>
</body>
</html>
