<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 云茗荟商业终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; padding-bottom: 140px; }
        .glass { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .gold-text { background: linear-gradient(135deg, #fb923c, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bottom-fixed { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; }
        .price-bar { background: rgba(10,10,10,0.95); border-top: 1px solid rgba(255,255,255,0.05); padding: 8px 0; display: flex; justify-content: center; gap: 25px; backdrop-filter: blur(15px); }
        .bottom-nav { height: 65px; background: #000; border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-around; }
        #readerBody { white-space: pre-wrap; line-height: 1.8; }
        #readerBody a { color: #f97316; text-decoration: underline; }
        pre { background: #000; padding: 15px; border-radius: 10px; border: 1px solid #333; color: #fb923c; overflow-x: auto; font-family: monospace; margin: 15px 0; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-[150] w-full border-b border-white/10 bg-black/80 backdrop-blur-md h-16 flex items-center justify-between px-6">
        <div class="flex flex-col">
            <div class="text-xl font-black tracking-tighter cursor-pointer" ondblclick="toggleAdmin()">
                <span class="gold-text">YMTEA</span> <span class="text-white">HUB</span>
            </div>
            <span class="text-[8px] text-zinc-600 font-bold tracking-[0.3em] uppercase">Professional Terminal</span>
        </div>
        <div id="statusLabel" class="text-[9px] font-mono px-2 py-1 rounded bg-zinc-900 text-zinc-500 border border-white/10">SYSTEM_READY</div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-8">
        <div class="glass rounded-[2rem] p-6">
            <div class="text-[10px] font-bold text-orange-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                <span class="h-1.5 w-1.5 rounded-full bg-orange-500 animate-pulse"></span> 实时情报雷达
            </div>
            <div id="trendList" class="grid grid-cols-3 grid-rows-2 gap-3"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section id="section-intel" class="glass p-6 rounded-[2.5rem] min-h-[500px]">
                <h2 class="font-black text-white mb-6 italic uppercase tracking-widest text-sm">Intelligence 情报</h2>
                <div id="reportList" class="space-y-3">载入中...</div>
                <div id="reportPagination" class="flex justify-center gap-2 mt-6"></div>
            </section>
            <section id="section-tools" class="glass p-6 rounded-[2.5rem] min-h-[500px]">
                <h2 class="font-black text-white mb-6 italic uppercase tracking-widest text-sm">Toolbox 工具</h2>
                <div id="toolList" class="space-y-3">载入中...</div>
                <div id="toolPagination" class="flex justify-center gap-2 mt-6"></div>
            </section>
        </div>
    </main>

    <div class="bottom-fixed">
        <div class="price-bar">
            <div class="flex items-center gap-2"><span class="text-[8px] text-zinc-500 font-bold uppercase">PRO Monthly</span><span class="text-xs font-black text-orange-500">¥78</span></div>
            <div class="w-[1px] h-3 bg-white/10"></div>
            <div class="flex items-center gap-2"><span class="text-[8px] text-zinc-500 font-bold uppercase">PRO Yearly</span><span class="text-xs font-black text-orange-500">¥730</span></div>
        </div>
        <footer class="bottom-nav">
            <button onclick="scrollToId('section-intel')" class="text-[10px] font-black text-zinc-500 hover:text-white transition-colors">INTEL</button>
            <button onclick="showPayModal()" class="px-8 py-3 bg-white text-black rounded-full text-[10px] font-black uppercase tracking-tighter">立即激活</button>
            <button onclick="scrollToId('section-tools')" class="text-[10px] font-black text-zinc-500 hover:text-white transition-colors">TOOLS</button>
        </footer>
    </div>

    <div id="contentReader" class="fixed inset-0 z-[300] hidden bg-black/95 flex items-center justify-center p-4">
        <div class="bg-zinc-900 w-full h-full md:max-w-4xl md:h-[85vh] md:rounded-[3rem] flex flex-col border border-white/10 overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <span id="readerTitle" class="text-orange-500 font-bold text-[9px] uppercase tracking-widest">Document</span>
                <button onclick="closeReader()" class="text-white">✕</button>
            </div>
            <div id="readerBody" class="flex-grow overflow-y-auto p-8 md:p-12 text-zinc-200 text-sm custom-scroll"></div>
            <div class="p-6 border-t border-white/5 flex gap-4">
                <button id="prevBtn" class="flex-1 py-3 bg-white/5 rounded-xl text-[10px] font-bold text-zinc-500 uppercase">上一篇</button>
                <button id="nextBtn" class="flex-1 py-3 bg-white/5 rounded-xl text-[10px] font-bold text-zinc-500 uppercase">下一篇</button>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="fixed inset-0 z-[250] hidden bg-black/98 items-center justify-center p-4">
        <div class="bg-zinc-900 border border-white/10 p-8 rounded-[3rem] w-full max-w-2xl max-h-[90vh] overflow-y-auto custom-scroll shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <span class="text-orange-500 font-black text-xs uppercase tracking-widest">Console Admin</span>
                <button onclick="toggleAdmin()" class="text-zinc-600 underline text-[10px]">EXIT</button>
            </div>
            
            <div class="space-y-6">
                <input type="password" id="adminPass" placeholder="Secret Key" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white text-xs outline-none">
                
                <div class="p-5 bg-orange-600/5 border border-orange-600/20 rounded-2xl">
                    <div class="flex justify-between mb-4">
                        <input type="text" id="targetEmail" placeholder="备注姓名" class="bg-transparent border-b border-white/10 text-xs text-white outline-none w-1/2">
                        <select id="codeType" class="bg-black text-[10px] text-orange-500 border border-orange-600/30 rounded px-2">
                            <option value="MONTH">月费码 (31天)</option>
                            <option value="YEAR">年费码 (366天)</option>
                        </select>
                    </div>
                    <button onclick="manualAddCode()" class="w-full py-4 bg-orange-600 rounded-xl text-[11px] font-black text-white uppercase">生成并入库</button>
                    <div id="codeDisplay" class="mt-4 p-3 bg-black/50 rounded-xl text-[10px] font-mono text-zinc-500 custom-scroll max-h-32 overflow-y-auto"></div>
                    <button onclick="fetchCodes()" class="w-full mt-2 text-[9px] text-zinc-600 uppercase underline">查看历史码</button>
                </div>

                <div class="p-5 bg-zinc-800/20 border border-white/5 rounded-2xl space-y-4">
                    <div class="flex gap-2">
                        <button onclick="setCategory('report')" id="cat_report" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white">情报</button>
                        <button onclick="setCategory('tool')" id="cat_tool" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500">工具</button>
                    </div>
                    <input type="text" id="quickTitle" placeholder="标题" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white text-xs">
                    <textarea id="quickContent" rows="6" placeholder="支持换行、代码、链接..." class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white text-xs font-mono"></textarea>
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] text-zinc-500 uppercase"><input type="checkbox" id="isTopCheck"> 置顶显示</label>
                        <span id="editStatus" class="text-[9px] text-orange-500 font-bold uppercase"></span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="quickPublish()" id="publishBtn" class="flex-[2] py-4 bg-orange-700 rounded-2xl font-black text-xs text-white uppercase">发布/保存</button>
                        <button onclick="cancelEdit()" id="cancelBtn" class="hidden flex-1 py-4 bg-zinc-800 rounded-2xl font-black text-xs text-zinc-500 uppercase">取消</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="payModal" class="fixed inset-0 z-[400] hidden bg-black/95 flex items-center justify-center p-6">
        <div class="max-w-xs w-full text-center">
            <h2 class="text-2xl font-black text-white mb-2 uppercase italic gold-text">Activate</h2>
            <p class="text-[9px] text-zinc-500 mb-8 tracking-widest">请输入12位专业授权码</p>
            <input type="text" id="activeCode" placeholder="Paste Code Here" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-2xl text-white text-center mb-4 font-mono uppercase tracking-widest outline-none">
            <button onclick="doActivate()" class="w-full py-4 bg-orange-600 rounded-2xl text-white font-black uppercase shadow-lg shadow-orange-900/40">确认激活</button>
            <button onclick="closeModal('payModal')" class="mt-8 text-zinc-800 text-[10px] underline uppercase">返回</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://s1.ymtea.club";
        let currentCategory = 'report';
        let fullData = { reports: [], tools: [] };
        let currentEditId = null;
        let currentOpenList = [];
        let currentIndex = -1;

        window.onload = () => {
            refreshRadar();
            loadContent();
            if(localStorage.getItem('ymtea_token')) {
                const label = document.getElementById('statusLabel');
                label.innerText = "PRO_MEMBER_ACTIVE";
                label.classList.replace('text-zinc-500', 'text-orange-500');
            }
        };

        // --- 修复重点：修改没反应是因为没有正确回显内容 ---
        async function prepareEdit(event, id, cat) {
            event.stopPropagation();
            const list = cat === 'tool' ? fullData.tools : fullData.reports;
            const item = list.find(i => i.id === id);
            if(!item) return;

            currentEditId = id;
            currentCategory = cat;
            setCategory(cat); // UI 切换

            document.getElementById('quickTitle').value = item.title;
            document.getElementById('isTopCheck').checked = (item.is_top == 1);
            document.getElementById('editStatus').innerText = `Editing ID: ${id}`;
            document.getElementById('publishBtn').innerText = "保存修改";
            document.getElementById('cancelBtn').classList.remove('hidden');

            // 异步获取原始内容
            const token = localStorage.getItem('ymtea_token') || "";
            const res = await fetch(`${API_BASE}/api/reports/view/${id}`, { headers: { 'Authorization': token } });
            const result = await res.json();
            document.getElementById('quickContent').value = result.data || "";
            
            // 滚动到编辑区
            document.getElementById('quickTitle').focus();
        }

        function cancelEdit() {
            currentEditId = null;
            document.getElementById('quickTitle').value = "";
            document.getElementById('quickContent').value = "";
            document.getElementById('editStatus').innerText = "";
            document.getElementById('publishBtn').innerText = "发布内容";
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        // --- 授权码区分月/年 ---
        async function manualAddCode() {
            const pass = document.getElementById('adminPass').value;
            const note = document.getElementById('targetEmail').value || 'User';
            const type = document.getElementById('codeType').value;
            const code = 'YM' + Math.random().toString(36).substring(2, 12).toUpperCase();
            
            // 注意：SQL 增加了 type 字段
            const sql = `INSERT INTO codes (email, code, type) VALUES ('${note}', '${code}', '${type}');`;
            const res = await fetch(`${API_BASE}/api/admin/publish`, {
                method: 'POST',
                headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                body: JSON.stringify({ sql })
            });
            if(res.ok) {
                document.getElementById('codeDisplay').innerHTML = `[${type}] ${code} (已入库)`;
            }
        }

        // --- 通用逻辑 ---
        async function loadContent() {
            const res = await fetch(`${API_BASE}/api/reports/list`);
            const data = await res.json();
            const sorted = data.sort((a,b) => (b.is_top||0) - (a.is_top||0) || b.id - a.id);
            fullData.reports = sorted.filter(i => i.category !== 'tool');
            fullData.tools = sorted.filter(i => i.category === 'tool');
            renderReports(1); renderTools(1);
        }

        function renderItems(containerId, data, page, func) {
            const size = 10;
            const paged = data.slice((page-1)*size, page*size);
            const isTool = containerId === 'toolList';
            document.getElementById(containerId).innerHTML = paged.map(r => `
                <div class="flex justify-between items-center p-4 rounded-2xl bg-white/5 border border-white/5 hover:bg-white/10 cursor-pointer mb-2">
                    <div onclick="openItem(${r.id}, '${isTool?'tool':'report'}')" class="flex-grow text-sm ${r.is_top?'text-orange-400 font-bold':''}">${r.title} ${r.is_top?'🚩':''}</div>
                    <div class="flex gap-3">
                        <button onclick="prepareEdit(event, ${r.id}, '${isTool?'tool':'report'}')" class="text-[9px] text-zinc-500 hover:text-white uppercase font-bold">Edit</button>
                        <button onclick="handleDelete(${r.id})" class="text-[9px] text-zinc-800 hover:text-red-500 uppercase font-bold">Del</button>
                    </div>
                </div>
            `).join('');
            renderPagination(isTool ? 'toolPagination' : 'reportPagination', data.length, size, page, func);
        }

        async function openItem(id, cat) {
            const token = localStorage.getItem('ymtea_token');
            if(!token) return showPayModal();
            currentOpenList = cat === 'tool' ? fullData.tools : fullData.reports;
            currentIndex = currentOpenList.findIndex(i => i.id === id);
            const res = await fetch(`${API_BASE}/api/reports/view/${id}`, { headers: { 'Authorization': token } });
            const data = await res.json();
            let body = (data.data || "").replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            body = body.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
            document.getElementById('readerBody').innerHTML = body;
            document.getElementById('contentReader').classList.remove('hidden');
            updateReaderNav();
        }

        function updateReaderNav() {
            const prev = document.getElementById('prevBtn');
            const next = document.getElementById('nextBtn');
            prev.style.opacity = currentIndex > 0 ? "1" : "0.2";
            next.style.opacity = currentIndex < currentOpenList.length - 1 ? "1" : "0.2";
            prev.onclick = currentIndex > 0 ? () => openItem(currentOpenList[currentIndex-1].id, currentOpenList[currentIndex-1].category) : null;
            next.onclick = currentIndex < currentOpenList.length - 1 ? () => openItem(currentOpenList[currentIndex+1].id, currentOpenList[currentIndex+1].category) : null;
        }

        async function quickPublish() {
            const pass = document.getElementById('adminPass').value;
            const title = document.getElementById('quickTitle').value.replace(/'/g, "''");
            const content = document.getElementById('quickContent').value.replace(/'/g, "''");
            const isTop = document.getElementById('isTopCheck').checked ? 1 : 0;
            const sql = currentEditId 
                ? `UPDATE reports SET title='${title}', content='${content}', category='${currentCategory}', is_top=${isTop} WHERE id=${currentEditId};`
                : `INSERT INTO reports (title, content, category, is_top) VALUES ('${title}', '${content}', '${currentCategory}', ${isTop});`;
            const res = await fetch(`${API_BASE}/api/admin/publish`, {
                method: 'POST',
                headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                body: JSON.stringify({ sql })
            });
            if(res.ok) location.reload();
        }

        async function handleDelete(id) {
            const pass = prompt("Enter Secret:");
            if(!pass) return;
            const sql = `DELETE FROM reports WHERE id=${id};`;
            await fetch(`${API_BASE}/api/admin/publish`, {
                method: 'POST',
                headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                body: JSON.stringify({ sql })
            });
            location.reload();
        }

        function refreshRadar() {
            const tags = ["跨境趋势", "TK战法", "海关政策", "AI工具", "选品逻辑", "汇率预警"];
            document.getElementById('trendList').innerHTML = tags.map(i => `<div class="p-2 bg-white/5 rounded-xl border border-white/5 flex flex-col items-center justify-center"><span class="text-[9px] text-zinc-500 font-bold mb-1">${i}</span><span class="text-[8px] text-orange-500 font-black italic">LIVE</span></div>`).join('');
        }

        async function doActivate() {
            const code = document.getElementById('activeCode').value.trim().toUpperCase();
            const res = await fetch(`${API_BASE}/api/pay/success`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });
            const data = await res.json();
            if(data.success) { localStorage.setItem('ymtea_token', data.token); location.reload(); }
            else alert("无效码");
        }

        function renderReports(p) { renderItems('reportList', fullData.reports, p, 'renderReports'); }
        function renderTools(p) { renderItems('toolList', fullData.tools, p, 'renderTools'); }
        function renderPagination(tid, total, size, current, func) {
            const pages = Math.ceil(total/size);
            const container = document.getElementById(tid);
            if(pages <= 1) { container.innerHTML=''; return; }
            let html = '';
            for(let i=1; i<=pages; i++) html += `<button onclick="${func}(${i})" class="w-6 h-6 rounded text-[9px] ${i===current?'bg-orange-600 text-white':'bg-white/5 text-zinc-600'}">${i}</button>`;
            container.innerHTML = html;
        }
        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); document.getElementById('adminPanel').classList.toggle('flex'); }
        function showPayModal() { document.getElementById('payModal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function closeReader() { document.getElementById('contentReader').classList.add('hidden'); }
        function scrollToId(id) { document.getElementById(id).scrollIntoView({behavior:'smooth'}); }
        function setCategory(cat) { currentCategory = cat; document.getElementById('cat_report').className = cat === 'report' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500'; document.getElementById('cat_tool').className = cat === 'tool' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500'; }
    </script>
</body>
</html>
