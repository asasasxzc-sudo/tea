<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 云茗荟商业终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background:#050505; color:#e4e4e7; font-family:'Inter',sans-serif; margin:0; padding-bottom:180px; -webkit-tap-highlight-color:transparent; }
        .gold-text { background:linear-gradient(135deg,#fb923c,#f97316); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .glass { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(10px); }
        .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:85px; background:#000; border-top:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:space-around; z-index:200; padding-bottom:env(safe-area-inset-bottom); }
        .float-btn { position:fixed; right:16px; bottom:180px; width:56px; height:56px; background:#f97316; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; box-shadow:0 10px 25px rgba(249,115,22,0.3); border:2px solid rgba(255,255,255,0.2); }
        #readerBody { white-space:pre-wrap; line-height:1.8; word-break:break-all; }
        pre { background:#000; padding:15px; border-radius:12px; border:1px solid #333; color:#fb923c; overflow-x:auto; font-size:12px; margin:10px 0; font-family:monospace; }
        .custom-scroll::-webkit-scrollbar { width:4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background:#333; border-radius:10px; }
    </style>
</head>
<body>
    <!-- 头部栏 -->
    <header class="sticky top-0 z-[150] w-full border-b border-white/10 bg-black/90 backdrop-blur-md h-16 flex items-center justify-between px-6">
        <div class="flex flex-col" ondblclick="toggleAdmin()">
            <div class="text-xl font-black tracking-tighter"><span class="gold-text">YMTEA</span> <span class="text-white">HUB</span></div>
            <span class="text-[8px] text-zinc-500 font-bold uppercase tracking-[0.2em]">Professional Terminal</span>
        </div>
        <div id="statusLabel" class="text-[9px] font-mono px-2 py-1 rounded bg-zinc-900 text-zinc-500 border border-white/10">SYS_READY</div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
        <!-- 核心看板 -->
        <div class="glass roundrem] p-4"><div id="trendList" class="grid grid-cols-3 gap-2 md:grid-cols-6 text-center"></div></div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- 情报区 -->
            <section id="section-intel" class="glass p-6 rounded-[2.5rem] min-h-[400px]">
                <h2 class="font-black text-white mb-4 italic uppercase text-xs border-l-4 border-orange-500 pl-3">Intelligence</h2>
                <div id="reportList" class="space-y-2"></div>
                <div id="reportPagination" class="flex justify-center gap-2 mt-4"></div>
            </section>
            <!-- 工具区 -->
            <section id="section-tools" class="glass p-6 rounded-[2.5rem] min-h-[400px]">
                <h2 class="font-black text-white mb-4 italic uppercase text-xs border-l-4 border-zinc-600 pl-3">Toolbox</h2>
                <div id="toolList" class="space-y-2"></div>
                <div id="toolPagination" class="flex justify-center gap-2 mt-4"></div>
            </section>
        </div>
    </main>

    <a href="https://work.weixin.qq.com/kfid/kfcab9eba83e85cde3e" target="_blank" class="float-btn">
        <span class="text-[10px] font-black text-white text-center">联系<br>客服</span>
    </a>

    <!-- 底部固定导航 -->
    <footer class="bottom-nav">
        <button onclick="scrollToId('section-intel')" class="flex-1 text-[11px] font-black text-zinc-500">INTEL</button>
        <div class="flex flex-col items-center min-w-[140px]">
            <span class="gold-text text-[12px] font-black tracking-widest mb-1 italic">云茗荟</span>
            <button onclick="showPayModal()" class="w-full py-3 bg-white text-black rounded-full text-[10px] font-black uppercase">激活权限</button>
        </div>
        <button onclick="scrollToId('section-tools')" class="flex-1 text-[11px] font-black text-zinc-500">TOOLS</button>
    </footer>

    <!-- 全屏深度内容阅读器 -->
    <div id="contentReader" class="fixed inset-0 z-[300] hidden bg-black/95 flex items-center justify-center p-4">
        <div class="bg-zinc-900 w-full h-full md:max-w-4xl md:h-[80vh] md:rounded-[3rem] flex flex-col border border-white/10 overflow-hidden">
            <div class="p-4 border-b border-white/5 flex justify-between bg-black/20">
                <span id="readerTitle" class="text-orange-500 font-bold text-[10px] uppercase truncate max-w-[70%]">Article View</span>
                <button onclick="closeReader()" class="text-zinc-500 text-xl px-2 font-bold">✕</button>
            </div>
            <div id="readerBody" class="flex-grow overflow-y-auto p-6 md:p-10 text-zinc-200 text-sm custom-scroll"></div>
            <div class="p-4 border-t border-white/5 flex gap-4 bg-black/20">
                <button id="prevBtn" class="flex-1 py-3 bg-white/5 rounded-xl text-[10px] font-bold text-zinc-500 uppercase">Previous</button>
                <button id="nextBtn" class="flex-1 py-3 bg-white/5 rounded-xl text-[10px] font-bold text-zinc-500 uppercase">Next</button>
            </div>
        </div>
    </div>

    <!-- 管理员控制后台 -->
    <div id="adminPanel" class="fixed inset-0 z-[250] hidden bg-black/98 flex items-center justify-center p-4">
        <div class="bg-zinc-900 border border-white/10 p-6 rounded-[2.5rem] w-full max-w-xl max-h-[85vh] overflow-y-auto custom-scroll">
            <div class="flex justify-between items-center mb-6"><span class="gold-text font-black text-xs uppercase">Terminal Console</span><button onclick="toggleAdmin()" class="text-zinc-600">✕</button></div>
            <div class="space-y-4">
                <input type="password" id="adminPass" placeholder="管理密钥" class="w-full bg-black border border-white/10 p-4 rounded-xl text-white text-xs outline-none">
                <div class="p-4 bg-zinc-800/30 border border-white/5 rounded-2xl space-y-3">
                    <div class="flex gap-2">
                        <button onclick="setCat('report')" id="cat_report" class="flex-1 py-2 rounded-lg text-[9px] font-bold bg-orange-600 text-white">情报发布</button>
                        <button onclick="setCat('tool')" id="cat_tool" class="flex-1 py-2 rounded-lg text-[9px] font-bold bg-zinc-800 text-zinc-500">工具录入</button>
                    </div>
                    <input type="text" id="quickTitle" placeholder="标题" class="w-full bg-black border border-white/10 p-3 rounded-lg text-white text-xs">
                    <textarea id="quickContent" rows="5" placeholder="正文内容 (支持 ```代码块```)" class="w-full bg-black border border-white/10 p-3 rounded-lg text-white text-xs font-mono"></textarea>
                    <label class="flex items-center gap-2 text-[9px] text-zinc-500"><input type="checkbox" id="isTopCheck"> 设置置顶</label>
                    <div class="flex gap-2">
                        <button onclick="publish()" id="publishBtn" class="flex-[2] py-3 bg-orange-700 rounded-xl font-bold text-[10px] text-white">同步数据中心</button>
                        <button onclick="cancelEdit()" id="cancelBtn" class="hidden flex-1 py-3 bg-zinc-800 rounded-xl text-[10px] text-zinc-500">取消编辑</button>
                    </div>
                </div>
                <!-- 激活码管理 -->
                <div class="p-4 bg-orange-600/5 border border-orange-600/10 rounded-2xl space-y-3">
                    <span class="text-[9px] font-black text-orange-500 uppercase">Code Management</span>
                    <div class="flex gap-2">
                        <input type="text" id="codeEmail" placeholder="备注信息 (如: 微信ID)" class="flex-1 bg-black border border-white/10 p-3 rounded-lg text-white text-xs outline-none">
                        <button onclick="genKey()" class="px-4 bg-orange-600 rounded-lg text-[9px] font-bold text-white">生成并入库</button>
                    </div>
                    <div id="lastCode" class="p-3 bg-black rounded-lg text-center font-mono text-orange-500 text-lg border border-white/5 tracking-widest">---</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 支付激活模态框 -->
    <div id="payModal" class="fixed inset-0 z-[400] hidden bg-black/95 flex items-center justify-center p-6 backdrop-blur-md">
        <div class="max-w-xs w-full text-center">
            <h2 class="text-2xl font-black gold-text mb-6 italic uppercase">Terminal Auth</h2>
            <input type="text" id="activeCode" placeholder="激活码序列号" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-2xl text-white text-center mb-4 font-mono outline-none uppercase text-lg focus:border-orange-600">
            <button onclick="doAct()" class="w-full py-4 bg-orange-600 rounded-2xl text-white font-black uppercase text-xs tracking-widest">确认激活权限</button>
            <button onclick="window.open('https://work.weixin.qq.com/kfid/kfcab9eba83e85cde3e')" class="mt-4 text-orange-500 text-[10px] font-bold uppercase">未收到激活码？联系客服</button>
            <button onclick="closeModal('payModal')" class="mt-6 text-zinc-700 text-[10px] underline uppercase font-black">返回终端</button>
        </div>
    </div>

    <script>
        const API = "https://s1.ymtea.club";
        let curCat = 'report', fullData = { reports: [], tools: [] }, curEid = null, curList = [], curIdx = -1;

        window.onload = () => {
            const tags = ["趋势","战法","海关","选品","流量","汇率"];
            document.getElementById('trendList').innerHTML = tags.map(i=>`<div class="p-2 bg-white/5 rounded-xl border border-white/5"><div class="text-[8px] text-zinc-600 font-bold mb-1">${i}</div><div class="text-[7px] text-orange-500 font-black italic">LIVE</div></div>`).join('');
            loadData();
            if(localStorage.getItem('ymtea_token')) {
                const l = document.getElementById('statusLabel');
                l.innerText = "PRO_ENABLED";
                l.className = "text-[9px] font-mono px-2 py-1 rounded bg-orange-950 text-orange-500 border border-orange-500/30";
            }
        };

        async function loadData() {
            try {
                const r = await fetch(`${API}/api/reports/list`);
                const d = await r.json();
                const sorted = d.sort((a,b) => (b.is_top||0) - (a.is_top||0) || b.id - a.id);
                fullData.reports = sorted.filter(i => i.category !== 'tool');
                fullData.tools = sorted.filter(i => i.category === 'tool');
                render('reportList', fullData.reports, 1, 'renderReports');
                render('toolList', fullData.tools, 1, 'renderTools');
            } catch(e) { console.error("API_FETCH_ERR", e); }
        }

        function render(tid, data, page, funcName) {
            const size = 10, paged = data.slice((page-1)*size, page*size), isTool = tid === 'toolList', c = document.getElementById(tid);
            if(!data.length) { c.innerHTML = '<div class="text-[10px] text-zinc-800 p-4">暂无数据推送</div>'; return; }
            c.innerHTML = paged.map(r => `
                <div class="flex justify-between items-center p-4 rounded-xl bg-white/[0.02] border border-white/5 hover:bg-white/[0.04] mb-2 cursor-pointer transition-all" onclick="openItem(${r.id}, '${isTool?'tool':'report'}')">
                    <div class="text-sm ${r.is_top?'text-orange-400 font-bold':'text-zinc-300'} truncate flex-grow">
                        ${r.is_top?'<span class="text-[8px] bg-orange-600/20 text-orange-500 px-1 rounded mr-1">TOP</span>':''}${r.title}
                    </div>
                    <div class="flex gap-2" onclick="event.stopPropagation()">
                        <button onclick="prepareEdit(${r.id}, '${isTool?'tool':'report'}')" class="text-[9px] text-zinc-700 hover:text-orange-500 uppercase font-bold">Edit</button>
                        <button onclick="handleDel(${r.id})" class="text-[9px] text-zinc-800 hover:text-red-500 uppercase font-bold">Del</button>
                    </div>
                </div>`).join('');
            const pgs = Math.ceil(data.length/size);
            const pc = document.getElementById(isTool?'toolPagination':'reportPagination');
            if(pgs<=1) { pc.innerHTML=''; return; }
            let h=''; for(let i=1;i<=pgs;i++) h+=`<button onclick="${funcName}(${i})" class="w-6 h-6 rounded text-[9px] ${i===page?'bg-orange-600 text-white':'bg-white/5 text-zinc-600'}">${i}</button>`;
            pc.innerHTML = h;
        }

        async function openItem(id, cat) {
            const t = localStorage.getItem('ymtea_token'), p = document.getElementById('adminPass').value;
            if(!t && !p) return showPayModal();
            curList = (cat === 'tool' ? fullData.tools : fullData.reports);
            curIdx = curList.findIndex(i => i.id === id);
            try {
                const res = await fetch(`${API}/api/reports/view/${id}`, { headers: { 'Authorization': t||"", 'Admin-Key': p||"" } });
                const r = await res.json();
                if(r.data) {
                    document.getElementById('readerTitle').innerText = curList[curIdx].title;
                    document.getElementById('readerBody').innerHTML = r.data.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
                    document.getElementById('contentReader').classList.remove('hidden');
                    const pb = document.getElementById('prevBtn'), nb = document.getElementById('nextBtn');
                    pb.style.opacity = curIdx > 0 ? "1" : "0.2"; 
                    nb.style.opacity = curIdx < curList.length-1 ? "1" : "0.2";
                    pb.onclick = curIdx > 0 ? () => openItem(curList[curIdx-1].id, curList[curIdx-1].category) : null;
                    nb.onclick = curIdx < curList.length-1 ? () => openItem(curList[curIdx+1].id, curList[curIdx+1].category) : null;
                } else { alert("身份验证失败，请重新激活"); }
            } catch(e) { alert("网络异常"); }
        }

        async function genKey() {
            const p = document.getElementById('adminPass').value, note = document.getElementById('codeEmail').value || 'User';
            if(!p) return alert("请在上方输入管理密钥");
            const k = 'YM' + Math.random().toString(36).substring(2, 12).toUpperCase();
            try {
                const r = await fetch(`${API}/api/admin/publish`, { method:'POST', headers:{'Admin-Key':p,'Content-Type':'application/json'}, body:JSON.stringify({sql:"INSERT INTO codes (email, code, type) VALUES (?, ?, ?)", params:[note, k, 'MONTH']}) });
                if(r.ok) { document.getElementById('lastCode').innerText = k; alert("激活码已同步到云端"); } else alert("权限验证未通过");
            } catch(e) { alert("连接服务器失败"); }
        }

        async function publish() {
            const p = document.getElementById('adminPass').value, t = document.getElementById('quickTitle').value, c = document.getElementById('quickContent').value, top = document.getElementById('isTopCheck').checked ? 1 : 0;
            if(!p || !t) return alert("标题和正文不可为空");
            const sql = curEid ? "UPDATE reports SET title=?, content=?, category=?, is_top=? WHERE id=?" : "INSERT INTO reports (title, content, category, is_top) VALUES (?,?,?,?)";
            const params = curEid ? [t, c, curCat, top, curEid] : [t, c, curCat, top];
            try {
                const r = await fetch(`${API}/api/admin/publish`, { method:'POST', headers:{'Admin-Key':p,'Content-Type':'application/json'}, body:JSON.stringify({sql, params}) });
                if(r.ok) location.reload(); else alert("管理员密钥错误");
            } catch(e) { alert("同步失败"); }
        }

        async function doAct() {
            const c = document.getElementById('activeCode').value.trim().toUpperCase();
            if(!c) return;
            try {
                const r = await fetch(`${API}/api/pay/success`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code:c}) });
                const d = await r.json();
                if(d.success) { localStorage.setItem('ymtea_token', d.token); location.reload(); } else alert("该激活码无效");
            } catch(e) { alert("验证超时"); }
        }

        async function handleDel(id) { 
            if(confirm("确定永久删除此条目？")) { 
                const p = prompt("请输入管理密钥:"); 
                if(p) { await fetch(`${API}/api/admin/publish`, { method:'POST', headers:{'Admin-Key':p,'Content-Type':'application/json'}, body:JSON.stringify({sql:"DELETE FROM reports WHERE id=?", params:[id]}) }); location.reload(); } 
            } 
        }

        async function prepareEdit(id, cat) {
            const p = document.getElementById('adminPass').value; if(!p) { toggleAdmin(); alert("请先在控制台输入密钥"); return; }
            const item = (cat==='tool'?fullData.tools:fullData.reports).find(i=>i.id===id);
            curEid = id; setCat(cat); document.getElementById('quickTitle').value = item.title;
            const r = await fetch(`${API}/api/reports/view/${id}`, { headers:{'Admin-Key':p} });
            const d = await r.json(); if(d.data) { document.getElementById('quickContent').value = d.data; document.getElementById('cancelBtn').classList.remove('hidden'); document.getElementById('publishBtn').innerText = "确认修改并同步"; }
        }

        function renderReports(p) { render('reportList', fullData.reports, p, 'renderReports'); }
        function renderTools(p) { render('toolList', fullData.tools, p, 'renderTools'); }
        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); }
        function showPayModal() { document.getElementById('payModal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function closeReader() { document.getElementById('contentReader').classList.add('hidden'); }
        function scrollToId(id) { document.getElementById(id).scrollIntoView({behavior:'smooth'}); }
        function cancelEdit() { location.reload(); }
        function setCat(c) { curCat = c; document.getElementById('cat_report').className = c==='report'?'flex-1 py-2 rounded-lg text-[9px] font-bold bg-orange-600 text-white':'flex-1 py-2 rounded-lg text-[9px] font-bold bg-zinc-800 text-zinc-500'; document.getElementById('cat_tool').className = c==='tool'?'flex-1 py-2 rounded-lg text-[9px] font-bold bg-orange-600 text-white':'flex-1 py-2 rounded-lg text-[9px] font-bold bg-zinc-800 text-zinc-500'; }
    </script>
</body>
</html>
