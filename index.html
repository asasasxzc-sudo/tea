<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 云茗荟商业终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 160px; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .gold-text { background: linear-gradient(135deg, #fb923c, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bottom-fixed { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; }
        .item-row { transition: 0.2s; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .item-row:hover { background: rgba(255,255,255,0.06); border-color: #f9731655; }
        .custom-scroll::-webkit-scrollbar { width: 2px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-[150] w-full border-b border-white/10 bg-black/80 backdrop-blur-md h-16 flex items-center justify-between px-6">
        <div class="text-xl font-black tracking-tighter" ondblclick="toggleAdmin()">
            <span class="gold-text">YMTEA</span> <span class="text-white">HUB</span>
        </div>
        <div id="statusLabel" class="text-[9px] font-mono px-2 py-1 rounded bg-zinc-900 text-zinc-500 border border-white/10 uppercase">System_Ready</div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section id="section-intel" class="glass p-6 rounded-[2.5rem] min-h-[500px]">
                <h2 class="font-black text-white mb-6 italic uppercase">Intelligence 情报</h2>
                <div id="reportList" class="space-y-3 text-zinc-600 text-xs italic">Syncing...</div>
                <div id="reportPagination" class="flex justify-center gap-1 mt-6"></div>
            </section>
            <section id="section-tools" class="glass p-6 rounded-[2.5rem] min-h-[500px]">
                <h2 class="font-black text-white mb-6 italic uppercase">Toolbox 工具</h2>
                <div id="toolList" class="space-y-3 text-zinc-600 text-xs italic">Syncing...</div>
                <div id="toolPagination" class="flex justify-center gap-1 mt-6"></div>
            </section>
        </div>
    </main>

    <div class="bottom-fixed">
        <footer class="h-20 bg-black border-top border-white/10 flex items-center justify-around px-4">
            <button onclick="scrollToId('section-intel')" class="text-[11px] font-black text-zinc-500">INTEL</button>
            <button onclick="showPayModal()" class="px-8 py-3 bg-white text-black rounded-full text-[10px] font-black uppercase tracking-widest">Activate Access</button>
            <button onclick="scrollToId('section-tools')" class="text-[11px] font-black text-zinc-500">TOOLS</button>
        </footer>
    </div>

    <div id="adminPanel" class="fixed inset-0 z-[250] hidden bg-black/98 flex-col items-center justify-center p-4">
        <div class="bg-zinc-900 border border-white/10 p-8 rounded-[3rem] w-full max-w-xl max-h-[90vh] overflow-y-auto custom-scroll shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <span class="text-orange-500 font-black text-xs uppercase tracking-[0.2em]">Management Terminal</span>
                <button onclick="toggleAdmin()" class="text-zinc-600 underline text-[10px]">CLOSE</button>
            </div>
            
            <input type="password" id="adminPass" placeholder="Admin Secret" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white text-xs mb-6 outline-none focus:border-orange-500">

            <div class="p-6 bg-white/5 rounded-[2rem] border border-white/5 mb-6">
                <div class="flex justify-between items-center mb-4 text-[10px] font-bold text-zinc-500 uppercase tracking-widest">License Generator</div>
                <input type="text" id="targetEmail" placeholder="备注（选填，如：张三）" class="w-full bg-black/50 border-b border-white/10 p-3 text-white text-xs outline-none mb-4">
                <button onclick="manualAddCode()" class="w-full py-4 bg-orange-600 rounded-2xl text-[11px] font-black text-white uppercase shadow-lg shadow-orange-900/40">生成新授权码</button>
                <div id="codeDisplay" class="mt-4 p-4 bg-black/50 rounded-2xl border border-white/5 text-[10px] font-mono text-zinc-500 min-h-[40px] flex items-center justify-center italic">
                    Waiting for command...
                </div>
                <button onclick="fetchCodes()" class="w-full mt-4 py-2 text-zinc-600 text-[9px] font-bold uppercase hover:text-white transition-colors tracking-widest">查询已生成列表</button>
            </div>

            <div class="space-y-4">
                <div class="flex gap-2">
                    <button onclick="setCategory('report')" id="cat_report" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white">情报模式</button>
                    <button onclick="setCategory('tool')" id="cat_tool" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500">工具模式</button>
                </div>
                <input type="text" id="quickTitle" placeholder="文章标题" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white text-xs">
                <textarea id="quickContent" rows="5" placeholder="支持 HTML/Markdown 代码..." class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white text-xs font-mono"></textarea>
                <button onclick="quickPublish()" id="publishBtn" class="w-full py-4 border border-orange-600 text-orange-600 rounded-2xl font-black text-xs uppercase hover:bg-orange-600 hover:text-white transition-all">发布内容</button>
            </div>
        </div>
    </div>

    <div id="payModal" class="fixed inset-0 z-[400] hidden bg-black/95 flex items-center justify-center p-6">
        <div class="max-w-xs w-full text-center">
            <h2 class="text-2xl font-black text-white mb-2 italic tracking-tighter uppercase">Activate</h2>
            <p class="text-[9px] text-zinc-500 mb-8 uppercase tracking-[0.2em]">Enter your 12-digit license code</p>
            <input type="text" id="activeCode" placeholder="粘贴授权码" class="w-full bg-zinc-900 border border-white/10 p-5 rounded-2xl text-white text-center mb-4 font-mono tracking-[0.3em] outline-none shadow-2xl uppercase">
            <button onclick="doActivate()" class="w-full py-5 bg-orange-600 rounded-2xl text-white font-black uppercase shadow-lg shadow-orange-900/40">解锁专业版权限</button>
            <button onclick="closeModal('payModal')" class="mt-8 text-zinc-700 text-[10px] font-black uppercase underline">返回主页</button>
        </div>
    </div>

    <div id="contentReader" class="fixed inset-0 z-[300] hidden bg-black flex items-center justify-center p-4">
        <div class="bg-zinc-900 w-full h-full md:max-w-4xl md:h-[85vh] md:rounded-[3rem] flex flex-col border border-white/10 overflow-hidden">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <span class="text-orange-500 font-bold text-[10px] uppercase tracking-widest">Document View</span>
                <button onclick="closeReader()" class="text-white text-xl">✕</button>
            </div>
            <div id="readerBody" class="flex-grow overflow-y-auto p-8 md:p-12 text-zinc-200 text-sm leading-relaxed custom-scroll"></div>
        </div>
    </div>

    <script>
        const API_BASE = "https://s1.ymtea.club";
        let currentCategory = 'report';
        let fullData = { reports: [], tools: [] };

        window.onload = () => {
            loadContent();
            if(localStorage.getItem('ymtea_token')) {
                document.getElementById('statusLabel').innerText = "PRO_ACTIVE";
                document.getElementById('statusLabel').classList.replace('text-zinc-500', 'text-orange-500');
            }
        };

        // --- 核心：管理员逻辑 ---
        async function manualAddCode() {
            const pass = document.getElementById('adminPass').value;
            const note = document.getElementById('targetEmail').value || '云茗荟客户';
            const code = 'YM' + Math.random().toString(36).substring(2, 12).toUpperCase();
            
            if(!pass) return alert("请输入 Secret");

            const sql = `INSERT INTO codes (email, code) VALUES ('${note}', '${code}');`;
            try {
                const res = await fetch(`${API_BASE}/api/admin/publish`, {
                    method: 'POST',
                    headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql })
                });
                if(res.ok) {
                    document.getElementById('codeDisplay').innerHTML = `
                        <div class="flex flex-col items-center gap-3 w-full">
                            <span class="text-white font-black text-xl tracking-widest">${code}</span>
                            <button onclick="copyText('${code}')" class="text-orange-500 text-[10px] font-bold underline">点击复制发给客户</button>
                        </div>
                    `;
                } else alert("生成失败，请检查密码");
            } catch(e) { alert("网络错误"); }
        }

        async function fetchCodes() {
            const pass = document.getElementById('adminPass').value;
            const sql = "SELECT * FROM codes ORDER BY id DESC LIMIT 30;";
            try {
                const res = await fetch(`${API_BASE}/api/admin/publish`, {
                    method: 'POST',
                    headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql })
                });
                const data = await res.json();
                const list = Array.isArray(data) ? data : (data.results || []);
                document.getElementById('codeDisplay').innerHTML = list.map(i => `
                    <div class="flex justify-between py-1 border-b border-white/5">
                        <span>${i.email}</span>
                        <span class="text-white cursor-pointer" onclick="copyText('${i.code}')">${i.code}</span>
                    </div>
                `).join('') || '无记录';
            } catch(e) { alert("查询失败"); }
        }

        // --- 核心：客户激活 ---
        async function doActivate() {
            const input = document.getElementById('activeCode').value.trim().toUpperCase();
            if(!input) return;
            try {
                const res = await fetch(`${API_BASE}/api/pay/success`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: input })
                });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem('ymtea_token', data.token);
                    alert("✅ 激活成功！");
                    location.reload();
                } else alert("❌ 激活码无效");
            } catch(e) { alert("服务器连接失败"); }
        }

        // --- 内容展示逻辑 ---
        async function loadContent() {
            try {
                const res = await fetch(`${API_BASE}/api/reports/list`);
                const data = await res.json();
                fullData.reports = data.filter(i => i.category !== 'tool');
                fullData.tools = data.filter(i => i.category === 'tool');
                renderReports(1); renderTools(1);
            } catch (e) { console.error(e); }
        }

        function renderItems(id, data, page, func) {
            const paged = data.slice((page-1)*10, page*10);
            document.getElementById(id).innerHTML = paged.map(r => `
                <div onclick="openItem(${r.id})" class="item-row flex justify-between items-center p-4 rounded-2xl bg-white/5">
                    <span class="text-sm ${r.is_top ? 'text-orange-400 font-bold' : 'text-zinc-300'}">${r.title} ${r.is_top ? '🚩' : ''}</span>
                    <span class="text-[10px] text-zinc-600">VIEW</span>
                </div>
            `).join('') || '暂无内容';
        }

        function renderReports(p) { renderItems('reportList', fullData.reports, p, 'renderReports'); }
        function renderTools(p) { renderItems('toolList', fullData.tools, p, 'renderTools'); }

        async function openItem(id) {
            const token = localStorage.getItem('ymtea_token');
            if(!token) return showPayModal();
            const res = await fetch(`${API_BASE}/api/reports/view/${id}`, { headers: { 'Authorization': token } });
            const data = await res.json();
            document.getElementById('readerBody').innerHTML = (data.data || "").replace(/```([\s\S]*?)```/g, '<pre class="bg-black p-4 rounded-xl my-4 text-orange-500 overflow-x-auto"><code>$1</code></pre>');
            document.getElementById('contentReader').classList.remove('hidden');
        }

        async function quickPublish() {
            const pass = document.getElementById('adminPass').value;
            const title = document.getElementById('quickTitle').value;
            const content = document.getElementById('quickContent').value;
            const sql = `INSERT INTO reports (title, content, category) VALUES ('${title}', '${content}', '${currentCategory}');`;
            const res = await fetch(`${API_BASE}/api/admin/publish`, {
                method: 'POST',
                headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                body: JSON.stringify({ sql })
            });
            if(res.ok) { alert("发布成功"); location.reload(); }
        }

        function copyText(t) {
            navigator.clipboard.writeText(t);
            alert("已复制: " + t);
        }

        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); }
        function showPayModal() { document.getElementById('payModal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function closeReader() { document.getElementById('contentReader').classList.add('hidden'); }
        function scrollToId(id) { document.getElementById(id).scrollIntoView({behavior:'smooth'}); }
        function setCategory(c) { 
            currentCategory = c;
            document.getElementById('cat_report').className = c === 'report' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500';
            document.getElementById('cat_tool').className = c === 'tool' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500';
        }
    </script>
</body>
</html>
