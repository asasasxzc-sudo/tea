<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 商业情报终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-text { background: linear-gradient(135deg, #fb923c, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn { @apply flex-1 py-5 text-[11px] font-black uppercase tracking-[0.2em] transition-all hover:bg-white/5; }
        .radar-card { border-left: 3px solid transparent; transition: all 0.3s; }
        .radar-card:hover { border-left-color: #f97316; background: rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="sticky top-0 z-40 w-full border-b border-white/10 bg-black/90 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter cursor-pointer" ondblclick="toggleAdmin()">
                <span class="gold-text">YMTEA</span> <span class="text-white">HUB</span>
            </div>
            <div id="statusLabel" class="text-[9px] font-mono px-2 py-1 rounded bg-zinc-800 text-zinc-400 border border-white/10 uppercase tracking-widest">GUEST_MODE</div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 py-8 space-y-8 fade-in">
        <div class="glass rounded-[2rem] p-6 shadow-2xl">
            <h2 class="text-xs font-bold text-orange-500 mb-5 flex items-center gap-2 tracking-widest uppercase">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-500 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-orange-600"></span>
                </span>
                全球贸易实时雷达 (Live)
            </h2>
            <div id="trendList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 min-h-[160px]">
                </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass p-6 md:p-8 rounded-[2.5rem] flex flex-col min-h-[500px]">
                <h3 class="font-bold text-xl mb-6 text-white flex items-center gap-2"><span class="w-1.5 h-6 bg-orange-600 rounded-full"></span> 核心情报目录</h3>
                <div id="reportList" class="flex-grow space-y-3"></div>
                <div id="reportPagination" class="flex justify-center gap-2 mt-6"></div>
            </div>
            <div class="glass p-6 md:p-8 rounded-[2.5rem] flex flex-col min-h-[500px]">
                <h3 class="font-bold text-xl mb-6 text-white flex items-center gap-2"><span class="w-1.5 h-6 bg-orange-600 rounded-full"></span> 生产力工具库</h3>
                <div id="toolList" class="flex-grow space-y-3"></div>
                <div id="toolPagination" class="flex justify-center gap-2 mt-6"></div>
                <button onclick="showPayModal()" id="proBtn" class="mt-8 w-full py-4 bg-orange-600 rounded-2xl text-[11px] font-black uppercase text-white shadow-lg">Upgrade to Pro</button>
            </div>
        </div>
    </main>

    <footer class="w-full py-12 border-t border-white/5 bg-zinc-950/50 mt-20">
        <div class="max-w-7xl mx-auto px-8 grid grid-cols-1 md:grid-cols-3 gap-12">
            <div class="space-y-4">
                <div class="text-2xl font-black text-white tracking-tighter"><span class="gold-text">YMTEA</span> HUB</div>
                <p class="text-zinc-500 text-xs leading-relaxed">云茗荟旗下高端情报分发终端。基于加密协议提供专业私密数据支持。</p>
            </div>
            <div class="space-y-4 text-xs">
                <div class="text-white font-bold uppercase tracking-widest">服务状态</div>
                <div class="flex justify-between p-3 bg-white/5 rounded-xl border border-white/5">
                    <span class="text-zinc-400 text-[10px]">加密节点连接</span>
                    <span class="text-green-500 font-mono text-[10px]">ONLINE</span>
                </div>
                <div class="flex justify-between p-3 bg-white/5 rounded-xl border border-white/5">
                    <span class="text-zinc-400 text-[10px]">数据更新频率</span>
                    <span class="text-orange-500 font-mono text-[10px]">5m / Sync</span>
                </div>
            </div>
            <div class="flex justify-between md:justify-end gap-16">
                <div class="space-y-3">
                    <div class="text-white text-xs font-bold uppercase tracking-widest">官方支持</div>
                    <a href="https://work.weixin.qq.com/kfid/kfcab9eba83e85cde3e" class="block text-zinc-400 hover:text-orange-500 text-[11px] transition">联系客服</a>
                    <a href="#" class="block text-zinc-400 hover:text-orange-500 text-[11px] transition">使用说明</a>
                </div>
            </div>
        </div>
    </footer>

    <div id="contentReader" class="fixed inset-0 z-[60] hidden bg-black/90 items-center justify-center p-4 backdrop-blur-xl">
        <div class="bg-zinc-900 w-full max-w-4xl h-[80vh] rounded-[2.5rem] flex flex-col border border-white/10 overflow-hidden">
            <div class="p-6 border-b border-white/5 flex justify-between items-center text-white">
                <h2 id="readerTitle" class="font-black text-sm uppercase text-orange-500">Document</h2>
                <button onclick="closeReader()">✕</button>
            </div>
            <div id="readerBody" class="flex-grow overflow-y-auto p-8 text-zinc-300 leading-relaxed text-sm select-text"></div>
        </div>
    </div>

    <script>
        const API_BASE = "https://s1.ymtea.club";
        
        function refreshRadar() {
            const radarPool = [
                { t: "🚢 美西港口吞吐预警", s: "DELAYED", c: "text-red-500" },
                { t: "🤖 AI 投放转化回报率", s: "+14.2%", c: "text-green-500" },
                { t: "📦 达拉斯分拨中心扩容", s: "LIVE", c: "text-blue-500" },
                { t: "💡 TikTok Shop 英国禁售", s: "URGENT", c: "text-orange-600" },
                { t: "🚀 巴西海外仓新规发布", s: "STABLE", c: "text-cyan-500" },
                { t: "📉 欧线集装箱运费回落", s: "-8.4%", c: "text-green-400" },
                { t: "🔥 东南亚斋月消费爆表", s: "PEAK", c: "text-red-400" },
                { t: "⚓️ 宁波舟山港泊位拥堵", s: "HEAVY", c: "text-yellow-500" },
                { t: "📦 极兔沙特中转场启用", s: "ONLINE", c: "text-emerald-400" },
                { t: "📱 iPhone 印度产能提升", s: "UPDATE", c: "text-indigo-400" }
            ];
            const trendList = document.getElementById('trendList');
            // 随机打乱并精准抓取 6 条，确保前台满格
            const shuffled = radarPool.sort(() => 0.5 - Math.random()).slice(0, 6);
            trendList.innerHTML = shuffled.map(item => `
                <div class="p-4 rounded-2xl bg-white/5 border border-white/5 radar-card flex justify-between items-center fade-in">
                    <span class="text-[11px] text-zinc-300 font-medium truncate pr-2">${item.t}</span>
                    <span class="text-[10px] ${item.c} font-black font-mono tracking-tighter shrink-0">${item.s}</span>
                </div>
            `).join('');
        }

        function getRemainingDays(token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                const exp = payload.exp || payload.expires;
                if (!exp) return null;
                const days = Math.ceil((exp - Math.floor(Date.now() / 1000)) / 86400);
                return days > 0 ? days : 0;
            } catch (e) { return null; }
        }

        async function loadContent() {
            try {
                const res = await fetch(`${API_BASE}/api/reports/list`);
                const data = await res.json();
                const reports = data.filter(i => i.category !== 'tool');
                const tools = data.filter(i => i.category === 'tool');
                
                document.getElementById('reportList').innerHTML = reports.slice(0, 11).map(r => `
                    <div class="flex justify-between items-center p-4 glass rounded-xl border border-white/5 group">
                        <div onclick="openReport(${r.id})" class="cursor-pointer text-[13px] text-zinc-200 group-hover:text-orange-400 transition">${r.title}</div>
                    </div>
                `).join('');
                
                document.getElementById('toolList').innerHTML = tools.map(r => `
                    <div onclick="openReport(${r.id})" class="flex items-center gap-4 p-4 glass rounded-xl border border-white/5 hover:bg-orange-600/10 cursor-pointer transition">
                        <div class="w-8 h-8 rounded-lg bg-zinc-900 flex items-center justify-center text-orange-600">⚡</div>
                        <div class="text-[13px] text-zinc-100 font-bold">${r.title}</div>
                    </div>
                `).join('');
            } catch (e) { console.error("Data Load Failed"); }
        }

        async function openReport(id) {
            const token = localStorage.getItem('ymtea_token');
            if(!token) { showPayModal(); return; }
            const res = await fetch(`${API_BASE}/api/reports/view/${id}`, { headers: { 'Authorization': token } });
            if(res.status === 403) { showPayModal(); return; }
            const result = await res.json();
            document.getElementById('readerBody').innerText = result.data;
            document.getElementById('contentReader').classList.replace('hidden', 'flex');
        }

        function showPayModal() { /* ... */ }
        function closeReader() { document.getElementById('contentReader').classList.replace('flex', 'hidden'); }

        window.onload = () => {
            refreshRadar();
            loadContent();
            const token = localStorage.getItem('ymtea_token');
            if(token) {
                const days = getRemainingDays(token);
                const label = document.getElementById('statusLabel');
                label.innerText = days !== null ? `PRO_ACCESS | 剩余 ${days} 天` : "PRO_ACCESS | 授权有效";
                label.className = "text-[9px] font-mono px-2 py-1 rounded bg-orange-500/10 text-orange-500 border border-orange-500/20";
                if(document.getElementById('proBtn')) document.getElementById('proBtn').style.display = 'none';
            }
        };
    </script>
</body>
</html>
