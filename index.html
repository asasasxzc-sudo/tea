<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 商业情报终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 160px; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .gold-text { background: linear-gradient(135deg, #fb923c, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bottom-fixed { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; }
        .pricing-bar { background: rgba(10,10,10,0.95); border-top: 1px solid rgba(255,255,255,0.05); padding: 10px 20px; display: flex; justify-content: center; gap: 30px; backdrop-filter: blur(15px); }
        .bottom-nav { height: 70px; background: #000; border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-around; }
        .item-row { transition: 0.2s; border: 1px solid rgba(255,255,255,0.03); }
        .item-row:hover { background: rgba(255,255,255,0.06); border-color: #f9731655; }
        #readerBody code { background: #000; border: 1px solid #333; padding: 1rem; border-radius: 10px; display: block; font-family: monospace; color: #f97316; overflow-x: auto; margin: 1rem 0; }
        .custom-scroll::-webkit-scrollbar { width: 2px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-[150] w-full border-b border-white/10 bg-black/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter cursor-pointer" ondblclick="toggleAdmin()">
                <span class="gold-text">YMTEA</span> <span class="text-white">HUB</span>
            </div>
            <div id="statusLabel" class="text-[9px] font-mono px-2 py-1 rounded bg-zinc-900 text-zinc-500 border border-white/10 uppercase">Auth_Checking...</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-8">
        <div class="glass rounded-[2rem] p-6">
            <div class="flex justify-between items-center mb-6">
                <span class="text-[10px] font-bold text-orange-500 uppercase tracking-widest flex items-center gap-2">
                    <span class="h-2 w-2 rounded-full bg-orange-500 animate-pulse"></span> Intelligence Radar
                </span>
            </div>
            <div id="trendList" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section id="section-intel" class="glass p-6 md:p-8 rounded-[2.5rem] flex flex-col min-h-[500px]">
                <h2 class="font-black text-white mb-6">核心情报 Intel</h2>
                <div id="reportList" class="flex-grow space-y-3">数据载入中...</div>
                <div id="reportPagination" class="flex justify-center gap-1 mt-6"></div>
            </section>
            <section id="section-tools" class="glass p-6 md:p-8 rounded-[2.5rem] flex flex-col min-h-[500px]">
                <h2 class="font-black text-white mb-6">生产力工具 Tools</h2>
                <div id="toolList" class="flex-grow space-y-3">系统准备中...</div>
                <div id="toolPagination" class="flex justify-center gap-1 mt-6"></div>
            </section>
        </div>
    </main>

    <div class="bottom-fixed">
        <div class="pricing-bar">
            <div class="flex items-center gap-2"><span class="text-[9px] font-bold text-zinc-500">Pro Monthly</span><span class="text-[10px] font-black text-orange-500 italic">￥78</span></div>
            <div class="h-3 w-[1px] bg-white/10"></div>
            <div class="flex items-center gap-2"><span class="text-[9px] font-bold text-zinc-500">Pro Yearly</span><span class="text-[10px] font-black text-orange-500 italic">￥730</span></div>
        </div>
        <footer class="bottom-nav">
            <button onclick="scrollToId('section-intel')" class="text-[11px] font-black text-zinc-500 uppercase tracking-widest">情报</button>
            <button onclick="scrollToId('section-tools')" class="text-[11px] font-black text-zinc-500 uppercase tracking-widest">工具</button>
            <button onclick="showPayModal()" class="px-5 py-2 bg-zinc-900 border border-white/10 rounded-full text-[10px] font-black text-white uppercase">激活</button>
            <a href="https://vip.ymtea.club" class="text-[11px] font-black text-orange-500 uppercase tracking-widest">云茗荟</a>
        </footer>
    </div>

    <div id="contentReader" class="fixed inset-0 z-[300] hidden bg-black flex items-center justify-center p-4">
        <div class="bg-zinc-900 w-full h-full md:max-w-4xl md:h-[85vh] md:rounded-[3rem] flex flex-col border border-white/10 overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <span id="readerTitle" class="text-orange-500 font-bold text-[10px] uppercase tracking-widest">Analysis Report</span>
                <button onclick="closeReader()" class="text-white text-xl">✕</button>
            </div>
            <div id="readerBody" class="flex-grow overflow-y-auto p-8 md:p-12 text-zinc-200 text-sm leading-relaxed custom-scroll select-text"></div>
        </div>
    </div>

    <div id="adminPanel" class="fixed inset-0 z-[250] hidden bg-black/98 items-center justify-center p-4">
        <div class="bg-zinc-900 border border-white/10 p-8 rounded-[3rem] w-full max-w-2xl max-h-[90vh] overflow-y-auto custom-scroll">
            <div class="flex justify-between items-center mb-6">
                <span class="text-white font-black text-xs tracking-widest uppercase">Console Center</span>
                <button onclick="toggleAdmin()" class="text-zinc-600">EXIT</button>
            </div>
            
            <div class="space-y-4">
                <input type="password" id="adminPass" placeholder="Admin Secret Key" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white text-xs outline-none">
                
                <div class="p-5 bg-orange-600/5 border border-orange-600/20 rounded-2xl space-y-3">
                    <div class="text-[10px] font-bold text-orange-500 uppercase">Code Injector</div>
                    <div class="flex gap-2">
                        <input type="email" id="targetEmail" placeholder="用户邮箱" class="flex-grow bg-black border border-white/5 p-3 rounded-xl text-xs text-white">
                        <input type="text" id="customCode" placeholder="激活码(留空随机)" class="w-36 bg-black border border-white/5 p-3 rounded-xl text-xs text-white">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="manualAddCode()" class="flex-1 py-3 bg-orange-600 rounded-xl text-[10px] font-black text-white uppercase">生成并入库</button>
                        <button onclick="fetchCodes()" class="flex-1 py-3 border border-zinc-700 rounded-xl text-[10px] font-black text-zinc-500 uppercase">查询所有码</button>
                    </div>
                    <div id="codeDisplay" class="max-h-32 overflow-y-auto text-[9px] font-mono text-zinc-500 bg-black/50 p-2 rounded italic">等待查询指令...</div>
                </div>

                <div class="p-5 bg-zinc-800/20 border border-white/5 rounded-2xl space-y-4">
                    <div class="text-[10px] font-bold text-zinc-400 uppercase">Editor <span id="editingId" class="text-orange-500 ml-2"></span></div>
                    <div class="flex gap-2">
                        <button onclick="setCategory('report')" id="cat_report" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white">情报分类</button>
                        <button onclick="setCategory('tool')" id="cat_tool" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500">工具分类</button>
                    </div>
                    <input type="text" id="quickTitle" placeholder="文章标题" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white text-xs">
                    <textarea id="quickContent" rows="6" placeholder="正文内容..." class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white text-xs font-mono"></textarea>
                    <div class="flex items-center justify-between px-2">
                        <label class="flex items-center gap-2 text-[10px] text-zinc-500"><input type="checkbox" id="isTopCheck" class="accent-orange-600"> 强制置顶</label>
                        <button onclick="cancelEdit()" id="cancelEditBtn" class="hidden text-[10px] text-zinc-600 underline uppercase">取消修改</button>
                    </div>
                    <button onclick="quickPublish()" id="publishBtn" class="w-full py-4 bg-orange-700 rounded-2xl font-black text-xs text-white uppercase tracking-widest">确认发布/更新</button>
                </div>
            </div>
        </div>
    </div>

    <div id="payModal" class="fixed inset-0 z-[400] hidden bg-black/95 flex items-center justify-center p-6">
        <div class="max-w-xs w-full text-center">
            <h2 class="text-2xl font-black text-white mb-6 italic tracking-tighter uppercase">Activate License</h2>
            <input type="text" id="activeCode" placeholder="请输入激活码" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-2xl text-white text-center mb-4 font-mono">
            <button onclick="doActivate()" class="w-full py-4 bg-orange-600 rounded-2xl text-white font-black uppercase shadow-xl">激活专业权限</button>
            <button onclick="closeModal('payModal')" class="mt-8 text-zinc-800 text-[10px] font-black uppercase underline">返回主页</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://s1.ymtea.club";
        let currentCategory = 'report';
        let fullData = { reports: [], tools: [] };
        let currentEditId = null;

        // 1. 初始化加载
        async function loadContent() {
            try {
                const res = await fetch(`${API_BASE}/api/reports/list`);
                const data = await res.json();
                if(!Array.isArray(data)) throw new Error();
                
                const sorted = data.sort((a,b) => (b.is_top||0) - (a.is_top||0) || b.id - a.id);
                fullData.reports = sorted.filter(i => i.category !== 'tool');
                fullData.tools = sorted.filter(i => i.category === 'tool');
                
                renderReports(1);
                renderTools(1);
            } catch (e) {
                document.getElementById('reportList').innerHTML = '<div class="text-red-900 text-[10px] py-10 uppercase text-center font-bold">API Sync Failed - 请检查Worker配置</div>';
            }
        }

        function renderItems(containerId, data, page, func) {
            const size = 10;
            const paged = data.slice((page-1)*size, page*size);
            const isTool = containerId === 'toolList';
            
            document.getElementById(containerId).innerHTML = paged.map(r => `
                <div class="item-row flex justify-between items-center p-4 rounded-2xl bg-white/5 border border-white/5">
                    <div onclick="openItem(${r.id})" class="flex-grow cursor-pointer flex items-center gap-3">
                        ${isTool ? '<div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center text-orange-500 text-[10px]">⚡</div>' : ''}
                        <div>
                            <div class="text-sm ${r.is_top ? 'text-orange-400 font-bold' : 'text-zinc-200'}">${r.title} ${r.is_top ? '🚩' : ''}</div>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="prepareEdit(${r.id}, '${isTool ? 'tool' : 'report'}')" class="text-[9px] text-zinc-600 font-bold uppercase hover:text-white">Edit</button>
                        <button onclick="handleDelete(${r.id})" class="text-[9px] text-zinc-900 font-black uppercase hover:text-red-900">Del</button>
                    </div>
                </div>
            `).join('') || '<div class="py-10 text-center text-zinc-800 text-[10px]">空空如也</div>';
            renderPagination(isTool ? 'toolPagination' : 'reportPagination', data.length, size, page, func);
        }

        function renderReports(p) { renderItems('reportList', fullData.reports, p, 'renderReports'); }
        function renderTools(p) { renderItems('toolList', fullData.tools, p, 'renderTools'); }

        // 2. 激活码管理
        async function manualAddCode() {
            const pass = document.getElementById('adminPass').value;
            const email = document.getElementById('targetEmail').value;
            const code = document.getElementById('customCode').value || ('YM' + Math.random().toString(36).substr(2, 8).toUpperCase());
            if(!pass || !email) return alert("Secret/Email 不能为空");
            
            // 重要：这里使用更兼容的 SQL 格式
            const sql = `INSERT INTO codes (email, code) VALUES ('${email}', '${code}');`;
            try {
                const res = await fetch(`${API_BASE}/api/admin/publish`, {
                    method: 'POST',
                    headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql })
                });
                if(res.ok) { alert("生成成功: " + code); fetchCodes(); }
                else alert("生成失败 - 请检查 Secret 是否正确");
            } catch(e) { alert("网络错误"); }
        }

        async function fetchCodes() {
            const pass = document.getElementById('adminPass').value;
            if(!pass) return alert("请输入 Secret");
            const sql = "SELECT * FROM codes ORDER BY id DESC LIMIT 50;";
            try {
                const res = await fetch(`${API_BASE}/api/admin/publish`, {
                    method: 'POST',
                    headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql })
                });
                const result = await res.json();
                if(result.results) {
                    document.getElementById('codeDisplay').innerHTML = result.results.map(i => `<span class="text-white">${i.email}</span>: <span class="text-orange-500">${i.code}</span>`).join('<br>');
                }
            } catch(e) { alert("查询失败"); }
        }

        // 3. 文章编辑/发布
        async function prepareEdit(id, cat) {
            const list = cat === 'tool' ? fullData.tools : fullData.reports;
            const item = list.find(i => i.id === id);
            if(!item) return;
            
            currentEditId = id;
            setCategory(cat);
            document.getElementById('quickTitle').value = item.title;
            document.getElementById('isTopCheck').checked = (item.is_top == 1);
            document.getElementById('editingId').innerText = `[正在修改 ID: ${id}]`;
            document.getElementById('publishBtn').innerText = "保存更改";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            
            // 获取正文
            const token = localStorage.getItem('ymtea_token') || "";
            const res = await fetch(`${API_BASE}/api/reports/view/${id}`, { headers: { 'Authorization': token } });
            const result = await res.json();
            document.getElementById('quickContent').value = result.data || "";
            
            if(!document.getElementById('adminPanel').classList.contains('flex')) toggleAdmin();
        }

        function cancelEdit() {
            currentEditId = null;
            document.getElementById('quickTitle').value = "";
            document.getElementById('quickContent').value = "";
            document.getElementById('editingId').innerText = "";
            document.getElementById('publishBtn').innerText = "发布文章";
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        async function quickPublish() {
            const pass = document.getElementById('adminPass').value;
            const title = document.getElementById('quickTitle').value.replace(/'/g, "''");
            const content = document.getElementById('quickContent').value.replace(/'/g, "''");
            const isTop = document.getElementById('isTopCheck').checked ? 1 : 0;
            if(!pass || !title) return alert("信息不完整");

            let sql = currentEditId 
                ? `UPDATE reports SET title='${title}', content='${content}', category='${currentCategory}', is_top=${isTop} WHERE id=${currentEditId};`
                : `INSERT INTO reports (title, content, category, is_top) VALUES ('${title}', '${content}', '${currentCategory}', ${isTop});`;

            const res = await fetch(`${API_BASE}/api/admin/publish`, {
                method: 'POST',
                headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                body: JSON.stringify({ sql })
            });
            if(res.ok) { alert("操作成功"); location.reload(); }
            else alert("发布失败，请检查 Secret");
        }

        async function handleDelete(id) {
            const pass = prompt("确认删除？请输入 Secret:");
            if(!pass) return;
            const sql = `DELETE FROM reports WHERE id=${id};`;
            await fetch(`${API_BASE}/api/admin/publish`, {
                method: 'POST',
                headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                body: JSON.stringify({ sql })
            });
            location.reload();
        }

        // 基础交互逻辑
        async function openItem(id) {
            const token = localStorage.getItem('ymtea_token');
            if (!token) return showPayModal();
            try {
                const res = await fetch(`${API_BASE}/api/reports/view/${id}`, { headers: { 'Authorization': token } });
                const result = await res.json();
                document.getElementById('readerBody').innerHTML = (result.data || "").replace(/```([\s\S]*?)```/g, '<code>$1</code>');
                document.getElementById('contentReader').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } catch (e) { alert("加载正文失败，请重试"); }
        }

        async function doActivate() {
            const code = document.getElementById('activeCode').value;
            const res = await fetch(`${API_BASE}/api/pay/success`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'manual', code })
            });
            const data = await res.json();
            if(data.success) { localStorage.setItem('ymtea_token', data.token); location.reload(); }
            else alert("激活码无效或已被使用");
        }

        function refreshRadar() {
            const data = ["TK政策趋势", "FBA费率波动", "美向海关预警", "VAT合规检查", "广告投放ROAS", "全球汇率实时"];
            document.getElementById('trendList').innerHTML = data.sort(() => .5-Math.random()).slice(0,4).map(i => `
                <div class="p-3 bg-white/5 rounded-xl border border-white/5 flex justify-between items-center">
                    <span class="text-[10px] text-zinc-400 font-bold">${i}</span>
                    <span class="text-[8px] text-orange-500 font-mono">LIVE</span>
                </div>
            `).join('');
        }

        function renderPagination(tid, total, size, current, func) {
            const pages = Math.ceil(total / size);
            const container = document.getElementById(tid);
            if (!container || pages <= 1) { if(container) container.innerHTML=''; return; }
            let html = '';
            for (let i = 1; i <= pages; i++) {
                html += `<button onclick="${func}(${i})" class="w-6 h-6 rounded text-[9px] font-black ${i === current ? 'bg-orange-600 text-white' : 'bg-white/5 text-zinc-600'}">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); document.getElementById('adminPanel').classList.toggle('flex'); }
        function showPayModal() { document.getElementById('payModal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function closeReader() { document.getElementById('contentReader').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        function scrollToId(id) { document.getElementById(id).scrollIntoView({behavior:'smooth'}); }
        function copyContact() { navigator.clipboard.writeText("YMTEA_HUB"); alert("客服微信已复制"); }
        function setCategory(cat) { 
            currentCategory = cat; 
            document.getElementById('cat_report').className = cat === 'report' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500';
            document.getElementById('cat_tool').className = cat === 'tool' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500';
        }

        window.onload = () => {
            refreshRadar();
            loadContent();
            if(localStorage.getItem('ymtea_token')) {
                document.getElementById('statusLabel').innerText = "PRO_ACCESS_ACTIVE";
                document.getElementById('statusLabel').classList.replace('text-zinc-500', 'text-orange-500');
            } else {
                document.getElementById('statusLabel').innerText = "GUEST_PREVIEW";
            }
        };
    </script>
</body>
</html>
