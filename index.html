<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 商业情报终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
        .gold-text { background: linear-gradient(135deg, #fb923c, #c2410c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .modal-active { overflow: hidden; height: 100vh; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="sticky top-0 z-40 w-full border-b border-white/5 bg-black/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter cursor-pointer select-none" ondblclick="toggleAdmin()">
                <span class="gold-text">YMTEA</span> <span class="text-white">HUB</span>
            </div>
            <div id="statusLabel" class="text-[10px] font-mono px-2 py-1 rounded bg-zinc-800 text-gray-500 border border-white/5 uppercase">GUEST_MODE</div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 py-8 space-y-8 fade-in">
        <section class="text-center py-6">
            <h1 class="text-3xl md:text-5xl font-black mb-4 leading-tight tracking-tight text-white">内容即资产，<span class="gold-text">情报即先机</span></h1>
            <p class="text-zinc-500 text-xs md:text-sm tracking-widest uppercase font-bold">Global Trade Data • AI Radar • Arbitrage Guide</p>
        </section>

        <div class="glass rounded-3xl p-6">
            <h2 class="text-xs font-bold text-orange-500 mb-4 flex items-center gap-2 tracking-widest uppercase">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-orange-500"></span>
                </span>
                实时全球贸易雷达
            </h2>
            <div id="trendList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="p-3 border border-white/5 rounded-xl bg-white/5 flex justify-between items-center">
                    <span class="text-[11px] text-zinc-400">美线运费指数波动监测</span>
                    <span class="text-[10px] text-green-500 font-mono">ON_TRACK</span>
                </div>
                <div class="p-3 border border-white/5 rounded-xl bg-white/5 flex justify-between items-center">
                    <span class="text-[11px] text-zinc-400">AI 选品逻辑库 v4.2</span>
                    <span class="text-[10px] text-orange-500 font-mono">SYNCING...</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-12">
            <div class="glass p-8 rounded-[2.5rem] flex flex-col min-h-[500px]">
                <h3 class="font-bold text-xl mb-3 text-white">🌐 核心情报目录</h3>
                <p class="text-[10px] text-zinc-500 mb-6 uppercase tracking-widest">所有已发布的深度解析报告</p>
                <div id="reportList" class="flex-grow space-y-3 overflow-y-auto pr-2 custom-scroll">
                    <div class="text-zinc-800 text-xs italic py-10 text-center">正在检索情报库...</div>
                </div>
            </div>

            <div class="glass p-8 rounded-[2.5rem] flex flex-col min-h-[500px]">
                <h3 class="font-bold text-xl mb-3 text-white">🛠️ 生产力工具 & 脚本</h3>
                <p class="text-[10px] text-zinc-500 mb-6 uppercase tracking-widest">自动化爬虫及私有代码库 (PRO)</p>
                <div id="toolList" class="flex-grow space-y-3 overflow-y-auto pr-2 custom-scroll">
                    <div class="text-zinc-800 text-xs italic py-10 text-center">正在同步工具库...</div>
                </div>
                <button onclick="showPayModal()" id="proBtn" class="mt-6 w-full py-4 bg-zinc-900 border border-white/5 rounded-2xl text-xs font-bold hover:bg-orange-700 transition-all text-white shadow-lg">
                    升级 PRO 解锁全部工具权限
                </button>
            </div>
        </div>
    </main>

    <div id="payModal" class="fixed inset-0 z-50 hidden bg-black/95 backdrop-blur-xl items-center justify-center p-4">
        <div class="max-w-xl w-full fade-in">
            <div class="text-center mb-8"><h2 class="text-2xl font-black text-white">订阅专业版</h2></div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-zinc-900 border border-white/5 p-6 rounded-[2rem] text-center group hover:border-orange-500/50 transition">
                    <div class="text-3xl font-black mb-4 text-white">¥38</div>
                    <button onclick="startPay('monthly')" class="w-full py-2 bg-zinc-800 rounded-lg text-xs font-bold text-white group-hover:bg-zinc-700">月度激活</button>
                </div>
                <div class="bg-zinc-900 border-2 border-orange-500 p-6 rounded-[2rem] text-center shadow-2xl shadow-orange-500/10">
                    <div class="text-3xl font-black mb-4 text-white">¥199</div>
                    <button onclick="startPay('yearly')" class="w-full py-2 bg-orange-600 rounded-lg text-xs font-bold text-white hover:bg-orange-500">年度激活</button>
                </div>
            </div>
            <button onclick="closeModal('payModal')" class="w-full mt-8 text-zinc-600 text-[10px] uppercase tracking-widest hover:text-zinc-400">取消</button>
        </div>
    </div>

    <div id="contentReader" class="fixed inset-0 z-[60] hidden bg-black items-center justify-center p-0 md:p-6 backdrop-blur-3xl">
        <div class="bg-zinc-900 w-full h-full md:max-w-4xl md:h-[85vh] md:rounded-[2.5rem] flex flex-col relative border border-white/5">
            <div class="p-6 border-b border-white/5 flex justify-between items-center text-white">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></span>
                    <h2 id="readerTitle" class="font-bold">加密数据</h2>
                </div>
                <button onclick="closeReader()" class="text-xl p-2">✕</button>
            </div>
            <div id="readerBody" class="flex-grow overflow-y-auto p-8 md:p-12 text-zinc-300 leading-relaxed whitespace-pre-wrap select-text custom-scroll"></div>
            <div class="p-4 text-center border-t border-white/5">
                <p class="text-[9px] text-zinc-600 font-mono uppercase tracking-widest">YMTEA INTERNAL HUB PROTECTION</p>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="fixed inset-0 z-50 hidden bg-black/98 items-center justify-center p-4">
        <div class="bg-zinc-900 border border-white/10 p-8 rounded-[2.5rem] w-full max-w-md">
            <div class="flex justify-between items-center mb-6 text-white"><h2 class="font-black">系统管理终端</h2><button onclick="toggleAdmin()">✕</button></div>
            <div class="space-y-4">
                <input type="password" id="adminPass" placeholder="管理密钥" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-sm text-white outline-none focus:border-orange-500">
                
                <div class="border-t border-white/5 pt-4">
                    <label class="text-[10px] text-zinc-500 mb-2 block uppercase tracking-widest">发布位置选择</label>
                    <div class="flex gap-2 mb-4">
                        <button onclick="setCategory('report')" id="cat_report" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white transition">情报库(左)</button>
                        <button onclick="setCategory('tool')" id="cat_tool" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500 transition">工具箱(右)</button>
                    </div>
                    <input type="text" id="quickTitle" placeholder="文章或脚本标题" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-sm text-white mb-2 outline-none focus:border-orange-400">
                    <textarea id="quickContent" rows="5" placeholder="在此粘贴内容、代码说明或下载链接..." class="w-full bg-black border border-white/10 p-4 rounded-2xl text-sm text-white outline-none focus:border-orange-400"></textarea>
                    <button onclick="quickPublish()" class="w-full py-4 bg-orange-700 rounded-2xl font-bold text-white mt-4 hover:bg-orange-600 active:scale-95 transition">一键同步云端</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 配置：务必修改为你的自定义域名
        const API_BASE = "https://s1.ymtea.club"; 
        let currentCategory = 'report';

        function setCategory(cat) {
            currentCategory = cat;
            document.getElementById('cat_report').className = cat === 'report' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white shadow-lg' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500';
            document.getElementById('cat_tool').className = cat === 'tool' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white shadow-lg' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500';
        }

        async function loadContent() {
            try {
                const res = await fetch(`${API_BASE}/api/reports/list`);
                const data = await res.json();
                const reportBox = document.getElementById('reportList');
                const toolBox = document.getElementById('toolList');
                
                // 数据分类渲染
                const reports = data.filter(i => i.category === 'report');
                const tools = data.filter(i => i.category === 'tool');

                reportBox.innerHTML = reports.map(r => `
                    <div onclick="openReport(${r.id}, '${r.title}')" class="flex justify-between items-center p-4 glass rounded-2xl cursor-pointer hover:border-orange-500/30 transition-all border border-white/5 group">
                        <span class="text-xs text-zinc-300 group-hover:text-orange-400 transition-colors">${r.title}</span>
                        <span class="text-[9px] text-zinc-700 font-mono">${new Date(r.created_at).toLocaleDateString()}</span>
                    </div>
                `).join('') || '<div class="text-zinc-800 text-[10px] text-center py-10 italic">情报库为空</div>';

                toolBox.innerHTML = tools.map(r => `
                    <div onclick="openReport(${r.id}, '${r.title}')" class="flex items-center gap-4 p-4 glass rounded-2xl cursor-pointer hover:bg-orange-600/10 transition-all border border-white/5 group">
                        <div class="w-10 h-10 rounded-xl bg-zinc-800 flex items-center justify-center text-orange-500 group-hover:bg-orange-500 group-hover:text-white transition">🚀</div>
                        <div class="flex-grow">
                            <div class="text-[11px] text-zinc-200 font-bold group-hover:text-orange-400">${r.title}</div>
                            <div class="text-[9px] text-zinc-600">点击查看下载链接或操作说明</div>
                        </div>
                    </div>
                `).join('') || '<div class="text-zinc-800 text-[10px] text-center py-10 italic">工具库待更新</div>';

            } catch (e) { 
                console.error("数据拉取失败");
                document.getElementById('reportList').innerHTML = '<div class="text-red-900/50 text-[10px] text-center py-10 italic">API 链接异常</div>';
            }
        }

        async function openReport(id, title) {
            const token = localStorage.getItem('ymtea_token');
            if (!token) return showPayModal();
            try {
                const res = await fetch(`${API_BASE}/api/reports/view/${id}`, { headers: { 'Authorization': token } });
                if (res.status === 403) {
                    localStorage.removeItem('ymtea_token');
                    return showPayModal();
                }
                const result = await res.json();
                document.getElementById('readerTitle').innerText = title;
                document.getElementById('readerBody').innerText = result.data || "内容暂时无法获取";
                document.getElementById('contentReader').classList.replace('hidden', 'flex');
                document.body.classList.add('modal-active');
            } catch (e) { alert("网络连接超时"); }
        }

        async function quickPublish() {
            const pass = document.getElementById('adminPass').value;
            const title = document.getElementById('quickTitle').value;
            const content = document.getElementById('quickContent').value;
            if (!pass || !title || !content) return alert("字段不能为空");

            // 深度转义单引号
            const safeContent = content.replace(/'/g, "''");
            const safeTitle = title.replace(/'/g, "''");
            const sql = `INSERT INTO reports (title, content, category) VALUES ('${safeTitle}', '${safeContent}', '${currentCategory}');`;

            try {
                const res = await fetch(`${API_BASE}/api/admin/publish`, {
                    method: 'POST',
                    headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql: sql })
                });
                if (res.ok) { alert("✅ 内容已同步至云端"); location.reload(); }
                else { alert("❌ 密钥错误或系统异常"); }
            } catch (e) { alert("请求失败"); }
        }

        async function startPay(type) {
            const email = prompt("请输入您的会员邮箱（用于接收权限）：");
            if(!email) return;
            const code = prompt("请输入您的 8 位专属激活码：");
            if (!code) return;

            try {
                const res = await fetch(`${API_BASE}/api/pay/success`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, type, code })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('ymtea_token', data.token);
                    alert("🎉 激活成功！");
                    location.reload();
                } else { 
                    alert("❌ 失败：" + data.msg); 
                }
            } catch (e) { alert("激活系统繁忙"); }
        }

        // 基础交互函数
        function closeReader() { document.getElementById('contentReader').classList.replace('flex', 'hidden'); document.body.classList.remove('modal-active'); }
        function toggleAdmin() { const p = document.getElementById('adminPanel'); p.classList.toggle('hidden'); p.classList.toggle('flex'); }
        function showPayModal() { document.getElementById('payModal').classList.replace('hidden', 'flex'); document.body.classList.add('modal-active'); }
        function closeModal(id) { document.getElementById(id).classList.replace('flex', 'hidden'); document.body.classList.remove('modal-active'); }

        window.onload = () => {
            loadContent();
            if(localStorage.getItem('ymtea_token')) {
                const label = document.getElementById('statusLabel');
                label.innerText = "PRO_SUBSCRIBER";
                label.className = "text-[10px] font-mono px-2 py-1 rounded bg-orange-500/10 text-orange-500 border border-orange-500/20";
                const proBtn = document.getElementById('proBtn');
                if(proBtn) proBtn.style.display = 'none';
            }
        };
    </script>
</body>
</html>
