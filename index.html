<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 商业情报终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 70px; }
        .glass { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-text { background: linear-gradient(135deg, #fb923c, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .modal-active { overflow: hidden; height: 100vh; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        .nav-btn { @apply flex-1 py-5 text-[11px] font-black uppercase tracking-[0.2em] transition-all hover:bg-white/5 disabled:opacity-10; }
        #readerBody img { max-width: 100%; height: auto; border-radius: 1rem; margin: 1.5rem 0; }
        #readerBody p { margin-bottom: 1.2rem; line-height: 1.8; }
        /* 底部移动端导航 */
        .mobile-nav { display: none; }
        @media (max-width: 768px) {
            .mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: rgba(10,10,10,0.95); backdrop-blur: 20px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 45; }
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-40 w-full border-b border-white/10 bg-black/90 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter cursor-pointer" ondblclick="toggleAdmin()">
                <span class="gold-text">YMTEA</span> <span class="text-white">HUB</span>
            </div>
            <div id="statusLabel" class="text-[9px] font-mono px-2 py-1 rounded bg-zinc-800 text-zinc-400 border border-white/10">GUEST_MODE</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-8 fade-in">
        <div class="glass rounded-[2rem] p-6 shadow-inner">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xs font-bold text-orange-500 flex items-center gap-2 uppercase tracking-widest">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-500 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-orange-600"></span></span>
                    Live Radar
                </h2>
                <button onclick="refreshRadar()" class="text-[10px] text-zinc-500 uppercase font-bold">Refresh</button>
            </div>
            <div id="trendList" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div id="section_report" class="glass p-6 md:p-8 rounded-[2.5rem] flex flex-col min-h-[500px]">
                <h3 class="font-bold text-xl mb-6 text-white flex items-center gap-2"><span class="w-1.5 h-6 bg-orange-600 rounded-full"></span> 核心情报</h3>
                
                <div id="topSection" class="mb-6 space-y-3 hidden">
                    <div id="topList" class="space-y-3"></div>
                    <div class="border-b border-white/5 my-6"></div>
                </div>

                <div id="reportList" class="flex-grow space-y-3"></div>
                <div id="reportPagination" class="flex justify-center gap-2 mt-8 pt-4 border-t border-white/5"></div>
            </div>
            
            <div id="section_tool" class="glass p-6 md:p-8 rounded-[2.5rem] flex flex-col min-h-[500px]">
                <h3 class="font-bold text-xl mb-6 text-white flex items-center gap-2"><span class="w-1.5 h-6 bg-orange-600 rounded-full"></span> 生产力工具</h3>
                <div id="toolList" class="flex-grow space-y-3"></div>
                <div id="toolPagination" class="flex justify-center gap-2 mt-8 pt-4 border-t border-white/5"></div>
                <button onclick="showPayModal()" id="proBtn" class="mt-8 w-full py-4 bg-orange-600 rounded-2xl text-[11px] font-black uppercase text-white shadow-lg shadow-orange-900/20">Upgrade to Pro</button>
            </div>
        </div>
    </main>

    <div class="mobile-nav">
        <button onclick="document.getElementById('section_report').scrollIntoView({behavior:'smooth'})" class="flex-1 flex flex-col items-center justify-center gap-1 text-white">
            <span class="text-[10px] font-black uppercase tracking-tighter">情报</span>
        </button>
        <button onclick="document.getElementById('section_tool').scrollIntoView({behavior:'smooth'})" class="flex-1 flex flex-col items-center justify-center gap-1 text-zinc-500">
            <span class="text-[10px] font-black uppercase tracking-tighter">工具</span>
        </button>
    </div>

    <div id="adminPanel" class="fixed inset-0 z-50 hidden bg-black/98 items-center justify-center p-4">
        <div class="bg-zinc-900 border border-white/10 p-8 rounded-[3rem] w-full max-w-md">
            <div class="flex justify-between items-center mb-6 text-white font-black text-xs uppercase tracking-widest">
                <span id="adminTitle">Admin Terminal</span>
                <button onclick="toggleAdmin()">✕</button>
            </div>
            <div class="space-y-4">
                <input type="password" id="adminPass" placeholder="Admin Secret" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white">
                <div class="flex gap-2">
                    <button onclick="setCategory('report')" id="cat_report" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white">发布情报</button>
                    <button onclick="setCategory('tool')" id="cat_tool" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500">发布工具</button>
                </div>
                <input type="text" id="quickTitle" placeholder="Title" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white">
                <textarea id="quickContent" rows="4" placeholder="Content (HTML)" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white"></textarea>
                
                <div class="flex items-center gap-2 px-2">
                    <input type="checkbox" id="isTopCheck" class="w-4 h-4 accent-orange-600">
                    <label for="isTopCheck" class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Pin to Top (置顶)</label>
                </div>

                <button onclick="quickPublish()" class="w-full py-4 bg-orange-700 rounded-2xl font-black text-xs text-white uppercase">Sync To Cloud</button>
                <div class="pt-4 border-t border-white/5 flex gap-2">
                    <button onclick="generateTestCode('monthly')" class="flex-1 py-2 bg-zinc-800 rounded-xl text-[9px] text-zinc-400 font-bold uppercase">Code (M)</button>
                    <button onclick="generateTestCode('yearly')" class="flex-1 py-2 bg-zinc-800 rounded-xl text-[9px] text-zinc-400 font-bold uppercase">Code (Y)</button>
                </div>
                <input type="text" id="codeOutput" readonly class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-center text-orange-500 font-mono text-sm">
            </div>
        </div>
    </div>

    <div id="contentReader" class="fixed inset-0 z-[60] hidden bg-black items-center justify-center p-0 md:p-6 backdrop-blur-3xl">
        <div class="bg-zinc-900 w-full h-full md:max-w-4xl md:h-[85vh] md:rounded-[3rem] flex flex-col border border-white/10 overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-white/5 flex justify-between items-center text-white">
                <h2 id="readerTitle" class="font-black text-sm uppercase truncate pr-4 text-orange-500">Detail</h2>
                <button onclick="closeReader()" class="text-xl">✕</button>
            </div>
            <div id="readerBody" class="flex-grow overflow-y-auto p-8 md:p-12 text-zinc-200 leading-relaxed select-text text-sm md:text-base custom-scroll"></div>
            <div class="flex border-t border-white/5 bg-black/40 justify-between items-center">
                <button id="prevBtn" class="nav-btn border-r border-white/5">← PREV</button>
                <button id="nextBtn" class="nav-btn">NEXT →</button>
            </div>
        </div>
    </div>

    <div id="payModal" class="fixed inset-0 z-50 hidden bg-black/95 items-center justify-center p-4">
        <div class="max-w-xl w-full text-center">
            <h2 class="text-3xl font-black text-white uppercase tracking-tighter mb-4">Access Denied</h2>
            <p class="text-zinc-500 text-xs mb-8 uppercase">请联系客服支付并获取授权码</p>
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-6 rounded-[2rem]" onclick="startPay('monthly')">
                    <div class="text-2xl font-black text-white">¥78</div><div class="text-[9px] mt-2 text-zinc-500">Monthly</div>
                </div>
                <div class="border-2 border-orange-600 p-6 rounded-[2rem]" onclick="startPay('yearly')">
                    <div class="text-2xl font-black text-orange-500">¥730</div><div class="text-[9px] mt-2 text-orange-400">Yearly</div>
                </div>
            </div>
            <button onclick="closeModal('payModal')" class="mt-8 text-zinc-600 text-[10px] font-black uppercase">Close</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://s1.ymtea.club";
        let currentCategory = 'report';
        let fullData = { reports: [], tools: [] };
        let editTargetId = null;

        async function loadContent() {
            try {
                const res = await fetch(`${API_BASE}/api/reports/list`);
                const data = await res.json();
                fullData.reports = data.filter(i => i.category !== 'tool');
                fullData.tools = data.filter(i => i.category === 'tool');
                renderReportPage(1);
                renderToolPage(1);
            } catch (e) { console.error("Load failed", e); }
        }

        // 分页渲染逻辑：关键修复
        function renderPagination(targetId, total, size, current, funcName) {
            const pages = Math.ceil(total / size);
            const container = document.getElementById(targetId);
            if (!container) return;
            
            if (pages <= 1) { 
                container.innerHTML = `<span class="text-zinc-600 text-[10px] font-mono">END OF LIST</span>`; 
                return; 
            }

            let html = '';
            for (let i = 1; i <= pages; i++) {
                html += `<button onclick="${funcName}(${i})" class="px-4 py-2 rounded-xl text-[10px] font-mono font-black transition-all ${i === current ? 'bg-orange-600 text-white shadow-lg' : 'bg-white/5 text-zinc-500'}">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function renderReportPage(page) {
            const size = 10;
            const container = document.getElementById('reportList');
            const topListContainer = document.getElementById('topList');
            const topSection = document.getElementById('topSection');

            const topData = fullData.reports.filter(r => r.is_top == 1);
            const normalData = fullData.reports.filter(r => r.is_top != 1);
            const pageData = normalData.slice((page-1)*size, page*size);

            if (topData.length > 0 && page === 1) {
                topSection.classList.remove('hidden');
                topListContainer.innerHTML = topData.map(r => `
                    <div class="flex justify-between items-center p-5 bg-orange-600/5 rounded-2xl border border-orange-500/30 relative">
                        <div class="absolute top-0 left-0 w-1 h-full bg-orange-600"></div>
                        <div onclick="openReport(${r.id}, 'report')" class="flex-grow cursor-pointer pl-2">
                            <div class="flex items-center gap-2">
                                <span class="text-[13px] text-white font-bold">${r.title}</span>
                                <span class="text-[9px] bg-orange-600 text-white px-1 py-0.5 rounded font-black">TOP</span>
                            </div>
                        </div>
                        <button onclick="handleEdit(${r.id}, 'report')" class="text-[9px] text-zinc-500">EDIT</button>
                    </div>
                `).join('');
            } else {
                topSection.classList.add('hidden');
            }

            container.innerHTML = pageData.map(r => `
                <div class="flex justify-between items-center p-5 glass rounded-2xl border border-white/5">
                    <div onclick="openReport(${r.id}, 'report')" class="flex-grow cursor-pointer">
                        <span class="text-[13px] text-zinc-200">${r.title}</span>
                        <div class="text-[9px] text-zinc-600 mt-1">${new Date(r.created_at).toLocaleDateString()}</div>
                    </div>
                    <button onclick="handleEdit(${r.id}, 'report')" class="text-[9px] text-zinc-700">EDIT</button>
                </div>
            `).join('') || '<p class="text-zinc-700 text-xs text-center py-4">NO DATA</p>';
            
            renderPagination('reportPagination', normalData.length, size, page, 'renderReportPage');
        }

        function renderToolPage(page) {
            const size = 8;
            const container = document.getElementById('toolList');
            const pageData = fullData.tools.slice((page-1)*size, page*size);
            
            container.innerHTML = pageData.map(r => `
                <div class="flex items-center gap-4 p-4 glass rounded-2xl">
                    <div onclick="openReport(${r.id}, 'tool')" class="w-10 h-10 rounded-xl bg-orange-600 flex items-center justify-center text-white cursor-pointer">⚡</div>
                    <div onclick="openReport(${r.id}, 'tool')" class="flex-grow cursor-pointer">
                        <div class="text-[13px] text-zinc-100 font-bold">${r.title}</div>
                    </div>
                    <button onclick="handleEdit(${r.id}, 'tool')" class="text-[9px] text-zinc-700">EDIT</button>
                </div>
            `).join('');
            
            renderPagination('toolPagination', fullData.tools.length, size, page, 'renderToolPage');
        }

        async function openReport(id, cat) {
            const token = localStorage.getItem('ymtea_token');
            if (!token) return showPayModal();
            try {
                const res = await fetch(`${API_BASE}/api/reports/view/${id}`, { headers: { 'Authorization': token } });
                if (res.status === 403) return showPayModal();
                const result = await res.json();
                document.getElementById('readerTitle').innerText = "CONTENT";
                document.getElementById('readerBody').innerHTML = result.data;
                document.getElementById('contentReader').classList.replace('hidden', 'flex');
                document.body.classList.add('modal-active');
            } catch (e) { alert("FETCH ERROR"); }
        }

        async function quickPublish() {
            const pass = document.getElementById('adminPass').value;
            const title = document.getElementById('quickTitle').value;
            const content = document.getElementById('quickContent').value;
            const isTop = document.getElementById('isTopCheck').checked ? 1 : 0;
            if(!pass) return alert("Secret Required");

            let sql = editTargetId 
                ? `UPDATE reports SET title='${title.replace(/'/g, "''")}', content='${content.replace(/'/g, "''")}', category='${currentCategory}', is_top=${isTop} WHERE id=${editTargetId};`
                : `INSERT INTO reports (title, content, category, is_top) VALUES ('${title.replace(/'/g, "''")}', '${content.replace(/'/g, "''")}', '${currentCategory}', ${isTop});`;
            
            const res = await fetch(`${API_BASE}/api/admin/publish`, { 
                method: 'POST', 
                headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ sql }) 
            });
            if (res.ok) { alert("DONE"); location.reload(); }
        }

        async function handleEdit(id, cat) {
            const item = (cat === 'tool' ? fullData.tools : fullData.reports).find(i => i.id === id);
            editTargetId = id;
            setCategory(cat);
            document.getElementById('quickTitle').value = item.title;
            document.getElementById('isTopCheck').checked = item.is_top == 1;
            toggleAdmin();
        }

        function refreshRadar() {
            const trendList = document.getElementById('trendList');
            const data = [
                {t:"TikTok Shop Policy", s:"Live"}, {t:"US Port Congestion", s:"Alert"}, {t:"AI Ad ROAS Index", s:"+15%"}
            ];
            trendList.innerHTML = data.map(i => `
                <div class="p-4 bg-white/5 rounded-xl border border-white/5 flex justify-between items-center">
                    <span class="text-[11px] text-zinc-300 font-bold truncate">${i.t}</span>
                    <span class="text-[9px] text-orange-500 font-mono">${i.s}</span>
                </div>
            `).join('');
        }

        async function generateTestCode(type) {
            const pass = document.getElementById('adminPass').value;
            const code = `T-${Math.random().toString(36).substring(7).toUpperCase()}`;
            const sql = `INSERT INTO active_codes (code, type, is_used) VALUES ('${code}', '${type}', 0);`;
            const res = await fetch(`${API_BASE}/api/admin/publish`, { method: 'POST', headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' }, body: JSON.stringify({ sql }) });
            if(res.ok) document.getElementById('codeOutput').value = code;
        }

        async function startPay(type) {
            const email = prompt("Email:");
            const code = prompt("Code:");
            if(!email || !code) return;
            const res = await fetch(`${API_BASE}/api/pay/success`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, type, code }) });
            const data = await res.json();
            if (data.success) { localStorage.setItem('ymtea_token', data.token); location.reload(); } else alert(data.msg);
        }

        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); document.getElementById('adminPanel').classList.toggle('flex'); }
        function setCategory(cat) { 
            currentCategory = cat; 
            document.getElementById('cat_report').className = cat === 'report' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500';
            document.getElementById('cat_tool').className = cat === 'tool' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500';
        }
        function showPayModal() { document.getElementById('payModal').classList.replace('hidden', 'flex'); }
        function closeModal(id) { document.getElementById(id).classList.replace('flex', 'hidden'); }
        function closeReader() { document.getElementById('contentReader').classList.replace('flex', 'hidden'); document.body.classList.remove('modal-active'); }

        window.onload = () => {
            refreshRadar();
            loadContent();
            const token = localStorage.getItem('ymtea_token');
            if(token) {
                const label = document.getElementById('statusLabel');
                label.innerText = "PRO_ACCESS";
                label.className = "text-[9px] font-mono px-2 py-1 rounded bg-orange-500/10 text-orange-500 border border-orange-500/20";
                if(document.getElementById('proBtn')) document.getElementById('proBtn').style.display = 'none';
            }
        };
    </script>
</body>
</html>
