<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 商业情报终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
        .gold-text { background: linear-gradient(135deg, #fb923c, #c2410c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        /* 修复弹窗显示时的背景锁定 */
        .modal-active { overflow: hidden; height: 100vh; }
        /* 自定义过渡动画 */
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="sticky top-0 z-40 w-full border-b border-white/5 bg-black/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter cursor-pointer select-none" ondblclick="toggleAdmin()">
                <span class="gold-text">YMTEA</span> <span class="text-white">HUB</span>
            </div>
            <div id="statusLabel" class="text-[10px] font-mono px-2 py-1 rounded bg-zinc-800 text-gray-500 border border-white/5">GUEST_MODE</div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 py-8 space-y-8 fade-in">
        
        <section class="text-center py-6">
            <h1 class="text-3xl md:text-5xl font-black mb-4 leading-tight tracking-tight text-white">内容即资产，<span class="gold-text">情报即先机</span></h1>
            <p class="text-zinc-500 text-xs md:text-sm">提供全球贸易数据、AI 选品雷达及跨境套利指南。</p>
        </section>

        <div class="glass rounded-3xl p-6">
            <h2 class="text-xs font-bold text-orange-500 mb-4 flex items-center gap-2 tracking-widest uppercase">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-orange-500"></span>
                </span>
                实时全球贸易雷达
            </h2>
            <div id="trendList" class="space-y-3">
                <div class="text-zinc-800 text-xs italic p-4">正在同步边缘网络数据...</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-12">
            <div class="glass p-8 rounded-[2.5rem] flex flex-col justify-between min-h-[260px] hover:border-orange-500/20 transition-all">
                <div>
                    <h3 class="font-bold text-xl mb-3 text-white">🌐 核心情报深度拆解</h3>
                    <p class="text-xs text-zinc-500 leading-relaxed mb-6">内含各行业套利机会、海关预警及非公开选品逻辑，每日定时更新。</p>
                </div>
                <button onclick="accessContent('report_pro')" class="w-full py-4 bg-zinc-900 rounded-2xl text-sm font-bold hover:bg-orange-700 transition active:scale-95 text-white">解锁深度报告</button>
            </div>

            <div class="glass p-8 rounded-[2.5rem] flex flex-col justify-between min-h-[260px] hover:border-orange-500/20 transition-all">
                <div>
                    <h3 class="font-bold text-xl mb-3 text-white">🛠️ 生产力工具 & 脚本</h3>
                    <p class="text-xs text-zinc-500 leading-relaxed mb-6">直接下载使用的自动化爬虫、营销模版及私有代码库，助您效率翻倍。</p>
                </div>
                <button onclick="accessContent('tool_pro')" class="w-full py-4 bg-zinc-900 rounded-2xl text-sm font-bold hover:bg-orange-700 transition active:scale-95 text-white">下载 PRO 工具</button>
            </div>
        </div>
    </main>

    <div id="payModal" class="fixed inset-0 z-50 hidden bg-black/95 backdrop-blur-xl items-center justify-center p-4">
        <div class="max-w-xl w-full">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black text-white">订阅专业版</h2>
                <p class="text-zinc-500 text-xs mt-2">付费内容仅限 PRO 成员访问</p>
            </div>
            <div class="grid md:grid-cols-2 gap-4">
                <div class="bg-zinc-900 border border-white/5 p-8 rounded-[2rem] text-center">
                    <div class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-2">月度体验</div>
                    <div class="text-4xl font-black mb-6 text-white">¥38 <span class="text-xs font-normal opacity-50">/月</span></div>
                    <button onclick="startPay('monthly')" class="w-full py-3 bg-zinc-800 rounded-xl text-sm font-bold hover:bg-zinc-700 transition text-white">立即选购</button>
                </div>
                <div class="bg-zinc-900 border-2 border-orange-500 p-8 rounded-[2rem] text-center relative shadow-2xl shadow-orange-500/10">
                    <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-orange-500 text-black text-[10px] font-bold px-4 py-1 rounded-full">超值推荐</div>
                    <div class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-2">年度尊享</div>
                    <div class="text-4xl font-black mb-6 text-white">¥199 <span class="text-xs font-normal opacity-50">/年</span></div>
                    <button onclick="startPay('yearly')" class="w-full py-3 bg-orange-600 rounded-xl text-sm font-bold shadow-lg shadow-orange-600/20 hover:bg-orange-500 transition text-white">尊享订阅</button>
                </div>
            </div>
            <button onclick="closeModal('payModal')" class="w-full mt-8 text-zinc-600 text-[10px] uppercase tracking-widest hover:text-zinc-400 transition">继续以访客身份浏览</button>
        </div>
    </div>

    <div id="adminPanel" class="fixed inset-0 z-50 hidden bg-black/98 items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-zinc-900 border border-white/10 p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black text-lg text-white">系统管理终端</h2>
                <button onclick="toggleAdmin()" class="text-zinc-500 hover:text-white">✕</button>
            </div>
            <div class="space-y-4">
                <input type="password" id="adminPass" placeholder="管理密钥" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-sm text-white outline-none focus:border-orange-500 transition">
                <select id="updateTarget" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-sm text-white outline-none appearance-none">
                    <option value="KV">更新付费内容 (KV)</option>
                    <option value="D1">发布雷达数据 (D1 SQL)</option>
                </select>
                <input type="text" id="contentKey" placeholder="内容 ID (如: report_pro)" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-sm text-white outline-none focus:border-orange-500">
                <textarea id="contentVal" rows="4" placeholder="内容文本 或 SQL 语句" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-sm text-white outline-none focus:border-orange-500"></textarea>
                <button onclick="adminPublish()" class="w-full py-4 bg-orange-700 rounded-2xl font-bold hover:bg-orange-600 transition active:scale-95 text-white">执行发布</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://tea.asasasxzc.workers.dev";

        // 1. 管理面板切换
        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            const isHidden = panel.classList.contains('hidden');
            if (isHidden) {
                panel.classList.remove('hidden');
                panel.classList.add('flex');
                document.body.classList.add('modal-active');
            } else {
                panel.classList.add('hidden');
                panel.classList.remove('flex');
                document.body.classList.remove('modal-active');
            }
        }

        // 2. 管理员发布逻辑
        async function adminPublish() {
            try {
                const pass = document.getElementById('adminPass').value;
                const target = document.getElementById('updateTarget').value;
                const key = document.getElementById('contentKey').value;
                const val = document.getElementById('contentVal').value;

                if (!pass) return alert("🚨 请输入管理密钥");

                const res = await fetch(`${API_BASE}/api/admin/publish`, {
                    method: 'POST',
                    headers: { 
                        'Admin-Key': pass, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({
                        target, key, 
                        value: target === 'KV' ? val : null,
                        sql: target === 'D1' ? val : null
                    })
                });

                if (res.ok) {
                    alert("✅ 发布成功！");
                    location.reload();
                } else {
                    const errText = await res.text();
                    alert("❌ 发布失败！状态码：" + res.status + "\n原因：" + errText);
                }
            } catch (error) {
                alert("🚨 网络错误或后端未响应：\n" + error.message);
            }
        }

        // 3. 内容权限访问
        async function accessContent(key) {
            const token = localStorage.getItem('ymtea_token');
            try {
                const res = await fetch(`${API_BASE}/api/fetch/${key}`, {
                    headers: { 'Authorization': token }
                });
                
                if (res.status === 403) {
                    showPayModal();
                } else {
                    const result = await res.json();
                    alert("🔓 内容已解锁：\n" + result.data);
                }
            } catch (e) { showPayModal(); }
        }

        // 4. 模拟支付逻辑
        async function startPay(type) {
            const email = prompt("请输入您的注册邮箱（用于激活权限）：");
            if (!email) return;
            
            try {
                const res = await fetch(`${API_BASE}/api/pay/success`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, type })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('ymtea_token', data.token);
                    alert(`🎉 支付成功！已为您开通 ${type === 'yearly' ? '1年' : '1个月'} PRO 权限`);
                    location.reload();
                }
            } catch (e) {
                alert("支付接口连接失败，请检查网络。");
            }
        }

        // 5. 加载公开雷达数据
        async function loadTrends() {
            try {
                const res = await fetch(`${API_BASE}/api/public/trends`);
                const data = await res.json();
                if (data && data.length > 0) {
                    document.getElementById('trendList').innerHTML = data.map(item => `
                        <div class="flex justify-between items-center p-4 glass rounded-2xl text-xs hover:bg-white/5 transition-colors">
                            <span class="text-zinc-200 font-medium">${item.title}</span>
                            <span class="text-zinc-600 text-[10px] font-mono">${new Date(item.update_time).toLocaleDateString()}</span>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('trendList').innerHTML = '<div class="text-zinc-700 text-xs italic p-4 text-center">暂无公开情报更新</div>';
                }
            } catch (e) {
                document.getElementById('trendList').innerHTML = '<div class="text-zinc-700 text-xs italic p-4 text-center">无法连接至雷达中心</div>';
            }
        }

        function showPayModal() {
            document.getElementById('payModal').classList.replace('hidden', 'flex');
            document.body.classList.add('modal-active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.replace('flex', 'hidden');
            document.body.classList.remove('modal-active');
        }

        // 初始化
        window.onload = () => {
            loadTrends();
            const token = localStorage.getItem('ymtea_token');
            if(token) {
                const label = document.getElementById('statusLabel');
                label.innerText = "PRO_SUBSCRIBER";
                label.className = "text-[10px] font-mono px-2 py-1 rounded bg-orange-500/10 text-orange-500 border border-orange-500/20";
            }
        };
    </script>
</body>
</html>
