<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA HUB | 商业情报终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-text { background: linear-gradient(135deg, #fb923c, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px rgba(249, 115, 22, 0.3)); }
        .modal-active { overflow: hidden; height: 100vh; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        .nav-btn { @apply flex-1 py-4 text-[10px] font-black uppercase tracking-widest transition-all hover:bg-white/5 disabled:opacity-20; }
        input, textarea { background: #000; border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; padding: 12px; font-size: 13px; outline: none; }
        input:focus, textarea:focus { border-color: #f97316; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="sticky top-0 z-40 w-full border-b border-white/10 bg-black/90 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter cursor-pointer select-none" ondblclick="toggleAdmin()">
                <span class="gold-text">YMTEA</span> <span class="text-white">HUB</span>
            </div>
            <div id="statusLabel" class="text-[9px] font-mono px-2 py-1 rounded bg-orange-500/10 text-orange-500 border border-orange-500/20 uppercase tracking-widest">SYSTEM_OPEN</div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 py-8 space-y-8 fade-in">
        <section class="text-center py-6">
            <h1 class="text-4xl md:text-6xl font-black mb-4 leading-tight tracking-tighter text-white">智联全球，<span class="gold-text">洞察先机</span></h1>
            <p class="text-zinc-400 text-[10px] md:text-xs tracking-[0.3em] uppercase font-bold opacity-80">Real-time Trade Intelligence & Pro Tools</p>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
            <div class="glass p-6 md:p-8 rounded-[2.5rem] flex flex-col min-h-[500px]">
                <h3 class="font-bold text-xl mb-6 text-white flex items-center gap-2"><span class="w-1.5 h-6 bg-orange-600 rounded-full"></span> 核心情报目录</h3>
                <div id="reportList" class="flex-grow space-y-3"></div>
                <div id="reportPagination" class="flex justify-center gap-2 mt-6"></div>
            </div>
            <div class="glass p-6 md:p-8 rounded-[2.5rem] flex flex-col min-h-[500px]">
                <h3 class="font-bold text-xl mb-6 text-white flex items-center gap-2"><span class="w-1.5 h-6 bg-orange-600 rounded-full"></span> 生产力工具库</h3>
                <div id="toolList" class="flex-grow space-y-3"></div>
                <div id="toolPagination" class="flex justify-center gap-2 mt-6"></div>
            </div>
        </div>
    </main>

    <div id="contentReader" class="fixed inset-0 z-[60] hidden bg-black items-center justify-center p-0 md:p-6 backdrop-blur-3xl">
        <div class="bg-zinc-900 w-full h-full md:max-w-4xl md:h-[85vh] md:rounded-[3rem] flex flex-col border border-white/10 overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-white/5 flex justify-between items-center text-white">
                <h2 id="readerTitle" class="font-black text-sm uppercase truncate">Intelligence Detail</h2>
                <button onclick="closeReader()" class="text-xl hover:text-orange-500 transition">✕</button>
            </div>
            <div id="readerBody" class="flex-grow overflow-y-auto p-8 md:p-12 text-zinc-200 leading-relaxed whitespace-pre-wrap select-text text-sm md:text-base custom-scroll"></div>
            <div id="readerNav" class="flex border-t border-white/5 bg-black/40">
                <button id="prevBtn" class="nav-btn border-r border-white/5">← PREVIOUS</button>
                <button id="nextBtn" class="nav-btn">NEXT →</button>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="fixed inset-0 z-[70] hidden bg-black/95 items-center justify-center p-4">
        <div class="bg-zinc-900 border border-white/10 p-8 rounded-[2.5rem] w-full max-w-lg shadow-2xl">
            <div class="flex justify-between items-center mb-6 text-white font-black text-xs tracking-widest uppercase">
                <span id="adminTitle">发布/修改情报</span>
                <button onclick="toggleAdmin()">✕</button>
            </div>
            <div class="flex flex-col gap-4">
                <input type="password" id="adminPass" placeholder="管理员密码 (Admin Secret)">
                <div class="flex gap-2">
                    <button onclick="setCategory('report')" id="cat_report" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white transition-all">情报类型</button>
                    <button onclick="setCategory('tool')" id="cat_tool" class="flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500 transition-all">工具类型</button>
                </div>
                <input type="text" id="quickTitle" placeholder="文章标题">
                <textarea id="quickContent" rows="6" placeholder="文章正文内容..."></textarea>
                <div id="adminActionArea" class="flex gap-2">
                    <button onclick="handlePublish()" id="submitBtn" class="flex-grow py-4 bg-orange-600 rounded-2xl font-black text-xs text-white uppercase tracking-widest shadow-lg shadow-orange-900/40">同步到云端</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://s1.ymtea.club";
        let reportsData = [];
        let toolsData = [];
        let currentCategory = 'report';
        let editingId = null; // 用于判断是新增还是修改

        const PAGE_SIZE_REPORTS = 20;
        const PAGE_SIZE_TOOLS = 10;

        // 1. 数据加载
        async function loadContent() {
            try {
                const res = await fetch(`${API_BASE}/api/reports/list`);
                const all = await res.json();
                // 倒序排列，最新的在前
                const sorted = all.sort((a,b) => b.id - a.id);
                reportsData = sorted.filter(i => i.category !== 'tool');
                toolsData = sorted.filter(i => i.category === 'tool');
                renderReports(1);
                renderTools(1);
            } catch (e) { console.error("Load Error:", e); }
        }

        // 2. 渲染情报 (带编辑和删除按钮)
        function renderReports(page) {
            const container = document.getElementById('reportList');
            const start = (page - 1) * PAGE_SIZE_REPORTS;
            const data = reportsData.slice(start, start + PAGE_SIZE_REPORTS);

            container.innerHTML = data.map(r => `
                <div class="flex justify-between items-center p-5 glass rounded-2xl border border-white/5 hover:border-orange-500/50 group transition-all fade-in">
                    <div class="flex-grow cursor-pointer" onclick="openReport(${r.id}, 'report')">
                        <div class="text-[13px] text-zinc-200 group-hover:text-orange-400 mb-1">${r.title}</div>
                        <div class="text-[9px] text-zinc-600 font-mono tracking-tighter uppercase">${new Date(r.created_at).toLocaleDateString()}</div>
                    </div>
                    <div class="flex gap-4 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="startEdit(${r.id}, 'report')" class="text-blue-400 text-[10px] font-bold uppercase">编辑</button>
                        <button onclick="handleDelete(${r.id})" class="text-red-500 text-[10px] font-bold uppercase">删除</button>
                    </div>
                </div>
            `).join('');
            renderPagination('reportPagination', reportsData.length, PAGE_SIZE_REPORTS, page, 'renderReports');
        }

        // 3. 渲染工具库
        function renderTools(page) {
            const container = document.getElementById('toolList');
            const start = (page - 1) * PAGE_SIZE_TOOLS;
            const data = toolsData.slice(start, start + PAGE_SIZE_TOOLS);

            container.innerHTML = data.map(r => `
                <div class="flex items-center justify-between p-5 glass rounded-2xl border border-white/5 hover:bg-orange-600/10 group transition-all fade-in">
                    <div class="flex items-center gap-4 flex-grow cursor-pointer" onclick="openReport(${r.id}, 'tool')">
                        <div class="w-10 h-10 rounded-xl bg-zinc-900 flex items-center justify-center text-orange-600 text-sm group-hover:bg-orange-600 group-hover:text-white transition-all">⚡</div>
                        <div class="text-[13px] text-zinc-100 font-black group-hover:text-orange-400">${r.title}</div>
                    </div>
                    <div class="flex gap-4 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="startEdit(${r.id}, 'tool')" class="text-blue-400 text-[10px] font-bold">编辑</button>
                        <button onclick="handleDelete(${r.id})" class="text-red-500 text-[10px] font-bold">删除</button>
                    </div>
                </div>
            `).join('');
            renderPagination('toolPagination', toolsData.length, PAGE_SIZE_TOOLS, page, 'renderTools');
        }

        // 4. 分页器
        function renderPagination(id, total, size, current, func) {
            const pages = Math.ceil(total / size);
            const container = document.getElementById(id);
            if (pages <= 1) { container.innerHTML = ''; return; }
            let html = '';
            for (let i = 1; i <= pages; i++) {
                const active = i === current;
                html += `<button onclick="${func}(${i})" class="px-3 py-1 text-[9px] font-mono rounded border ${active ? 'bg-orange-600 border-orange-400 text-white' : 'border-white/5 text-zinc-600 hover:text-white'}">${i}</button>`;
            }
            container.innerHTML = html;
        }

        // 5. 阅读功能 (包含上下篇)
        async function openReport(id, category) {
            const dataset = category === 'report' ? reportsData : toolsData;
            const idx = dataset.findIndex(i => i.id === id);
            if (idx === -1) return;

            try {
                // 因为没有收费模式，直接请求 (后端如需密码可加在 headers)
                const res = await fetch(`${API_BASE}/api/reports/view/${id}`);
                const result = await res.json();

                document.getElementById('readerTitle').innerText = dataset[idx].title;
                document.getElementById('readerBody').innerText = result.data;
                document.getElementById('contentReader').classList.replace('hidden', 'flex');
                document.body.classList.add('modal-active');

                // 导航按钮
                const prev = dataset[idx - 1];
                const next = dataset[idx + 1];
                const pBtn = document.getElementById('prevBtn');
                const nBtn = document.getElementById('nextBtn');

                pBtn.disabled = !prev;
                pBtn.onclick = prev ? () => openReport(prev.id, category) : null;
                nBtn.disabled = !next;
                nBtn.onclick = next ? () => openReport(next.id, category) : null;
            } catch (e) { alert("Load Error"); }
        }

        // 6. 管理员功能 (增/删/改)
        function startEdit(id, category) {
            const dataset = category === 'report' ? reportsData : toolsData;
            const item = dataset.find(i => i.id === id);
            if(!item) return;

            editingId = id;
            setCategory(category);
            document.getElementById('quickTitle').value = item.title;
            // 注意：列表通常不带正文，需要请求一次正文
            fetch(`${API_BASE}/api/reports/view/${id}`).then(r => r.json()).then(res => {
                document.getElementById('quickContent').value = res.data;
                document.getElementById('adminTitle').innerText = "修改文章 ID: " + id;
                document.getElementById('submitBtn').innerText = "保存修改";
                toggleAdmin();
            });
        }

        async function handlePublish() {
            const pass = document.getElementById('adminPass').value;
            const title = document.getElementById('quickTitle').value;
            const content = document.getElementById('quickContent').value;
            if (!pass || !title || !content) return alert("请填写完整信息");

            let sql = "";
            if (editingId) {
                // 修改逻辑
                sql = `UPDATE reports SET title='${title.replace(/'/g, "''")}', content='${content.replace(/'/g, "''")}', category='${currentCategory}' WHERE id=${editingId};`;
            } else {
                // 新增逻辑
                sql = `INSERT INTO reports (title, content, category) VALUES ('${title.replace(/'/g, "''")}', '${content.replace(/'/g, "''")}', '${currentCategory}');`;
            }

            try {
                const res = await fetch(`${API_BASE}/api/admin/publish`, {
                    method: 'POST',
                    headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql })
                });
                if (res.ok) { location.reload(); } else { alert("验证失败或服务器错误"); }
            } catch (e) { alert("FATAL ERROR"); }
        }

        async function handleDelete(id) {
            if (!confirm("确定要删除这篇文章吗？此操作不可撤销。")) return;
            const pass = prompt("请输入管理员密码确认删除:");
            if (!pass) return;

            const sql = `DELETE FROM reports WHERE id=${id};`;
            try {
                const res = await fetch(`${API_BASE}/api/admin/publish`, {
                    method: 'POST',
                    headers: { 'Admin-Key': pass, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql })
                });
                if (res.ok) { location.reload(); } else { alert("删除失败"); }
            } catch (e) { alert("API ERROR"); }
        }

        // 工具函数
        function toggleAdmin() { 
            if(document.getElementById('adminPanel').classList.contains('hidden')) {
                // 每次打开如果不是在编辑，则清空
                if(!editingId) {
                    document.getElementById('adminTitle').innerText = "发布新情报";
                    document.getElementById('submitBtn').innerText = "同步到云端";
                    document.getElementById('quickTitle').value = "";
                    document.getElementById('quickContent').value = "";
                }
            } else {
                editingId = null;
            }
            document.getElementById('adminPanel').classList.toggle('hidden'); 
            document.getElementById('adminPanel').classList.toggle('flex'); 
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.getElementById('cat_report').className = cat === 'report' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500';
            document.getElementById('cat_tool').className = cat === 'tool' ? 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-3 rounded-xl text-[10px] font-bold bg-zinc-800 text-zinc-500';
        }

        function closeReader() { document.getElementById('contentReader').classList.replace('flex', 'hidden'); document.body.classList.remove('modal-active'); }

        window.onload = () => { loadContent(); };
    </script>
</body>
</html>
